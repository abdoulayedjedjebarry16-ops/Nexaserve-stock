    function OrderBuilderSheet({ table, onClose, S }) {
      const [search,        setSearch]       = useState("");
      const [filterService, setFilterService]= useState("all");
      const [quantities,    setQuantities]   = useState({});
      const [isUrgent,      setIsUrgent]     = useState(false); // correction 10
      const [showConfirm,   setShowConfirm]  = useState(false); // correction 15

      const doSend = async () => {
        // Correction 3 — Détection conflits de services pour commandes à emporter admin
        if (table.isTakeaway) {
          const typesNeeded = {};
          selectedItems.forEach(({menuId}) => {
            const m = S.myMenu.find(x => x.id===menuId);
            if (!m) return;
            if (!typesNeeded[m.poste]) typesNeeded[m.poste] = S.myServices.filter(s => s.type===m.poste);
          });
          const conflictTypes = Object.entries(typesNeeded).filter(([,srvs]) => srvs.length > 1);
          if (conflictTypes.length > 0) {
            setServiceConflict({ types: conflictTypes, resolved: {} });
            return;
          }
        }
        await doSendWithService(null);
      };
      const [sending,       setSending]      = useState(false); // anti double-envoi
      const [note,          setNote]         = useState("");     // Fix 9
      const [serviceConflict, setServiceConflict] = useState(null); // Correction 3
      const r = S.myRestaurant;

      // Correction 8 : journée fermée → afficher alerte
      if (!r?.journeeOuverte) return (
        <Sheet open={true} onClose={onClose} title="Prise de commande">
          <div className="alert alert-warn">
            ⚠️ La journée n'est pas ouverte. L'administrateur doit ouvrir la journée avant toute prise de commande.
          </div>
          <button className="btn btn-ghost mt8" onClick={onClose}>Fermer</button>
        </Sheet>
      );

      const menuItems = S.myMenu.filter(m => {
        if (filterService !== "all" && m.poste !== filterService) return false;
        if (search && !normalize(m.nom).includes(normalize(search))) return false;
        if (m.desactive) return false;
        return true;
      });

      const setQty     = (id, qty) => setQuantities(q => ({...q,[id]:Math.max(0,qty)}));
      const totalItems = Object.values(quantities).reduce((a,b) => a+b, 0);
      const selectedItems = Object.entries(quantities).filter(([,q]) => q>0).map(([menuId,quantite]) => {
        const m = S.myMenu.find(x => x.id===menuId);
        return m ? {menuId, quantite, nom:m.nom, prix:m.prix} : null;
      }).filter(Boolean);
      const estimatedTotal = selectedItems.reduce((s,i) => s + i.prix*i.quantite, 0);

      const doSendWithService = async (resolvedServices) => {
        // resolvedServices: { [type]: serviceId } pour les types en conflit résolus
        const byService = {};
        selectedItems.forEach(({menuId,quantite}) => {
          const m = S.myMenu.find(x => x.id===menuId);
          if (!m) return;
          // Si ce type a été résolu manuellement, utiliser ce serviceId
          if (resolvedServices && resolvedServices[m.poste]) {
            const key = resolvedServices[m.poste];
            if (!byService[key]) byService[key] = { serviceId:resolvedServices[m.poste], items:[] };
            byService[key].items.push({menuId,quantite});
            return;
          }
          const tableSalleId = table.salleId;
          let service = S.myServices.find(s =>
            s.type === m.poste &&
            tableSalleId &&
            s.salleIds && s.salleIds.includes(tableSalleId)
          );
          if (!service) {
            service = S.myServices.find(s => s.type === m.poste);
          }
          const key = service?.id || m.poste || "default";
          if (!byService[key]) byService[key] = { serviceId: service?.id||null, items:[] };
          byService[key].items.push({menuId,quantite});
        });
        if (Object.keys(byService).length === 0) { S.toast("Aucun article sélectionné","error"); return; }
        // Utiliser l'ID réel de la table (pas le tempId local)
        const realTable = S.myTables.find(t => t.id===table.id) || table;
        const newOrders = Object.entries(byService).map(([key, {serviceId, items}]) => ({
          id:"tmp_"+genId(), tableId:realTable.id, serviceId, items, statut:"en_attente",
          urgent: isUrgent, note: note.trim()||null,
          restaurantId:S.user.restaurantId, serveurId:S.user.id, createdAt:Date.now(), isTakeaway:realTable.isTakeaway||false,
        }));
        S.update(s => ({ orders:[...s.orders,...newOrders] }));
        // Synchroniser avec Supabase + notifier les employés de production
        for (const order of newOrders) {
          try {
            const dbOrder = await api.createOrder(toDB.order(order));
            const appOrder = fromDB.order(dbOrder);
            S.update(s => ({ orders:s.orders.map(o => o.id===order.id ? appOrder : o) }));

            // Trouver les employés assignés à ce service de production et les notifier
            const prodEmployees = S.state.employees.filter(e =>
              e.serviceId === order.serviceId && e.actif && e.id !== S.user.id
            );
            if (prodEmployees.length > 0) {
              const tableLabel = table.isTakeaway
                ? "EM-"+String(table.emNum||0).padStart(3,"0")
                : "Table "+table.numero;
              const urgentPrefix = order.urgent ? "🔥 URGENT — " : "";
              const notifMsg = urgentPrefix + "Nouvelle commande · " + tableLabel;
              const notifType = order.urgent ? "error" : "info";
              const notifPayload = prodEmployees.map(e => ({
                employee_id: e.id,
                order_id:    appOrder.id,
                table_id:    order.tableId,
                msg:         notifMsg,
                type:        notifType,
              }));
              // Ajouter localement
              S.update(s => ({
                notifications: [...s.notifications, ...notifPayload.map(n => ({
                  id: genId(), employeeId: n.employee_id, orderId: n.order_id,
                  tableId: n.table_id, msg: n.msg, type: n.type, read: false, ts: Date.now()
                }))]
              }));
              // Envoyer en base
              await apiFetch("notifications", "POST", notifPayload).catch(() => {});
            }
          } catch(e) { console.warn("createOrder sync failed:", e); }
        }
        S.toast(isUrgent?"🔥 Commande urgente envoyée !":"Commande envoyée","success");
        setSending(false); setQuantities({}); setShowConfirm(false); onClose();
      };

      const submit = () => {
        if (Object.keys(quantities).filter(k => quantities[k]>0).length === 0) { S.toast("Aucun article sélectionné","error"); return; }
        setShowConfirm(true); // correction 15 : ouvrir confirmation
      };

      // Correction 3 — Sheet sélection service en conflit
      if (serviceConflict) return (
        <Sheet open={true} onClose={() => setServiceConflict(null)} title="Choisir le service">
          <p style={{fontSize:13,color:"var(--t3)",marginBottom:12}}>Plusieurs services du même type existent. Choisissez lequel doit préparer chaque type de commande.</p>
          {serviceConflict.types.map(([type, srvs]) => (
            <div key={type} className="card mb12">
              <div className="card-title" style={{fontSize:13,marginBottom:8}}>Type : {type}</div>
              {srvs.map(srv => (
                <div key={srv.id} className="list-item cursor" style={{background:serviceConflict.resolved[type]===srv.id?"var(--surface2)":"",borderRadius:8,marginBottom:6}}
                  onClick={() => setServiceConflict(sc => ({...sc, resolved:{...sc.resolved,[type]:srv.id}}))}>
                  <div className="list-item-main">
                    <div className="list-item-title">{srv.nom}</div>
                    <div className="list-item-sub">{srv.salleIds?.length>0?("Salles : "+(srv.salleIds.map(sid=>{const sl=S.mySalles.find(x=>x.id===sid);return sl?.nom||sid;}).join(", "))):"Aucune salle assignée"}</div>
                  </div>
                  {serviceConflict.resolved[type]===srv.id && <span style={{color:"var(--green)",fontWeight:700}}>✓</span>}
                </div>
              ))}
            </div>
          ))}
          <div className="flex-between mt12">
            <button className="btn btn-ghost" onClick={() => setServiceConflict(null)}>Annuler</button>
            <button className="btn btn-gold" disabled={serviceConflict.types.some(([type]) => !serviceConflict.resolved[type])}
              onClick={async () => { const resolved = serviceConflict.resolved; setServiceConflict(null); await doSendWithService(resolved); }}>
              Confirmer et envoyer
            </button>
          </div>
        </Sheet>
      );

      // Correction 15 : écran de confirmation
      if (showConfirm) return (
        <Sheet open={true} onClose={() => setShowConfirm(false)} title="Confirmer la commande"
          footer={<><button className="btn btn-ghost" onClick={() => setShowConfirm(false)}>Modifier</button><button className={`btn ${isUrgent?"btn-red":"btn-gold"}`} disabled={sending} onClick={() => { setSending(true); doSend(); }}>{sending?"Envoi en cours...":isUrgent?"🔥 Envoyer URGENT":"Envoyer la commande"}</button></>}>
          {isUrgent && <div className="alert alert-error mb12">🔥 Cette commande sera marquée URGENTE</div>}
          {selectedItems.map(item => (
            <div key={item.menuId} className="flex-between" style={{padding:"7px 0",borderBottom:"1px solid var(--border)"}}>
              <span style={{fontSize:13}}>{item.nom} <span style={{color:"var(--t3)"}}>x{item.quantite}</span></span>
              <span style={{fontSize:13,fontWeight:600,color:"var(--gold)"}}>{fmt(item.prix*item.quantite)}</span>
            </div>
          ))}
          {/* Fix 9 : afficher note si remplie */}
          {note.trim() && <div className="alert alert-info mt12">📝 Note : {note}</div>}
          <div className="divider" />
          <div className="flex-between">
            <span style={{fontWeight:700}}>Total estimé</span>
            <span style={{fontFamily:"Outfit",fontWeight:800,color:"var(--gold)",fontSize:18}}>{fmt(estimatedTotal)}</span>
          </div>
        </Sheet>
      );

      return (
        <Sheet open={true} onClose={onClose} title="Ajouter des articles"
          footer={
            <div style={{width:"100%",display:"flex",flexDirection:"column",gap:8}}>
              <Toggle on={isUrgent} onChange={setIsUrgent} label="🔥 Commande urgente" sub="Priorité maximale en cuisine" />
              {/* Fix 9 : note / commentaire */}
              <div className="field" style={{marginBottom:0}}>
                <label>Note pour la cuisine (optionnel)</label>
                <input className="inp" placeholder="Ex : sans piment, allergie noix..." value={note} onChange={e=>setNote(e.target.value)} />
              </div>
              <div style={{display:"flex",gap:8}}>
                <button className="btn btn-ghost" onClick={onClose}>Annuler</button>
                <button className={`btn ${isUrgent?"btn-red":"btn-gold"}`} disabled={totalItems===0} onClick={submit}>Suivant ({totalItems})</button>
              </div>
            </div>
          }>
          <div className="search-wrap">
            <span className="search-icon">🔍</span>
            <input className="inp inp-icon-left" style={{paddingLeft:40}} placeholder="Rechercher..." value={search} onChange={e => setSearch(e.target.value)} />
          </div>
          <div className="subtabs mb12" style={{paddingBottom:12}}>
            <button className={`subtab${filterService==="all"?" active":""}`} onClick={() => setFilterService("all")}>Tout</button>
            {POSTES.map(p => <button key={p.id} className={`subtab${filterService===p.id?" active":""}`} onClick={() => setFilterService(p.id)}>{p.label}</button>)}
          </div>
          {menuItems.map(m => (
            <div key={m.id} className="ob-item">
              {/* C7 : miniature image */}
              {m.image && <img src={m.image} alt={m.nom} style={{width:40,height:40,objectFit:"cover",borderRadius:8,flexShrink:0}} />}
              <div className="ob-item-info">
                <div className="ob-item-name">{m.nom}</div>
                <div className="ob-item-price">{fmt(m.prix)}</div>
              </div>
              <div className="ob-qty">
                <button className="ob-qty-btn" onClick={() => setQty(m.id,(quantities[m.id]||0)-1)}>−</button>
                <span className="ob-qty-val">{quantities[m.id]||0}</span>
                <button className="ob-qty-btn" onClick={() => setQty(m.id,(quantities[m.id]||0)+1)}>+</button>
              </div>
            </div>
          ))}
          {menuItems.length === 0 && <div className="empty" style={{padding:"24px 0"}}><div className="empty-text">Aucun article</div></div>}
        </Sheet>
      );
    }

    // Correction 9 — Éditeur de commande en_attente
    function OrderEditorSheet({ order, onClose, S }) {
      const [quantities, setQuantities] = useState(
        Object.fromEntries(order.items.map(i => [i.menuId, i.quantite]))
      );
      const setQty = (id, qty) => setQuantities(q => ({...q,[id]:Math.max(0,qty)}));
      const totalItems = Object.values(quantities).reduce((a,b) => a+b, 0);
      const menuItems = S.myMenu.filter(m => {
        const srv = S.myServices.find(s => s.id===m.serviceId);
        return srv && srv.id===order.serviceId && !m.desactive;
      });

      const save = () => {
        const items = Object.entries(quantities).filter(([,q]) => q>0).map(([menuId,quantite]) => ({menuId,quantite:parseInt(quantite)}));
        if (items.length === 0) { S.toast("Au moins un article requis","error"); return; }
        S.update(s => ({ orders:s.orders.map(o => o.id===order.id?{...o,items}:o) }));
        S.toast("Commande modifiée","success"); onClose();
      };

      return (
        <Sheet open={true} onClose={onClose} title="Modifier la commande"
          footer={<><button className="btn btn-ghost" onClick={onClose}>Annuler</button><button className="btn btn-gold" disabled={totalItems===0} onClick={save}>Enregistrer ({totalItems})</button></>}>
          <div className="alert alert-info mb12">✏️ Modifiez les quantités. La commande est encore en attente.</div>
          {menuItems.map(m => (
            <div key={m.id} className="ob-item">
              <div className="ob-item-info">
                <div className="ob-item-name">{m.nom}</div>
                <div className="ob-item-price">{fmt(m.prix)}</div>
              </div>
              <div className="ob-qty">
                <button className="ob-qty-btn" onClick={() => setQty(m.id,(quantities[m.id]||0)-1)}>−</button>
                <span className="ob-qty-val">{quantities[m.id]||0}</span>
                <button className="ob-qty-btn" onClick={() => setQty(m.id,(quantities[m.id]||0)+1)}>+</button>
              </div>
            </div>
          ))}
        </Sheet>
      );
    }

    // Fix 11 — Timer élapsé mis à jour chaque seconde
    function ElapsedTimer({ ts, urgent }) {
      const [elapsed, setElapsed] = useState(Date.now() - ts);
      React.useEffect(() => {
        const id = setInterval(() => setElapsed(Date.now() - ts), 10000);
        return () => clearInterval(id);
      }, [ts]);
      const mins = Math.floor(elapsed / 60000);
      const color = urgent ? "var(--red)" : mins >= 15 ? "var(--red)" : mins >= 8 ? "var(--gold)" : "var(--t3)";
      const txt   = mins < 1 ? "< 1min" : mins + "min";
      return <span style={{color, fontWeight: mins >= 8 ? 700 : 400}}>{txt}</span>;
    }

    // ===================== KITCHEN PAGE =====================
    function KitchenPage({ S }) {
      const [tab, setTab]       = useState("received");
      const [takeawayOpen, setTA]= useState(false);
      const role          = S.user.role;
      const myServiceType = role==="barman"?"bar":role==="chichaman"?"chicha":"cuisine";
      // Prendre le service de l'employé connecté via son serviceId
      const myServiceObj  = S.user.serviceId
        ? S.myServices.find(s => s.id===S.user.serviceId)
        : S.myServices.find(s => s.type===myServiceType);
      const canDirectSell = myServiceObj?.venteDirecte;

      // S'il existe plusieurs services du même type (ex: Bar1 + Bar2),
      // le filtre par salle est nécessaire pour les distinguer.
      // Sinon (Cuisine unique, Chicha unique), le service voit toutes les salles.
      const servicesDeMonType = S.myServices.filter(s => s.type === myServiceType);
      const plusieursServicesDeMonType = servicesDeMonType.length > 1;

      // Commandes annulation_demandee — toujours visibles peu importe l'onglet
      const annulationOrders = S.myOrders.filter(o => {
        if (S.user.serviceId) { if (o.serviceId !== S.user.serviceId) return false; }
        else { const srv = S.myServices.find(s => s.id===o.serviceId); if (!srv || srv.type !== myServiceType) return false; }
        return o.statut === "annulation_demandee";
      });

      const myOrders = S.myOrders.filter(o => {
        // Étape 1 : commande destinée au service de cet employé
        if (S.user.serviceId) {
          if (o.serviceId !== S.user.serviceId) return false;
        } else {
          const srv = S.myServices.find(s => s.id===o.serviceId);
          if (!srv || srv.type !== myServiceType) return false;
        }
        // Étape 2 : filtre salle seulement si plusieurs services du même type
        if (plusieursServicesDeMonType) {
          const srv = S.myServices.find(s => s.id===o.serviceId);
          const table = S.myTables.find(t => t.id===o.tableId);
          if (table && !table.isTakeaway && srv?.salleIds?.length > 0) {
            if (!srv.salleIds.includes(table.salleId)) return false;
          }
        }
        return ["en_attente","en_preparation","pret","waiting_client","annulation_demandee"].includes(o.statut);
        // Note: "annule" et "rejete" sont exclus — commandes terminées
      // Correction 10 : urgentes en premier
      }).sort((a,b) => (b.urgent?1:0)-(a.urgent?1:0) || a.createdAt-b.createdAt);

      const [rejectConfirm, setRejectConfirm] = useState(null); // C2 : id de commande à rejeter

      const updateOrder = async (orderId, statut) => {
        const current = S.myOrders.find(o => o.id===orderId);
        const previousStatut = statut === "annulation_demandee" ? (current?.statut || null) : null;
        const newNotifs = [];

        S.update(s => {
          const notifications = [...s.notifications];
          const orders = s.orders.map(o => {
            if (o.id !== orderId) return o;
            if (["pret","rejete","waiting_client"].includes(statut)) {
              // Inclure le label de la table dans le message (embarqué)
              // car la table peut être supprimée avant que le serveur lise la notif
              const table = s.tables.find(t => t.id===o.tableId);
              const tableLabel = !table ? "" : table.isTakeaway
                ? " · EM-"+String(table.emNum||0).padStart(3,"0")
                : " · Table "+table.numero;
              const baseMsg = statut==="pret" ? "🔔 Commande prête" : statut==="waiting_client" ? "📣 Appeler le client" : "❌ Commande rejetée";
              const msg = baseMsg + tableLabel;
              const type = statut==="rejete" ? "error" : "success";
              const notif = { id:genId(), employeeId:o.serveurId, orderId:o.id, tableId:o.tableId, msg, type, read:false, ts:Date.now() };
              notifications.push(notif);
              newNotifs.push(notif);
            }
            return {...o, statut, previousStatut};
          });
          return {orders, notifications};
        });

        try {
          await api.updateOrder(orderId, { statut, previous_statut: previousStatut });
          if (newNotifs.length > 0) {
            await apiFetch("notifications", "POST", newNotifs.map(n => ({
              employee_id: n.employeeId,
              order_id:    n.orderId,
              table_id:    n.tableId,
              msg:         n.msg,
              type:        n.type,
            })));
          }
        } catch(e) { console.warn("updateOrder sync failed:", e); }
      };

      const adminCancelOrder = async (orderId) => {
        const newNotifs = [];
        S.update(s => {
          const notifications = [...s.notifications];
          const orders = s.orders.map(o => {
            if (o.id !== orderId) return o;
            const n1 = { id:genId(), employeeId:o.serveurId, orderId:o.id, tableId:o.tableId, msg:"⚠️ Commande annulée par l'admin", type:"error", read:false, ts:Date.now() };
            notifications.push(n1);
            newNotifs.push(n1);
            const service = s.services.find(srv => srv.id===o.serviceId);
            if (service) {
              const productionEmp = s.employees.find(e => e.serviceId===service.id && e.actif);
              if (productionEmp && productionEmp.id !== o.serveurId) {
                const n2 = { id:genId(), employeeId:productionEmp.id, orderId:o.id, tableId:o.tableId, msg:"⚠️ L'admin a annulé cette commande", type:"error", read:false, ts:Date.now() };
                notifications.push(n2);
                newNotifs.push(n2);
              }
            }
            return {...o, statut:"rejete"};
          });
          return {orders, notifications};
        });
        try {
          await api.updateOrder(orderId, { statut:"rejete" });
          if (newNotifs.length > 0) {
            await apiFetch("notifications", "POST", newNotifs.map(n => ({
              employee_id: n.employeeId,
              order_id:    n.orderId,
              table_id:    n.tableId,
              msg:         n.msg,
              type:        n.type,
            })));
          }
        } catch(e) { console.warn("adminCancelOrder sync failed:", e); }
      };

      const tabs = [{ id:"received", label:"Commandes" }];
      if (canDirectSell) tabs.push({ id:"direct", label:"Vente directe" });

      return (
        <>
          <div className="page-header">
            <div className="page-header-inner">
              <div>
                <h1 className="page-title">{myServiceObj?.nom||"Cuisine"}</h1>
                <p className="page-sub">{S.myRestaurant?.nom}</p>
              </div>
              {canDirectSell && tab==="direct" && <button className="btn btn-gold btn-xs" onClick={() => setTA(true)}>+ Commande</button>}
            </div>
            {tabs.length > 1 && (
              <div className="subtabs mt8">
                {tabs.map(t => <button key={t.id} className={`subtab${tab===t.id?" active":""}`} onClick={() => setTab(t.id)}>{t.label}</button>)}
              </div>
            )}
          </div>

          {/* Alerte annulations en attente — visible sur TOUS les onglets */}
          {annulationOrders.length > 0 && (
            <div className="alert" style={{background:"rgba(239,68,68,0.12)",border:"1px solid var(--red)",borderRadius:10,padding:"10px 14px",marginBottom:12,display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:18}}>⚠️</span>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:13,color:"var(--red)"}}>
                  {annulationOrders.length} annulation{annulationOrders.length>1?"s":""} en attente de confirmation
                </div>
                <div style={{fontSize:11,color:"var(--t3)"}}>
                  {annulationOrders.map(o => {
                    const t = S.myTables.find(x=>x.id===o.tableId);
                    return t ? (t.isTakeaway?"EM-"+String(t.emNum||0).padStart(3,"0"):"Table "+t.numero) : "";
                  }).filter(Boolean).join(", ")}
                </div>
              </div>
            </div>
          )}
          {tab === "received" && (
            <div style={{padding:"0 16px 16px"}}>
              {myOrders.length === 0 && <div className="empty"><div className="empty-icon">🍳</div><div className="empty-text">Aucune commande</div></div>}
              {myOrders.map(order => {
                const table = S.myTables.find(t => t.id===order.tableId);
                const label = order.isTakeaway ? "EM-"+String(table?.emNum||0).padStart(3,"0") : "Table "+table?.numero;
                return (
                  <div key={order.id} className={`kitchen-order${order.statut==="en_attente"?" urgent":""}${order.urgent?" urgent":""}${order.statut==="annulation_demandee"?" urgent":""}`}
                    style={order.statut==="annulation_demandee"?{borderColor:"var(--red)",borderWidth:2,background:"rgba(239,68,68,0.08)"}:{}}>
                    <div className="kitchen-order-header">
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <span className="kitchen-order-num">{label}</span>
                        {order.isTakeaway && <span className="chip chip-blue" style={{fontSize:10}}>À emporter</span>}
                        {order.urgent     && <span className="chip chip-red"  style={{fontSize:10}}>🔥 URGENT</span>}
                        {order.statut==="annulation_demandee" && <span className="chip chip-red" style={{fontSize:10}}>⚠️ ANNULATION DEMANDÉE</span>}
                      </div>
                      <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:3}}>
                        <StatusChip statut={order.statut} />
                        {/* Fix 11 : horodatage + timer élapsé */}
                        <span style={{fontSize:10,color:order.urgent?"var(--red)":"var(--t3)"}}>
                          🕐 {fmtTime(order.createdAt)} · <ElapsedTimer ts={order.createdAt} urgent={order.urgent} />
                        </span>
                      </div>
                    </div>
                    {order.items.map(item => {
                      const m = S.myMenu.find(x => x.id===item.menuId);
                      return m ? (
                        <div key={item.menuId} className="kitchen-item">
                          <span className="kitchen-item-name">{m.nom}</span>
                          <span className="kitchen-item-qty">x{item.quantite}</span>
                        </div>
                      ) : null;
                    })}
                    {/* Fix 9 : afficher note de commande */}
                    {order.note && <div style={{fontSize:12,color:"var(--blue)",marginTop:6,padding:"5px 8px",background:"rgba(59,130,246,0.08)",borderRadius:6}}>📝 {order.note}</div>}
                    <div className="kitchen-actions">
                      {order.statut==="en_attente" && <><button className="btn btn-gold btn-sm" onClick={() => updateOrder(order.id,"en_preparation")}>Préparer</button><button className="btn btn-red btn-sm" onClick={() => setRejectConfirm(order.id)}>Rejeter</button></>}
                      {order.statut==="en_preparation" && <>
                        <button className="btn btn-green btn-sm" onClick={() => updateOrder(order.id,order.isTakeaway?"waiting_client":"pret")}>{order.isTakeaway?"Appeler client":"Prêt"}</button>
                        <button className="btn btn-red btn-sm" onClick={() => setRejectConfirm(order.id)}>Rejeter</button>
                      </>}
                      {order.statut==="annulation_demandee" && <>
                        <button className="btn btn-red btn-sm" onClick={() => updateOrder(order.id,"annule")}>✅ Confirmer annulation</button>
                        <button className="btn btn-ghost btn-sm" onClick={() => updateOrder(order.id, order.previousStatut||"en_preparation")}>❌ Refuser l'annulation</button>
                      </>}
                      {(S.user.role==="admin"||S.user.role==="admin_secondary") && order.statut==="en_preparation" && (
                        <button className="btn btn-red btn-sm" onClick={() => adminCancelOrder(order.id)}>⚠️ Annuler (admin)</button>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
          {/* C2 : confirmation rejet */}
          <Confirm
            open={!!rejectConfirm}
            onClose={() => setRejectConfirm(null)}
            title="Rejeter la commande"
            msg="Voulez-vous vraiment rejeter cette commande ? Cette action est irréversible."
            onOk={() => { updateOrder(rejectConfirm,"rejete"); setRejectConfirm(null); }}
            danger
          />

          {tab === "direct" && (
            <div style={{padding:"0 16px 16px"}}>
              <p style={{fontSize:13,color:"var(--t3)",marginBottom:12}}>Créez vos propres commandes.</p>
              <button className="btn btn-gold" onClick={() => setTA(true)}>+ Nouvelle commande directe</button>
            </div>
          )}

          {takeawayOpen && <DirectSellSheet S={S} onClose={() => setTA(false)} serviceType={myServiceType} />}
        </>
      );
    }

    function DirectSellSheet({ S, onClose, serviceType }) {
      const [clientNom,  setClientNom] = useState("");
      const [quantities, setQuantities]= useState({});
      const menuItems = S.myMenu.filter(m => m.poste === serviceType && !m.desactive);
      const setQty     = (id,qty) => setQuantities(q => ({...q,[id]:Math.max(0,qty)}));
      const totalItems = Object.values(quantities).reduce((a,b) => a+b, 0);

      const submit = async () => {
        const items = Object.entries(quantities).filter(([,qty]) => qty>0).map(([menuId,quantite]) => ({menuId,quantite}));
        if (items.length === 0) { S.toast("Aucun article","error"); return; }
        const emNum   = (S.state.emCounter||0)+1;
        const service = S.myServices.find(s => s.type===serviceType);
        const tempTableId = "tmp_" + genId();
        const tempOrderId = "tmp_" + genId();
        const table   = { id:tempTableId, isTakeaway:true, emNum, clientNom, restaurantId:S.user.restaurantId, statut:"en_attente", serveurId:S.user.id, salleId:null, createdAt:Date.now() };
        const order   = { id:tempOrderId, tableId:tempTableId, serviceId:service?.id, items, statut:"en_attente", restaurantId:S.user.restaurantId, serveurId:S.user.id, createdAt:Date.now(), isTakeaway:true };
        S.update(s => ({ tables:[...s.tables,table], orders:[...s.orders,order], emCounter:emNum }));
        S.toast("Commande créée","success"); onClose();
        // Correction 1 — Persistance Supabase DirectSellSheet
        try {
          const dbTable = await api.createTable(toDB.table(table));
          const appTable = fromDB.table(dbTable);
          S.update(s => ({
            tables: s.tables.map(t => t.id===tempTableId ? appTable : t),
            orders: s.orders.map(o => o.id===tempOrderId ? {...o, tableId:appTable.id} : o),
          }));
          const orderToSend = { ...order, id:tempOrderId, tableId:appTable.id };
          const dbOrder = await api.createOrder(toDB.order(orderToSend));
          const appOrder = fromDB.order(dbOrder);
          S.update(s => ({ orders:s.orders.map(o => o.id===tempOrderId ? appOrder : o) }));
        } catch(e) { console.warn("DirectSell Supabase sync failed:", e); }
      };

      return (
        <Sheet open={true} onClose={onClose} title="Vente directe"
          footer={<><button className="btn btn-ghost" onClick={onClose}>Annuler</button><button className="btn btn-gold" disabled={totalItems===0} onClick={submit}>Créer ({totalItems})</button></>}>
          <FieldInp label="Nom du client (optionnel)" value={clientNom} onChange={setClientNom} placeholder="Ex : Ahmed" />
          <div className="divider" />
          {menuItems.map(m => (
            <div key={m.id} className="ob-item">
              <div className="ob-item-info">
                <div className="ob-item-name">{m.nom}</div>
                <div className="ob-item-price">{fmt(m.prix)}</div>
              </div>
              <div className="ob-qty">
                <button className="ob-qty-btn" onClick={() => setQty(m.id,(quantities[m.id]||0)-1)}>−</button>
                <span className="ob-qty-val">{quantities[m.id]||0}</span>
                <button className="ob-qty-btn" onClick={() => setQty(m.id,(quantities[m.id]||0)+1)}>+</button>
              </div>
            </div>
          ))}
        </Sheet>
      );
    }

    // ===================== CAISSE PAGE =====================
    function CaissePage({ S, onLogout }) {
      const isAdmin        = S.user.role==="admin"||S.user.role==="admin_secondary";
      const [filterSalle,  setFilterSalle]   = useState("all");
      const [selectedTable,setSelectedTable] = useState(null);

      // Salles autorisées pour ce caissier : issues de son service "caisse" ou, si admin, toutes.
      const caisseService  = S.user.serviceId ? S.myServices.find(s => s.id===S.user.serviceId) : null;
      const allowedSalleIds = isAdmin
        ? S.mySalles.map(s => s.id)                          // admin : toutes les salles
        : (caisseService?.salleIds || S.user.salleIds || []); // caissier : salles de son service caisse

      const tables = S.myTables.filter(t => {
        if (t.statut === "encaisse") return false;
        if (t.isTakeaway) {
          if (t.statut === "pret" && S.myPayments.some(p => p.tableId === t.id)) return false;
          return isAdmin || allowedSalleIds.length > 0;
        }
        if (!isAdmin && !allowedSalleIds.includes(t.salleId)) return false;
        if (filterSalle !== "all" && t.salleId !== filterSalle) return false;
        return true;
      });

      // Onglets de filtre : seulement les salles auxquelles ce caissier a accès
      const visibleSalles = isAdmin
        ? S.mySalles
        : S.mySalles.filter(s => allowedSalleIds.includes(s.id));

      return (
        <>
          <div className="page-header">
            <div className="page-header-inner">
              <h1 className="page-title">Caisse</h1>
              {isAdmin && onLogout && <button className="btn btn-ghost btn-xs" onClick={onLogout}>🚪</button>}
            </div>
            <div className="subtabs mt8">
              <button className={`subtab${filterSalle==="all"?" active":""}`} onClick={() => setFilterSalle("all")}>Toutes</button>
              {visibleSalles.map(s => (
                <button key={s.id} className={`subtab${filterSalle===s.id?" active":""}`} onClick={() => setFilterSalle(s.id)}>{s.nom}</button>
              ))}
            </div>
          </div>
          <div style={{padding:"0 16px 16px"}}>
            {tables.length === 0 && <div className="empty"><div className="empty-icon">💰</div><div className="empty-text">Aucune table à encaisser</div></div>}
            {tables.map(t => {
              const total = calcTableTotal(S, t.id);
              const label = t.isTakeaway ? "EM-"+String(t.emNum||0).padStart(3,"0") : "Table "+t.numero;
              const isWaiting       = t.statut === "pret";
              const hasTakeawayCall = S.myOrders.some(o => o.tableId===t.id && o.statut==="waiting_client");
              // Correction 4 — Fast Food : les commandes à emporter peuvent toujours être encaissées
              const canEncaisser = t.isTakeaway ? true : (isWaiting || hasTakeawayCall);
              return (
                <div key={t.id} className={`card${canEncaisser?" cursor":""}`}
                  style={!canEncaisser?{opacity:0.6,cursor:"not-allowed"}:{}}
                  onClick={() => canEncaisser ? setSelectedTable(t) : S.toast("Le serveur n'a pas encore validé 'Prêt à payer'","error")}>
                  <div className="flex-between">
                    <div>
                      <div style={{fontFamily:"Outfit",fontSize:16,fontWeight:700}}>{label}</div>
                      {!t.isTakeaway && <div style={{fontSize:12,color:"var(--t3)"}}>{S.mySalles.find(s=>s.id===t.salleId)?.nom}</div>}
                      {t.clientNom   && <div style={{fontSize:12,color:"var(--t3)"}}>{t.clientNom}</div>}
                      {(() => { const srv=S.state.employees.find(e=>e.id===t.serveurId); return srv?<div style={{fontSize:11,color:"var(--t3)"}}>👤 {srv.prenom} {srv.nom}</div>:null; })()}
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontFamily:"Outfit",fontSize:17,fontWeight:700,color:"var(--gold)"}}>{fmt(total)}</div>
                      {isWaiting       && <span className="chip chip-green" style={{fontSize:10}}>✅ Prêt à payer</span>}
                      {hasTakeawayCall && <span className="chip chip-blue"  style={{fontSize:10}}>📣 Appeler client</span>}
                      {!canEncaisser   && <span className="chip chip-gold"  style={{fontSize:10}}>⏳ En attente</span>}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
          {selectedTable && <EncaisserSheet table={selectedTable} onClose={() => setSelectedTable(null)} onCloseTable={() => setSelectedTable(null)} S={S} />}
        </>
      );
    }

    function EncaisserSheet({ table, onClose, onCloseTable, S }) {
      const [especes,      setEspeces]      = useState("");
      const [carte,        setCarte]        = useState("");
      const [mobile,       setMobile]       = useState("");
      const [reduction,    setReduction]    = useState("");
      const [reductionType,setReductionType]= useState("percent");
      const [offrirMotif,  setOffrirMotif]  = useState("");
      const [isOffrir,     setIsOffrir]     = useState(false);
      const [receipt,      setReceipt]      = useState(null); // correction 12

      const orders = S.myOrders.filter(o => o.tableId===table.id && !["rejete","annule"].includes(o.statut));
      // Correction 6 : détail complet des articles
      const allItems = [];
      let subtotal = 0;
      orders.forEach(o => o.items.forEach(item => {
        const m = S.myMenu.find(x => x.id===item.menuId);
        if (m) { const line = {nom:m.nom,quantite:item.quantite,prix:m.prix,sous:m.prix*item.quantite}; allItems.push(line); subtotal += line.sous; }
      }));

      let reductionAmt = 0;
      if (!isOffrir && reduction) {
        if (reductionType==="percent") reductionAmt = Math.round(subtotal*parseFloat(reduction)/100);
        else reductionAmt = parseFloat(reduction)||0;
      }
      const total    = isOffrir ? 0 : Math.max(0, subtotal - reductionAmt);
      const totalPay = parseFloat(especes||0)+parseFloat(carte||0)+parseFloat(mobile||0);
      const monnaie  = Math.max(0, totalPay - total);
      const label    = table.isTakeaway ? "EM-"+String(table.emNum||0).padStart(3,"0") : "Table "+table.numero;
      const caissier = S.state.employees.find(e=>e.id===S.user.id);

      // Correction 12 : afficher le reçu après encaissement
      if (receipt) return (
        <Sheet open={true} onClose={() => { onClose(); if (onCloseTable) onCloseTable(); }} title="Reçu de paiement">
          <div style={{textAlign:"center",marginBottom:12}}>
            <div style={{fontSize:32}}>✅</div>
            <div style={{fontFamily:"Outfit",fontWeight:800,fontSize:18,marginTop:4}}>{S.myRestaurant?.nom}</div>
            <div style={{fontSize:12,color:"var(--t3)"}}>{receipt.label} · {fmtTime(receipt.ts)}</div>
            <div style={{fontSize:12,color:"var(--t3)"}}>Caissier : {caissier?.prenom} {caissier?.nom}</div>
          </div>
          <div className="divider" />
          {receipt.itemsSnapshot?.map((item,i) => (
            <div key={i} className="flex-between" style={{padding:"5px 0",borderBottom:"1px solid var(--border)"}}>
              <span style={{fontSize:12}}>{item.nom} x{item.quantite}</span>
              <span style={{fontSize:12,fontWeight:600}}>{fmt(item.prix*item.quantite)}</span>
            </div>
          ))}
          <div className="divider" />
          {receipt.reductionAmt>0 && <div className="flex-between mb8"><span style={{fontSize:13,color:"var(--red)"}}>Réduction</span><span style={{color:"var(--red)"}}>-{fmt(receipt.reductionAmt)}</span></div>}
          {receipt.motif && <div className="flex-between mb8"><span style={{fontSize:13,color:"var(--purple)"}}>Offert</span><span style={{fontSize:12,color:"var(--purple)"}}>{receipt.motif}</span></div>}
          <div className="flex-between mb12">
            <span style={{fontWeight:700}}>Total encaissé</span>
            <span style={{fontFamily:"Outfit",fontWeight:800,color:"var(--gold)",fontSize:18}}>{fmt(receipt.montant)}</span>
          </div>
          {receipt.especes>0 && <div className="flex-between" style={{fontSize:12,color:"var(--t2)"}}><span>Espèces</span><span>{fmt(receipt.especes)}</span></div>}
          {receipt.carte>0   && <div className="flex-between" style={{fontSize:12,color:"var(--t2)"}}><span>Carte</span><span>{fmt(receipt.carte)}</span></div>}
          {receipt.mobile>0  && <div className="flex-between" style={{fontSize:12,color:"var(--t2)"}}><span>Mobile money</span><span>{fmt(receipt.mobile)}</span></div>}
          {receipt.monnaieRendue>0 && <div className="flex-between mt8"><span style={{fontWeight:600}}>Monnaie rendue</span><span style={{fontFamily:"Outfit",fontWeight:700,color:"var(--green)"}}>{fmt(receipt.monnaieRendue)}</span></div>}
          <div style={{display:"flex",gap:8,marginTop:16}}>
            <button className="btn btn-ghost" onClick={() => window.print()}>🖨️ Imprimer</button>
            <button className="btn btn-gold" onClick={() => { onClose(); if (onCloseTable) onCloseTable(); }}>Fermer</button>
          </div>
        </Sheet>
      );

      const submit = async () => {
        // Bloquer si total = 0 et pas "offrir" — évite les doubles encaissements
        if (!isOffrir && total === 0) { S.toast("Impossible : montant à encaisser est 0 GNF. Cette facture a peut-être déjà été réglée.","error"); return; }
        // Bloquer si la table n'existe plus dans le state (déjà encaissée)
        if (!S.myTables.find(t => t.id === table.id) && !S.myOrders.find(o => o.tableId === table.id)) {
          S.toast("Cette table a déjà été encaissée.","error"); return;
        }
        if (!isOffrir && totalPay < total) { S.toast("Paiement insuffisant","error"); return; }
        if (isOffrir && !offrirMotif)       { S.toast("Motif obligatoire","error");    return; }
        const orderIds = orders.map(o => o.id);
        const payment = { id:genId(), tableId:table.id, restaurantId:S.user.restaurantId, montant:total, subtotal, reductionAmt, reductionType:isOffrir?"offrir":reductionType, reductionVal:isOffrir?null:(reduction||null), motif:isOffrir?offrirMotif:null, especes:parseFloat(especes||0), carte:parseFloat(carte||0), mobile:parseFloat(mobile||0), caisserId:S.user.id, ts:Date.now(), label,
          itemsSnapshot: orders.flatMap(o => o.items.map(item => { const m=S.myMenu.find(x=>x.id===item.menuId); return m?{nom:m.nom,quantite:item.quantite,prix:m.prix}:null; })).filter(Boolean),
          monnaieRendue: monnaie,
          // Ancrer ce payment à la journée courante — résiste aux changements de date_journee
          dateJournee: S.myRestaurant?.dateJournee || new Date().toISOString().split("T")[0],
        };
        // À EMPORTER → garder table + commandes, passer statut "pret" (service prépare encore)
        // SALLE → supprimer table + commandes comme avant
        if (table.isTakeaway) {
          S.update(s => ({
            payments: [...s.payments, payment],
            tables: s.tables.map(t => t.id === table.id ? {...t, statut:"pret"} : t),
          }));
          try {
            await api.createPayment(toDB.payment(payment), table.id, orderIds, true);
            await api.updateTable(table.id, { statut: "pret" });
          } catch(e) { console.warn("createPayment takeaway sync failed:", e); }
        } else {
          S.update(s => ({
            payments: [...s.payments, payment],
            tables:   s.tables.filter(t => t.id !== table.id),
            orders:   s.orders.filter(o => o.tableId !== table.id),
          }));
          try {
            await api.createPayment(toDB.payment(payment), table.id, orderIds, false);
          } catch(e) { console.warn("createPayment sync failed:", e); }
        }
        S.toast("Paiement encaissé !","success");
        setReceipt(payment);
      };

      return (
        <Sheet open={true} onClose={onClose} title={"Encaisser – "+label}
          footer={<><button className="btn btn-ghost" onClick={onClose}>Annuler</button><button className="btn btn-gold" onClick={submit}>Encaisser {fmt(total)}</button></>}>
          {/* Correction 6 : détail articles */}
          <div className="card mb12" style={{padding:"12px 14px"}}>
            <div className="card-title" style={{marginBottom:8}}>🧾 Articles commandés</div>
            {allItems.map((item,i) => (
              <div key={i} className="flex-between" style={{padding:"4px 0",borderBottom:"1px solid var(--border)"}}>
                <span style={{fontSize:12}}>{item.nom} <span style={{color:"var(--t3)"}}>x{item.quantite}</span></span>
                <span style={{fontSize:12,fontWeight:600}}>{fmt(item.sous)}</span>
              </div>
            ))}
          </div>
          <div className="flex-between mb12">
            <span style={{color:"var(--t3)",fontSize:13}}>Sous-total</span>
            <span style={{fontWeight:700}}>{fmt(subtotal)}</span>
          </div>
          <Toggle on={isOffrir} onChange={setIsOffrir} label="Offrir" sub="Total passe à 0 GNF" />
          {isOffrir && <FieldInp label="Motif obligatoire" value={offrirMotif} onChange={setOffrirMotif} placeholder="Ex : Invité spécial" required />}
          {!isOffrir && (
            <div className="field">
              <label>Réduction</label>
              <div className="flex" style={{gap:8}}>
                <select className="inp" value={reductionType} onChange={e => setReductionType(e.target.value)} style={{width:120,flex:"none"}}>
                  <option value="percent">%</option>
                  <option value="fixed">GNF fixe</option>
                </select>
                <input className="inp" type="number" value={reduction} onChange={e => setReduction(e.target.value)} placeholder={reductionType==="percent"?"0 %":"0 GNF"} />
              </div>
              {reductionAmt > 0 && <div style={{fontSize:12,color:"var(--green)",marginTop:4}}>Réduction : -{fmt(reductionAmt)}</div>}
            </div>
          )}
          <div className="divider" />
          <div className="flex-between mb12">
            <span style={{fontWeight:700,fontSize:16}}>Total à payer</span>
            <span style={{fontFamily:"Outfit",fontSize:22,fontWeight:800,color:"var(--gold)"}}>{fmt(total)}</span>
          </div>
          {!isOffrir && <>
            <FieldInp label="Espèces (GNF)"        value={especes} onChange={setEspeces} type="number" placeholder="0" />
            <FieldInp label="Carte bancaire (GNF)"  value={carte}   onChange={setCarte}   type="number" placeholder="0" />
            <FieldInp label="Mobile money (GNF)"    value={mobile}  onChange={setMobile}  type="number" placeholder="0" />

            {/* Indicateur dynamique : montant saisi vs total */}
            {totalPay > 0 && totalPay < total && (
              <div style={{background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.25)",borderRadius:"var(--r2)",padding:"10px 14px",marginBottom:12}}>
                <div className="flex-between">
                  <span style={{fontSize:13,color:"var(--t2)"}}>Montant saisi</span>
                  <span style={{fontSize:13,fontWeight:600}}>{fmt(totalPay)}</span>
                </div>
                <div className="flex-between mt8">
                  <span style={{fontSize:14,fontWeight:700,color:"var(--red)"}}>⚠️ Reste à payer</span>
                  <span style={{fontFamily:"Outfit",fontSize:18,fontWeight:800,color:"var(--red)"}}>{fmt(total - totalPay)}</span>
                </div>
              </div>
            )}

            {monnaie > 0 && (
              <div className="code-box" style={{padding:12}}>
                <div style={{fontSize:12,color:"var(--gold)",fontWeight:700}}>Monnaie à rendre</div>
                <div style={{fontFamily:"Outfit",fontSize:20,fontWeight:800,color:"var(--gold)"}}>{fmt(monnaie)}</div>
              </div>
            )}
          </>}
        </Sheet>
      );
    }

    function SallesTab({ S }) {
      const [showCreate, setShowCreate] = useState(false);
      const [editSalle,  setEditSalle]  = useState(null);
      const [deleteId,   setDeleteId]   = useState(null);

      const createSalle = async (nom) => {
        // Vérifier la limite de salles selon le plan
        // essai = accès complet illimité pendant la période d'essai
        const plan = S.myRestaurant?.plan || "essai";
        const LIMITES = { essai:999, basic:1, pro:3, premium:999 };
        const maxSalles = LIMITES[plan] || 1;
        if (S.mySalles.length >= maxSalles) {
          S.toast(`Limite atteinte — votre plan ${plan.toUpperCase()} autorise ${maxSalles} salle(s). Passez au plan supérieur pour ajouter plus de salles.`, "error");
          return;
        }
        const salle = { id:genId(), nom, restaurantId:S.user.restaurantId };
        S.update(s => ({ salles:[...s.salles,salle] }));
        try { const db = await api.createSalle(toDB.salle(salle)); S.update(s => ({ salles:s.salles.map(x => x.id===salle.id ? fromDB.salle(db) : x) })); } catch(e) {}
        S.toast("Salle créée","success");
      };
      const updateSalle = async (id,nom) => {
        S.update(s => ({ salles:s.salles.map(x => x.id===id?{...x,nom}:x) }));
        try { await api.updateSalle(id, {nom}); } catch(e) {}
        S.toast("Salle modifiée","success");
      };
      const deleteSalle = async (id) => {
        S.update(s => ({ salles:s.salles.filter(x => x.id!==id) }));
        try { await api.deleteSalle(id); } catch(e) {}
        S.toast("Salle supprimée","success");
      };

      return (
        <>
          <button className="btn btn-gold mb12" onClick={() => setShowCreate(true)}>+ Ajouter une salle</button>
          {S.mySalles.map(s => (
            <div key={s.id} className="list-item">
              <div className="avatar avatar-gold">🏢</div>
              <div className="list-item-main"><div className="list-item-title">{s.nom}</div></div>
              <button className="btn btn-ghost btn-xs" onClick={() => setEditSalle(s)}>✏️</button>
              <button className="btn btn-red btn-xs"   onClick={() => setDeleteId(s.id)}>🗑️</button>
            </div>
          ))}
          {S.mySalles.length === 0 && <div className="empty"><div className="empty-icon">🏢</div><div className="empty-text">Aucune salle</div></div>}
          <SalleSheet open={showCreate} onClose={() => setShowCreate(false)} onSubmit={createSalle} title="Nouvelle salle" initial="" />
          {editSalle && <SalleSheet open={true} onClose={() => setEditSalle(null)} onSubmit={nom => updateSalle(editSalle.id,nom)} title="Modifier la salle" initial={editSalle.nom} />}
          <Confirm open={!!deleteId} onClose={() => setDeleteId(null)} title="Supprimer" msg="Supprimer cette salle ?" onOk={() => deleteSalle(deleteId)} danger />
        </>
      );
    }

    function SalleSheet({ open, onClose, onSubmit, title, initial="" }) {
      const [nom, setNom] = useState(initial);
      return (
        <Sheet open={open} onClose={onClose} title={title}
          footer={<><button className="btn btn-ghost" onClick={onClose}>Annuler</button><button className="btn btn-gold" onClick={() => { if (!nom) return; onSubmit(nom); onClose(); }}>Enregistrer</button></>}>

    function ServiceSheet({ open, onClose, S, initial }) {

      const [salleIds, setSalleIds] = useState(initial?.salleIds||[]);

    function CreateEmployeeSheet({ open, onClose, S, onCreated }) {
      const [prenom,    setPrenom]   = useState("");
      const [nom,       setNom]      = useState("");
      const [role,      setRole]     = useState("serveur");
      const [salleIds,  setSalleIds] = useState([]);
      const [serviceId, setServiceId]= useState("");

      const toggleSalle  = (id) => setSalleIds(ids => ids.includes(id)?ids.filter(x=>x!==id):[...ids,id]);
      const needsSalle   = ["serveur","barman","chichaman","caissier","cuisinier"].includes(role);
      const needsService = ["cuisinier","barman","chichaman","caissier"].includes(role);
      const serviceOptions = S.myServices.filter(s => {
        if (role==="cuisinier") return s.type==="cuisine";
        if (role==="barman")    return s.type==="bar";
        if (role==="chichaman") return s.type==="chicha";
        if (role==="caissier")  return s.type==="caisse";
        return false;
      });
      // Correction 13 : aucun service caisse disponible
      const noCaisseService = role==="caissier" && serviceOptions.length===0;

      const submit = async () => {
        if (!prenom||!nom)                        { S.toast("Prénom et nom obligatoires","error"); return; }
        if (needsSalle   && salleIds.length===0)  { S.toast("Salle obligatoire","error");          return; }
        if (needsService && !serviceId)           { S.toast("Service obligatoire","error");        return; }
        if (noCaisseService) { S.toast("Créez d'abord un service de type 'caisse' dans Services","error"); return; }
        // Vérifier la limite d'employés selon le plan
        // essai = accès complet illimité pendant la période d'essai
        const plan = S.myRestaurant?.plan || "essai";
        const LIMITES_EMP = { essai:999, basic:3, pro:10, premium:999 };
        const maxEmp = LIMITES_EMP[plan] || 3;
        const empActuels = S.state.employees.filter(e => e.restaurantId === S.user.restaurantId).length;
        if (empActuels >= maxEmp) {
          S.toast(`Limite atteinte — votre plan ${plan.toUpperCase()} autorise ${maxEmp} employé(s). Passez au plan supérieur pour en ajouter plus.`, "error");
          return;
        }
        const login    = genLogin(prenom,nom);
        const password = genPass();
        const emp = { id:genId(), prenom, nom, login, password, role, salleIds, serviceId:serviceId||null, restaurantId:S.user.restaurantId, actif:true, isAdmin:false };
        S.update(s => ({ employees:[...s.employees,emp] }));
        try {
          const db = await api.createEmployee(toDB.employee(emp));
          const appEmp = fromDB.employee(db);
          S.update(s => ({ employees:s.employees.map(e => e.id===emp.id ? appEmp : e) }));
        } catch(e) { console.warn("createEmployee sync failed:", e); }
        S.toast("Employé créé","success");
        onCreated({login,password}); onClose();
      };

      return (
        <Sheet open={open} onClose={onClose} title="Nouvel employé"
          footer={<><button className="btn btn-ghost" onClick={onClose}>Annuler</button><button className="btn btn-gold" onClick={submit} disabled={noCaisseService}>Créer</button></>}>
          <div className="row">
            <FieldInp label="Prénom" value={prenom} onChange={setPrenom} placeholder="Mamadou" required />
            <FieldInp label="Nom"    value={nom}    onChange={setNom}    placeholder="Diallo"   required />
          </div>
          <div className="field">
            <label>Rôle</label>
            <select className="inp" value={role} onChange={e => { setRole(e.target.value); setSalleIds([]); setServiceId(""); }}>
              <option value="serveur">Serveur</option>
              <option value="cuisinier">Cuisinier</option>
              <option value="barman">Barman</option>
              <option value="chichaman">Chichaman</option>
              <option value="caissier">Caissier</option>
            </select>
          </div>
          {/* Correction 13 : alerte si aucun service caisse */}
          {noCaisseService && <div className="alert alert-warn">⚠️ Aucun service de type "Caisse" n'existe. Créez-en un dans Gérer → Services avant d'assigner un caissier.</div>}
          {needsService && (
            <div className="field">
              <label>Service *</label>
              <select className="inp" value={serviceId} onChange={e => setServiceId(e.target.value)}>
                <option value="">Choisir...</option>
                {serviceOptions.map(s => <option key={s.id} value={s.id}>{s.nom}</option>)}
              </select>
            </div>
          )}
          {needsSalle && (
            <div className="field">
              <label>Salles assignées *</label>
              {S.mySalles.map(s => (
                <div key={s.id} className="toggle-wrap" onClick={() => toggleSalle(s.id)}>
                  <span>{s.nom}</span>
                  <div className={`toggle${salleIds.includes(s.id)?" on":""}`}><div className="toggle-dot" /></div>
                </div>
              ))}
            </div>
          )}
        </Sheet>
      );
    }

              {!empLive.actif && <span className="chip chip-red">Inactif</span>}
            </div>
            <div style={{fontSize:13,color:"var(--t3)",marginBottom:16}}>
              <div>Login : {empLive.login}</div>
              <div>Salles : {empLive.salleIds?.map(id => S.mySalles.find(s=>s.id===id)?.nom).filter(Boolean).join(", ")||"Aucune"}</div>
            </div>
            <div className="divider" />
            <button className="btn btn-ghost mb8" onClick={() => setShowEdit(true)}>✏️ Modifier rôle / salles / service</button>
            <button className="btn btn-ghost mb8" onClick={() => setShowCreds(true)}>👁️ Voir identifiants</button>
            <button className="btn btn-ghost mb8" onClick={() => setConfirmNewPass(true)}>🔑 Nouveau mot de passe</button>
            {/* C4 : utilise empLive.actif pour le bouton et le label */}
            <button className={`btn ${empLive.actif?"btn-red":"btn-green"} mb8`} onClick={toggleActif}>{empLive.actif?"Désactiver":"Activer"}</button>
            {/* C4 : utilise empLive.isAdmin pour le Toggle */}
            {mySuperAdmin && !isSuperAdmin && <Toggle on={empLive.isAdmin} onChange={toggleAdmin} label="Accès admin" sub="Donne les droits admin secondaire" />}
            {mySuperAdmin && !isSuperAdmin && <button className="btn btn-red mt8" onClick={() => setConfirmDelete(true)}>🗑️ Supprimer</button>}
          </Sheet>
          {showCreds && (
            <Sheet open={true} onClose={() => setShowCreds(false)} title="Identifiants">
              <CodeBox label="Identifiant"  value={empLive.login}    S={S} />
              <CodeBox label="Mot de passe" value={empLive.password} S={S} />

    // Correction 2 — Modifier un employé existant (rôle, salles, service)
    function EditEmployeeSheet({ emp, onClose, S }) {
      const [role,      setRole]     = useState(emp.role);
      const [salleIds,  setSalleIds] = useState(emp.salleIds||[]);
      const [serviceId, setServiceId]= useState(emp.serviceId||"");

      const toggleSalle  = (id) => setSalleIds(ids => ids.includes(id)?ids.filter(x=>x!==id):[...ids,id]);
      const needsSalle   = ["serveur","barman","chichaman","caissier","cuisinier"].includes(role);
      const needsService = ["cuisinier","barman","chichaman","caissier"].includes(role);
      const serviceOptions = S.myServices.filter(s => {
        if (role==="cuisinier") return s.type==="cuisine";
        if (role==="barman")    return s.type==="bar";
        if (role==="chichaman") return s.type==="chicha";
        if (role==="caissier")  return s.type==="caisse";
        return false;
      });

      const save = () => {
        if (needsSalle && salleIds.length===0)  { S.toast("Salle obligatoire","error"); return; }
        if (needsService && !serviceId)          { S.toast("Service obligatoire","error"); return; }
        S.update(s => ({ employees:s.employees.map(e => e.id===emp.id?{...e,role,salleIds,serviceId:serviceId||null}:e) }));
        // Persister dans Supabase : sans ça, la salle et le service reviennent à l'ancien au prochain login
        api.updateEmployee(emp.id, { role, salle_ids: salleIds, service_id: serviceId||null })
          .catch(e => console.warn("updateEmployee sync failed:", e));
        S.toast("Employé modifié","success"); onClose();
      };

      return (
        <Sheet open={true} onClose={onClose} title={"Modifier – "+emp.prenom}

          <div className="field">

            <select className="inp" value={role} onChange={e => { setRole(e.target.value); setSalleIds([]); setServiceId(""); }}>

              <option value="cuisinier">Cuisinier</option>
              <option value="barman">Barman</option>
              <option value="chichaman">Chichaman</option>

            <div className="field">
              <label>Service *</label>

            </div>

          {needsSalle && (
            <div className="field">
              <label>Salles assignées *</label>

    function MenuTab({ S }) {

        if (search && !normalize(m.nom).includes(normalize(search))) return false;
        return true;
      });

        S.update(s => ({ menu:s.menu.filter(m => m.id!==id) }));

        S.toast("Article supprimé","success");

        const newVal = !item?.desactive;
        S.update(s => ({ menu:s.menu.map(m => m.id===id?{...m,desactive:newVal}:m) }));
        try { await api.updateMenuItem(id, {desactive:newVal}); } catch(e) {}

    function MenuItemSheet({ open, onClose, S, initial }) {
      const [nom,       setNom]      = useState(initial?.nom||"");
      const [prix,      setPrix]     = useState(initial?.prix||"");
      const [categorie, setCategorie]= useState(initial?.categorie||"");
      const [poste,     setPoste]    = useState(initial?.poste||"");
      const [imageB64,  setImageB64] = useState(initial?.image||null);

      // O5b : upload image vers Supabase Storage
      const handleImage = async (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        if (file.size > 2000000) { S.toast("Image trop grande (max 2 Mo)","error"); return; }

        // Lire en base64 pour prévisualisation immédiate
        const reader = new FileReader();
        reader.onload = async (ev) => {
          const base64 = ev.target.result;
          setImageB64(base64); // Aperçu local immédiat

          // Uploader vers Supabase Storage en arrière-plan
          try {
            const fileName = `${S.user.restaurantId}/${Date.now()}_${file.name.replace(/[^a-zA-Z0-9._]/g,'')}`;
            const arrayBuffer = await file.arrayBuffer();
            const res = await fetch(
              `https://apqsldtzosodkunftixw.supabase.co/storage/v1/object/menu-images/${fileName}`,
              {
                method: "POST",
                headers: {
                  "Content-Type": file.type,
                  "apikey": ANON_KEY,
                  "Authorization": `Bearer ${ANON_KEY}`,
                },
                body: arrayBuffer,
              }
            );
            if (res.ok) {
              const publicUrl = `https://apqsldtzosodkunftixw.supabase.co/storage/v1/object/public/menu-images/${fileName}`;
              setImageB64(publicUrl); // Remplacer base64 par URL publique
            }
            // Si upload échoue, on garde le base64 (fallback)
          } catch(err) {
            console.warn("Storage upload failed, keeping base64:", err);
          }
        };
        reader.readAsDataURL(file);
      };

      const submit = async () => {
        if (!nom||!prix||!poste) { S.toast("Champs obligatoires","error"); return; }
        // Trouver le serviceId correspondant au poste choisi
        const serviceObj = S.myServices.find(s => s.type === poste);
        const serviceId  = serviceObj?.id || null;

        if (initial) {
          S.update(s => ({ menu:s.menu.map(m => m.id===initial.id?{...m,nom,prix:parseFloat(prix),categorie,poste,serviceId,image:imageB64}:m) }));
          try { await api.updateMenuItem(initial.id, {nom,prix:parseFloat(prix),categorie,poste,service_id:serviceId,image:imageB64}); } catch(e) {}
          S.toast("Article modifié","success");
        } else {
          const item = { id:"tmp_"+genId(), nom, prix:parseFloat(prix), categorie, poste, serviceId, image:imageB64, restaurantId:S.user.restaurantId, desactive:false };
          S.update(s => ({ menu:[...s.menu, item] }));
          try {
            const db = await api.createMenuItem({nom:item.nom, prix:item.prix, categorie:item.categorie, poste:item.poste, service_id:item.serviceId, image:item.image, restaurant_id:item.restaurantId, desactive:false});
            const appItem = fromDB.menuItem(db);
            S.update(s => ({ menu:s.menu.map(m => m.id===item.id ? appItem : m) }));
          } catch(e) { console.warn("createMenuItem sync failed:", e); }
          S.toast("Article ajouté","success");
        }
        onClose();
      };

      return (
        <Sheet open={open} onClose={onClose} title={initial?"Modifier l'article":"Nouvel article"}
          footer={<><button className="btn btn-ghost" onClick={onClose}>Annuler</button><button className="btn btn-gold" onClick={submit}>{initial?"Enregistrer":"Ajouter"}</button></>}>
          <FieldInp label="Nom de l'article" value={nom}       onChange={setNom}       placeholder="Ex : Poulet Yassa" required />
          <FieldInp label="Prix (GNF)"       value={prix}      onChange={v=>setPrix(v)} type="number" placeholder="75000" required />
          <FieldInp label="Catégorie (optionnel)" value={categorie} onChange={setCategorie} placeholder="Ex : Plats, Boissons, Grillades..." />
          {/* Poste de préparation - remplace le champ Service */}
          <div className="field">
            <label>Poste de préparation *</label>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:6}}>
              {POSTES.map(p => (
                <button key={p.id} type="button"
                  className={`btn btn-sm ${poste===p.id?"btn-gold":"btn-ghost"}`}
                  style={{flex:1,minWidth:80}}
                  onClick={() => setPoste(p.id)}>
                  {p.label}
                </button>
              ))}
            </div>
          </div>
          <div className="field">
            <label>Image de l'article (optionnel)</label>
            {imageB64 && <img src={imageB64} alt="aperçu" style={{width:"100%",maxHeight:160,objectFit:"cover",borderRadius:8,marginBottom:8}} />}
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <label style={{flex:1,background:"var(--s2)",border:"1px solid var(--border2)",borderRadius:"var(--r2)",padding:"10px 14px",fontSize:13,color:"var(--t3)",cursor:"pointer",textAlign:"center"}}>
                📷 {imageB64?"Changer l'image":"Choisir une image"}
                <input type="file" accept="image/*" style={{display:"none"}} onChange={handleImage} />
              </label>
              {imageB64 && <button className="btn btn-red btn-xs" onClick={() => setImageB64(null)}>✕</button>}
            </div>
          </div>
        </Sheet>
      );
    }

    // Correction 3 — Statistiques avancées
    function StatsTab({ S }) {
      const r = S.myRestaurant;
      const [filtreJournee, setFiltreJournee] = useState("courante");

      // Filtrer les payments selon la journée sélectionnée
      const allPayments = S.myPayments;
      const payments = allPayments.filter(p => {
        if (filtreJournee === "courante") {
          if (!r?.dateJournee) return true;
          if (p.dateJournee) return p.dateJournee === r.dateJournee;
          return new Date(p.ts).toDateString() === new Date(r.dateJournee).toDateString();
        }
        return true; // "toutes" → tout afficher
      });

      const totalCA  = payments.reduce((s,p) => s+p.montant, 0);
      // Moyenne correcte : CA total ÷ nombre de paiements
      const avgTable = payments.length ? Math.round(totalCA / payments.length) : 0;

      // Par service — calculé depuis itemsSnapshot des payments (commandes supprimées après encaissement)
      // itemsSnapshot contient : { nom, quantite, prix } pour chaque article encaissé
      // On regroupe par label de la facture pour approcher le service, mais le plus fiable
      // est de lire le label du payment (ex: "Bar 1", "Cuisine") depuis items_snapshot par poste
      // → On utilise le label du payment comme proxy pour la salle, et on lit les articles
      const byService = {};
      payments.forEach(p => {
        // Utiliser le label de la table comme clé de regroupement pour les recettes par service
        // Les items n'ont pas de service_id dans le snapshot, on groupe par payment label
        (p.itemsSnapshot||[]).forEach(item => {
          // Chercher le menu item pour retrouver son serviceId
          const menuItem = S.myMenu.find(m => m.nom === item.nom);
          const srv = menuItem ? S.myServices.find(s => s.id===menuItem.serviceId) : null;
          const nom = srv?.nom || "Autre";
          if (!byService[nom]) byService[nom] = {count:0,total:0};
          byService[nom].total += item.prix * item.quantite;
          byService[nom].count += item.quantite;
        });
      });

      // Par caissier — depuis les payments (le caissier est enregistré dans chaque payment)
      const byServeur = {};
      payments.forEach(p => {
        const emp = S.state.employees.find(e => e.id===p.caisserId);
        const nom = emp ? emp.prenom+" "+emp.nom : "Inconnu";
        if (!byServeur[nom]) byServeur[nom] = {count:0,total:0};
        byServeur[nom].count++;
        byServeur[nom].total += p.montant;
      });

      // Par table/label — depuis les payments (le label "Table A2", "EM-001" est dans chaque payment)
      const bySalle = {};
      payments.forEach(p => {
        // Retrouver la salle depuis le label du payment
        // Le label est "Table X1", on cherche si la table existe encore sinon on garde juste le label
        const isEmporter = p.label?.startsWith("EM-");
        const nom = isEmporter ? "À emporter" : (p.tableLabel || "Salle principale");

              </div>
              <span style={{fontFamily:"Outfit",fontWeight:700,color:"var(--gold)",fontSize:14}}>{fmt(d.total)}</span>

          </div>
          <div className="stat-row mb12">
            <div className="stat-card"><div className="stat-val stat-accent">{fmt(totalCA)}</div><div className="stat-label">CA {filtreJournee==="courante"?"journée":"total"}</div></div>
            <div className="stat-card"><div className="stat-val">{fmt(avgTable)}</div><div className="stat-label">Moy. / encaissement</div></div>
            <div className="stat-card"><div className="stat-val">{payments.length}</div><div className="stat-label">Paiements</div></div>
            <div className="stat-card"><div className="stat-val">{allPayments.length}</div><div className="stat-label">Total historique</div></div>
          </div>
          {/* Correction 10 — Recettes par service avec bouton téléchargement */}

            <div className="flex-between mb8">
              <div className="card-title" style={{marginBottom:0}}>📊 Recettes par service</div>
              <button className="btn btn-ghost btn-xs" style={{width:"auto"}} onClick={() => {
                const resto = S.myRestaurant?.nom || "Restaurant";
                const dateStr = filtreJournee === "courante"
                  ? (S.myRestaurant?.dateJournee ? new Date(S.myRestaurant.dateJournee).toLocaleDateString("fr-FR") : new Date().toLocaleDateString("fr-FR"))
                  : "Toutes les journées";
                // Détail articles par service
                const detailBySrv = {};
                payments.forEach(p => {
                  (p.itemsSnapshot||[]).forEach(i => {
                    const m = S.myMenu.find(x=>x.nom===i.nom);

                    const n = srv?.nom || "Autre";
                    if (!detailBySrv[n]) detailBySrv[n] = { total:0, articles:{} };
                    detailBySrv[n].total += i.prix*i.quantite;
                    if (!detailBySrv[n].articles[i.nom]) detailBySrv[n].articles[i.nom] = {count:0,total:0};

                const html = "<!DOCTYPE html><html><head><meta charset='utf-8'><title>Recettes par service</title>"+CSS+"</head><body>" +
                  "<h2>"+resto+"</h2><p style='color:#666'>Recettes par service — "+dateStr+"</p>" +
