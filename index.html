    function HistoriqueTab({ S }) {
      const r = S.myRestaurant;
      const [filterDate,    setFilterDate]   = useState("");
      const [filterJournee, setFilterJournee]= useState("courante"); // filtre par journée
      const [filterMode,    setFilterMode]   = useState("all");
      const [selectedPmt,   setSelectedPmt]  = useState(null);

      // Récupérer toutes les journées distinctes présentes dans les payments
      const journeesDisponibles = [...new Set(
        S.myPayments.map(p => p.dateJournee).filter(Boolean)
      )].sort((a,b) => b.localeCompare(a)); // plus récente en premier

      let payments = [...S.myPayments].sort((a,b) => b.ts-a.ts);

      // Filtre par journée (prioritaire sur le filtre date manuel)
      if (filterJournee === "courante") {
        // Journée actuellement ouverte (ou dernière journée connue)
        const djCourante = r?.dateJournee || journeesDisponibles[0];
        if (djCourante) {
          payments = payments.filter(p => {
            if (p.dateJournee) return p.dateJournee === djCourante;
            const d = new Date(p.ts);
            const [fy,fm,fd] = djCourante.split("-").map(Number);
            return d.getFullYear()===fy && (d.getMonth()+1)===fm && d.getDate()===fd;
          });
        }
      } else if (filterJournee !== "toutes") {
        // Une journée spécifique sélectionnée
        payments = payments.filter(p => {
          if (p.dateJournee) return p.dateJournee === filterJournee;
          const d = new Date(p.ts);
          const [fy,fm,fd] = filterJournee.split("-").map(Number);
          return d.getFullYear()===fy && (d.getMonth()+1)===fm && d.getDate()===fd;
        });
      }

      // Filtre date manuelle (précision à l'intérieur d'une journée)
      if (filterDate) {
        const [fy, fm, fd] = filterDate.split("-").map(Number);
        payments = payments.filter(p => {
          const d = new Date(p.ts);
          return d.getFullYear()===fy && (d.getMonth()+1)===fm && d.getDate()===fd;
        });
      }
      if (filterMode === "especes") payments = payments.filter(p => (p.especes||0) > 0);
      if (filterMode === "carte")   payments = payments.filter(p => (p.carte||0) > 0);
      if (filterMode === "mobile")  payments = payments.filter(p => (p.mobile||0) > 0);
      if (filterMode === "offerts") payments = payments.filter(p => p.reductionType==="offrir");

      const total = payments.reduce((s,p) => s+p.montant, 0);

      // Articles vendus depuis itemsSnapshot
      const byArticle = {};
      payments.forEach(p => {
        (p.itemsSnapshot||[]).forEach(item => {
          if (!byArticle[item.nom]) byArticle[item.nom] = { count:0, total:0, prix:item.prix };
          byArticle[item.nom].count += item.quantite;
          byArticle[item.nom].total += item.prix * item.quantite;
        });
      });
      const articlesVendus = Object.entries(byArticle).sort((a,b) => b[1].count - a[1].count);
      const totalArticles  = articlesVendus.reduce((s,[,d]) => s+d.count, 0);

      const telechargerPDF = () => {
        const titre = filterJournee === "courante" ? "Journée en cours" :
                      filterJournee === "toutes"   ? "Toutes les journées" :
                      new Date(filterJournee+"T12:00:00").toLocaleDateString("fr-FR");
        const resto = S.myRestaurant?.nom || "Restaurant";
        const date  = new Date().toLocaleDateString("fr-FR");
        const rows  = articlesVendus.map(function(e) {
          return "<tr><td style='padding:6px 8px;border-bottom:1px solid #eee'>" + e[0] + "</td>" +
                 "<td style='padding:6px 8px;border-bottom:1px solid #eee;text-align:center'>x" + e[1].count + "</td>" +
                 "<td style='padding:6px 8px;border-bottom:1px solid #eee;text-align:right;font-weight:600'>" + fmt(e[1].total) + "</td></tr>";
        }).join("");
        const html = "<!DOCTYPE html><html><head><meta charset='utf-8'><title>Articles vendus</title>" +
          "<style>body{font-family:Arial,sans-serif;padding:30px;color:#111}h2{color:#C9A84C}table{width:100%;border-collapse:collapse}th{background:#1e1e3a;color:#fff;padding:8px}td{padding:6px 8px}</style></head>" +
          "<body><h2>" + resto + "</h2>" +
          "<p style='color:#666'>" + titre + " — " + date + "</p>" +
          "<table><thead><tr><th style='text-align:left'>Article</th><th>Quantité</th><th style='text-align:right'>Total</th></tr></thead>" +
          "<tbody>" + rows + "</tbody>" +
          "<tfoot><tr><td style='padding:8px;font-weight:700'>TOTAL</td>" +
          "<td style='padding:8px;text-align:center;font-weight:700'>" + totalArticles + " articles</td>" +
          "<td style='padding:8px;text-align:right;font-weight:700;color:#C9A84C'>" + fmt(total) + "</td></tr></tfoot>" +
          "</table></body></html>";
        const blob = new Blob([html], {type: "text/html;charset=utf-8"});
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement("a");
        a.href     = url;
        a.download = "articles-" + (filterJournee === "courante" ? "journee" : filterJournee) + ".html";
        a.click();
        URL.revokeObjectURL(url);
        S.toast("Fichier téléchargé — ouvrez-le dans Chrome puis Partager pour enregistrer en PDF","success");
      };

      // Correction 9 — Rapport PDF mensuel
      const telechargerRapportMensuel = () => {
        const resto = S.myRestaurant?.nom || "Restaurant";
        const now   = new Date();
        const allP  = S.myPayments;
        if (allP.length === 0) { S.toast("Aucun paiement à exporter","error"); return; }
        // Période couverte
        const dates = allP.map(p => new Date(p.ts));
        const debut = new Date(Math.min(...dates)).toLocaleDateString("fr-FR");
        const fin   = new Date(Math.max(...dates)).toLocaleDateString("fr-FR");
        const totalGlobal = allP.reduce((s,p) => s+p.montant, 0);
        // Par journée
        const byDay = {};
        allP.forEach(p => {
          const key = p.dateJournee || new Date(p.ts).toISOString().split("T")[0];
          if (!byDay[key]) byDay[key] = 0;
          byDay[key] += p.montant;
        });
        // Top 10 articles
        const byArt = {};
        allP.forEach(p => { (p.itemsSnapshot||[]).forEach(i => { if (!byArt[i.nom]) byArt[i.nom]={count:0,total:0}; byArt[i.nom].count+=i.quantite; byArt[i.nom].total+=i.prix*i.quantite; }); });
        const top10 = Object.entries(byArt).sort((a,b)=>b[1].count-a[1].count).slice(0,10);
        // Par mode
        const esp = allP.reduce((s,p)=>s+(p.especes||0),0);
        const cart= allP.reduce((s,p)=>s+(p.carte||0),0);
        const mob = allP.reduce((s,p)=>s+(p.mobile||0),0);
        // Par service
        const bySrv = {};
        allP.forEach(p => { (p.itemsSnapshot||[]).forEach(i => { const m=S.myMenu.find(x=>x.nom===i.nom); const s=m?S.myServices.find(x=>x.id===m.serviceId):null; const n=s?.nom||"Autre"; if(!bySrv[n])bySrv[n]=0; bySrv[n]+=i.prix*i.quantite; }); });
        const CSS = "<style>body{font-family:Arial,sans-serif;padding:30px;color:#111}h2,h3{color:#C9A84C}table{width:100%;border-collapse:collapse}th{background:#1e1e3a;color:#fff;padding:8px}td{padding:6px 8px;border-bottom:1px solid #eee}</style>";
        const rowsDay = Object.entries(byDay).sort((a,b)=>a[0].localeCompare(b[0])).map(([d,v])=>
          "<tr><td>"+new Date(d+"T12:00:00").toLocaleDateString("fr-FR")+"</td><td style='text-align:right;font-weight:600'>"+fmt(v)+"</td></tr>"
        ).join("");
        const rowsArt = top10.map(([n,d])=>
          "<tr><td>"+n+"</td><td style='text-align:center'>x"+d.count+"</td><td style='text-align:right;font-weight:600'>"+fmt(d.total)+"</td></tr>"
        ).join("");
        const rowsSrv = Object.entries(bySrv).map(([n,v])=>
          "<tr><td>"+n+"</td><td style='text-align:right;font-weight:600'>"+fmt(v)+"</td></tr>"
        ).join("");
        const html = "<!DOCTYPE html><html><head><meta charset='utf-8'><title>Rapport mensuel</title>"+CSS+"</head><body>" +
          "<h2>"+resto+"</h2><p style='color:#666'>Rapport mensuel — du "+debut+" au "+fin+"</p>" +
          "<h3>💰 Total encaissé</h3><p style='font-size:22px;font-weight:700;color:#C9A84C'>"+fmt(totalGlobal)+"</p><p>"+allP.length+" paiements</p>" +
          (esp>0||cart>0||mob>0?"<h3>💳 Modes de paiement</h3><table><tbody>"+(esp>0?"<tr><td>Espèces</td><td style='text-align:right'>"+fmt(esp)+"</td></tr>":"")+(cart>0?"<tr><td>Carte</td><td style='text-align:right'>"+fmt(cart)+"</td></tr>":"")+(mob>0?"<tr><td>Mobile money</td><td style='text-align:right'>"+fmt(mob)+"</td></tr>":"")+"</tbody></table>":"") +
          "<h3>📅 Par journée</h3><table><thead><tr><th style='text-align:left'>Date</th><th style='text-align:right'>Total</th></tr></thead><tbody>"+rowsDay+"</tbody></table>" +
          (top10.length>0?"<h3>📦 Top 10 articles</h3><table><thead><tr><th style='text-align:left'>Article</th><th>Qté</th><th style='text-align:right'>Total</th></tr></thead><tbody>"+rowsArt+"</tbody></table>":"") +
          (Object.keys(bySrv).length>0?"<h3>📊 Par service</h3><table><thead><tr><th style='text-align:left'>Service</th><th style='text-align:right'>Total</th></tr></thead><tbody>"+rowsSrv+"</tbody></table>":"") +
          "</body></html>";
        const blob = new Blob([html], {type:"text/html;charset=utf-8"});
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement("a");
        a.href=url; a.download="rapport-mensuel-"+now.toISOString().split("T")[0]+".html"; a.click();
        URL.revokeObjectURL(url);
        S.toast("Rapport mensuel téléchargé","success");
      };

      return (
        <>
          {/* Sélecteur de journée */}
          <div className="card mb12" style={{padding:"12px 14px"}}>
            <div style={{fontSize:12,color:"var(--t3)",marginBottom:6,fontWeight:600}}>JOURNÉE</div>
            <div className="subtabs" style={{padding:0,paddingBottom:8}}>
              <button className={`subtab${filterJournee==="courante"?" active":""}`} onClick={() => setFilterJournee("courante")}>En cours</button>
              <button className={`subtab${filterJournee==="toutes"?" active":""}`}   onClick={() => setFilterJournee("toutes")}>Toutes</button>
              {journeesDisponibles.map(dj => (
                <button key={dj} className={`subtab${filterJournee===dj?" active":""}`} onClick={() => setFilterJournee(dj)}>
                  {new Date(dj+"T12:00:00").toLocaleDateString("fr-FR",{day:"2-digit",month:"short"})}
                </button>
              ))}
            </div>
            <div className="row mb8" style={{gap:8,marginBottom:8}}>
              <div className="field" style={{marginBottom:0,flex:1}}>
                <label>Affiner par date exacte</label>
                <input className="inp" type="date" value={filterDate} onChange={e => setFilterDate(e.target.value)} />
              </div>
              {filterDate && <button className="btn btn-ghost btn-xs" style={{alignSelf:"flex-end",marginBottom:0}} onClick={() => setFilterDate("")}>✕</button>}
            </div>
            <div style={{fontSize:12,color:"var(--t3)",marginBottom:6,fontWeight:600}}>MODE DE PAIEMENT</div>
            <div className="subtabs" style={{padding:0,paddingBottom:4}}>
              {[{id:"all",label:"Tous"},{id:"especes",label:"Espèces"},{id:"carte",label:"Carte"},{id:"mobile",label:"Mobile"},{id:"offerts",label:"Offerts"}].map(f => (
                <button key={f.id} className={`subtab${filterMode===f.id?" active":""}`} onClick={() => setFilterMode(f.id)}>{f.label}</button>
              ))}
            </div>
          </div>
          <div className="card mb12">
            <div className="flex-between">
              <div>
                <div style={{fontFamily:"Outfit",fontSize:22,fontWeight:800,color:"var(--gold)"}}>{fmt(total)}</div>
                <div style={{fontSize:12,color:"var(--t3)"}}>Total {filterDate||filterMode!=="all"?"(filtré)":"encaissé"}</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontFamily:"Outfit",fontSize:20,fontWeight:700}}>{payments.length}</div>
                <div style={{fontSize:12,color:"var(--t3)"}}>Paiements</div>
              </div>
            </div>
          </div>
          {/* Correction 9 — Bouton rapport mensuel quand filtre "Toutes les journées" */}
          {filterJournee === "toutes" && (
            <div className="card mb12" style={{padding:"12px 14px"}}>
              <div className="flex-between">
                <div>
                  <div style={{fontWeight:700,fontSize:14}}>📅 Rapport mensuel</div>
                  <div style={{fontSize:11,color:"var(--t3)"}}>Récapitulatif complet de toutes les journées</div>
                </div>
                <button className="btn btn-ghost btn-xs" style={{width:"auto"}} onClick={telechargerRapportMensuel}>📥 Rapport mensuel PDF</button>
              </div>
            </div>
          )}
          {/* Articles vendus */}
          {articlesVendus.length > 0 && (
            <div className="card mb12">
              <div className="flex-between mb8">
                <div>
                  <div style={{fontWeight:700,fontSize:14}}>📦 Articles vendus</div>
                  <div style={{fontSize:11,color:"var(--t3)"}}>{totalArticles} articles au total</div>
                </div>
                <button className="btn btn-ghost btn-xs" style={{width:"auto"}} onClick={telechargerPDF}>📥 Télécharger PDF</button>
              </div>
              {articlesVendus.map(([nom,d]) => (
                <div key={nom} className="flex-between" style={{padding:"5px 0",borderBottom:"1px solid var(--border)"}}>
                  <div>
                    <div style={{fontSize:13,fontWeight:600}}>{nom}</div>
                    <div style={{fontSize:11,color:"var(--t3)"}}>x{d.count} × {fmt(d.prix)}</div>
                  </div>
                  <span style={{fontFamily:"Outfit",fontWeight:700,color:"var(--gold)",fontSize:13}}>{fmt(d.total)}</span>
                </div>
              ))}
            </div>
          )}
          {payments.length === 0 && <div className="empty"><div className="empty-icon">📊</div><div className="empty-text">Aucun paiement</div></div>}
          {payments.map(p => {
            const caissier = S.state.employees.find(e => e.id===p.caisserId);
            return (
              <div key={p.id} className="list-item cursor" onClick={() => setSelectedPmt(p)}>
                <div className="list-item-main">
                  <div className="list-item-title">{p.label}</div>
                  <div className="list-item-sub">
                    {fmtTime(p.ts)}
                    {caissier && <span style={{marginLeft:6}}>· {caissier.prenom}</span>}
                    {p.reductionAmt>0 && <span style={{color:"var(--red)",marginLeft:6}}>-{fmt(p.reductionAmt)}</span>}
                    {p.motif && <span style={{color:"var(--purple)",marginLeft:6}}>Offert</span>}
                  </div>
                </div>
                <span style={{fontFamily:"Outfit",fontWeight:700,color:"var(--gold)"}}>{fmt(p.montant)}</span>
              </div>
            );
          })}
          {/* Fix 4 : reçu consultable depuis l'historique */}
          {selectedPmt && <ReceiptViewSheet pmt={selectedPmt} onClose={() => setSelectedPmt(null)} S={S} />}
        </>
      );
    }

    // Fix 4 — Reçu consultable depuis l'historique
    function ReceiptViewSheet({ pmt, onClose, S }) {
      const caissier = S.state.employees.find(e => e.id===pmt.caisserId);
      return (
        <Sheet open={true} onClose={onClose} title="Reçu de paiement">
          <div style={{textAlign:"center",marginBottom:12}}>
            <div style={{fontFamily:"Outfit",fontWeight:800,fontSize:18}}>{S.myRestaurant?.nom}</div>
            <div style={{fontSize:12,color:"var(--t3)"}}>{pmt.label} · {new Date(pmt.ts).toLocaleDateString("fr-FR")} {fmtTime(pmt.ts)}</div>
            {caissier && <div style={{fontSize:12,color:"var(--t3)"}}>Caissier : {caissier.prenom} {caissier.nom}</div>}
          </div>
          <div className="divider" />
          {pmt.itemsSnapshot?.length > 0 ? pmt.itemsSnapshot.map((item,i) => (
            <div key={i} className="flex-between" style={{padding:"5px 0",borderBottom:"1px solid var(--border)"}}>
              <span style={{fontSize:12}}>{item.nom} x{item.quantite}</span>
              <span style={{fontSize:12,fontWeight:600}}>{fmt(item.prix*item.quantite)}</span>
            </div>
          )) : <p style={{fontSize:12,color:"var(--t3)"}}>Détail articles non disponible</p>}
          <div className="divider" />
          {pmt.reductionAmt>0 && <div className="flex-between mb8"><span style={{fontSize:13,color:"var(--red)"}}>Réduction</span><span style={{color:"var(--red)"}}>-{fmt(pmt.reductionAmt)}</span></div>}
          {pmt.motif && <div className="flex-between mb8"><span style={{fontSize:13,color:"var(--purple)"}}>Offert</span><span style={{fontSize:12,color:"var(--purple)"}}>{pmt.motif}</span></div>}
          <div className="flex-between mb12"><span style={{fontWeight:700}}>Total encaissé</span><span style={{fontFamily:"Outfit",fontWeight:800,color:"var(--gold)",fontSize:18}}>{fmt(pmt.montant)}</span></div>
          {pmt.especes>0 && <div className="flex-between" style={{fontSize:12,color:"var(--t2)"}}><span>Espèces</span><span>{fmt(pmt.especes)}</span></div>}
          {pmt.carte>0   && <div className="flex-between" style={{fontSize:12,color:"var(--t2)"}}><span>Carte</span><span>{fmt(pmt.carte)}</span></div>}
          {pmt.mobile>0  && <div className="flex-between" style={{fontSize:12,color:"var(--t2)"}}><span>Mobile money</span><span>{fmt(pmt.mobile)}</span></div>}
          {pmt.monnaieRendue>0 && <div className="flex-between mt8"><span style={{fontWeight:600}}>Monnaie rendue</span><span style={{fontFamily:"Outfit",fontWeight:700,color:"var(--green)"}}>{fmt(pmt.monnaieRendue)}</span></div>}
          <button className="btn btn-gold mt16" onClick={onClose}>Fermer</button>
        </Sheet>
      );
    }

    function JourneeTab({ S }) {
      const r = S.myRestaurant;
      const [date,         setDate]         = useState(new Date().toISOString().split("T")[0]);
      const [showCloture,  setShowCloture]  = useState(false); // correction 4

      const payments = S.myPayments.filter(p => {
        if (!r?.dateJournee) return false;
        // Comparer par date_journee ancré (pas par timestamp) → correct même après changement de journée
        if (p.dateJournee) return p.dateJournee === r.dateJournee;
        return new Date(p.ts).toDateString() === new Date(r.dateJournee).toDateString();
      });

      const ouvrir = async () => {
        S.update(s => ({ restaurants:s.restaurants.map(x => x.id===r.id?{...x,journeeOuverte:true,dateJournee:date}:x) }));
        try { await api.updateRestaurant(r.id, {journee_ouverte:true, date_journee:date}); } catch(e) {}
        S.toast("Journée ouverte !","success");
      };
      const cloturer = async () => {
        S.update(s => ({ restaurants:s.restaurants.map(x => x.id===r.id?{...x,journeeOuverte:false}:x) }));
        try { await api.updateRestaurant(r.id, {journee_ouverte:false}); } catch(e) {}
        S.toast("Journée clôturée","info"); setShowCloture(false);
      };

      // Correction 4 : rapport de clôture
      const totalCA       = payments.reduce((s,p) => s+p.montant, 0);
      const totalEspeces  = payments.reduce((s,p) => s+(p.especes||0), 0);
      const totalCarte    = payments.reduce((s,p) => s+(p.carte||0), 0);
      const totalMobile   = payments.reduce((s,p) => s+(p.mobile||0), 0);
      const totalReduc    = payments.reduce((s,p) => s+(p.reductionAmt||0), 0);
      const offerts       = payments.filter(p => p.reductionType==="offrir");
      const byServiceCA   = {};
      S.myOrders.filter(o=>o.statut==="encaisse").forEach(o => {
        const srv = S.myServices.find(s=>s.id===o.serviceId);
        const nom = srv?.nom||"Inconnu";
        if (!byServiceCA[nom]) byServiceCA[nom] = 0;
        o.items.forEach(item => { const m=S.myMenu.find(x=>x.id===item.menuId); if(m) byServiceCA[nom]+=m.prix*item.quantite; });
      });

      const telechargerRapportCaisse = () => {
        const resto = S.myRestaurant?.nom || "Restaurant";
        const dateStr = r?.dateJournee ? new Date(r.dateJournee).toLocaleDateString("fr-FR") : new Date().toLocaleDateString("fr-FR");
        const rowsService = Object.entries(byServiceCA).map(([nom,v]) =>
          "<tr><td style='padding:6px 8px;border-bottom:1px solid #eee'>" + nom + "</td><td style='padding:6px 8px;border-bottom:1px solid #eee;text-align:right;font-weight:600'>" + fmt(v) + "</td></tr>"
        ).join("");
        const html = "<!DOCTYPE html><html><head><meta charset='utf-8'><title>Rapport caisse</title>" +
          "<style>body{font-family:Arial,sans-serif;padding:30px;color:#111}h2{color:#C9A84C}table{width:100%;border-collapse:collapse}th{background:#1e1e3a;color:#fff;padding:8px}td{padding:6px 8px}.total{font-weight:700;font-size:16px;color:#C9A84C}</style></head>" +
          "<body><h2>" + resto + "</h2>" +
          "<p style='color:#666'>Rapport de caisse — " + dateStr + "</p>" +
          "<h3 style='margin-top:20px'>💰 Récapitulatif</h3>" +
          "<table><tbody>" +
          "<tr><td>Total encaissé</td><td style='text-align:right;font-weight:700;color:#C9A84C'>" + fmt(totalCA) + "</td></tr>" +
          "<tr><td>Nombre de paiements</td><td style='text-align:right'>" + payments.length + "</td></tr>" +
          (totalEspeces>0?"<tr><td>Espèces</td><td style='text-align:right'>" + fmt(totalEspeces) + "</td></tr>":"") +
          (totalCarte>0?"<tr><td>Carte bancaire</td><td style='text-align:right'>" + fmt(totalCarte) + "</td></tr>":"") +
          (totalMobile>0?"<tr><td>Mobile money</td><td style='text-align:right'>" + fmt(totalMobile) + "</td></tr>":"") +
          (totalReduc>0?"<tr><td style='color:#e74c3c'>Total réductions</td><td style='text-align:right;color:#e74c3c'>-" + fmt(totalReduc) + "</td></tr>":"") +
          "</tbody></table>" +
          (Object.keys(byServiceCA).length>0?"<h3 style='margin-top:20px'>📊 Par service</h3><table><thead><tr><th style='text-align:left'>Service</th><th style='text-align:right'>Total</th></tr></thead><tbody>" + rowsService + "</tbody></table>":"") +
          (offerts.length>0?"<h3 style='margin-top:20px'>🎁 Offerts (" + offerts.length + ")</h3><ul>" + offerts.map(p=>"<li>" + p.label + (p.motif?" — "+p.motif:"") + "</li>").join("") + "</ul>":"") +
          "</body></html>";
        const blob = new Blob([html], {type:"text/html;charset=utf-8"});
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement("a");
        a.href = url; a.download = "rapport-caisse-" + (r?.dateJournee||"journee") + ".html"; a.click();
        URL.revokeObjectURL(url);
        S.toast("Rapport téléchargé — ouvrez dans Chrome puis Partager pour PDF","success");
      };

      if (showCloture) return (
        <Sheet open={true} onClose={() => setShowCloture(false)} title="Rapport de clôture"
          footer={<><button className="btn btn-ghost" onClick={telechargerRapportCaisse}>📥 Télécharger rapport caisse</button><button className="btn btn-ghost" onClick={() => setShowCloture(false)}>Annuler</button><button className="btn btn-red" onClick={cloturer}>Confirmer la clôture</button></>}>
          <div style={{textAlign:"center",marginBottom:16}}>
            <div style={{fontFamily:"Outfit",fontWeight:800,fontSize:20,color:"var(--gold)"}}>{fmt(totalCA)}</div>
            <div style={{fontSize:12,color:"var(--t3)"}}>Total encaissé · {new Date(r.dateJournee).toLocaleDateString("fr-FR")}</div>
          </div>
          <div className="divider" />
          <div className="card-title mb8">💳 Modes de paiement</div>
          {totalEspeces>0 && <div className="flex-between mb8"><span style={{fontSize:13}}>Espèces</span><span style={{fontWeight:600}}>{fmt(totalEspeces)}</span></div>}
          {totalCarte>0   && <div className="flex-between mb8"><span style={{fontSize:13}}>Carte bancaire</span><span style={{fontWeight:600}}>{fmt(totalCarte)}</span></div>}
          {totalMobile>0  && <div className="flex-between mb8"><span style={{fontSize:13}}>Mobile money</span><span style={{fontWeight:600}}>{fmt(totalMobile)}</span></div>}
          <div className="divider" />
          <div className="card-title mb8">📊 Par service</div>
          {Object.entries(byServiceCA).map(([nom,v]) => (
            <div key={nom} className="flex-between mb8"><span style={{fontSize:13}}>{nom}</span><span style={{fontWeight:600}}>{fmt(v)}</span></div>
          ))}
          {totalReduc>0 && <><div className="divider" /><div className="flex-between"><span style={{fontSize:13,color:"var(--red)"}}>Total réductions</span><span style={{color:"var(--red)",fontWeight:600}}>-{fmt(totalReduc)}</span></div></>}
          {offerts.length>0 && (
            <>
              <div className="divider" />
              <div className="card-title mb8">🎁 Offerts ({offerts.length})</div>

              <div style={{fontSize:11,fontWeight:700,color:"var(--gold)",textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>📢 Messages de NexaServe</div>
              {adminNotifs.map(n => (
                <div key={n.id} onClick={() => markAdminOne(n.id)} style={{background:typeBg[n.type]||typeBg.info,border:`1px solid ${typeBorder[n.type]||typeBorder.info}`,borderRadius:"var(--r2)",padding:"12px 14px",marginBottom:8,cursor:"pointer",opacity:n.lu?0.7:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                    <span style={{fontSize:16}}>{typeIcon[n.type]||"ℹ️"}</span>
                    <span style={{fontWeight:700,fontSize:14,flex:1}}>{n.titre}</span>
                    {!n.lu && <div style={{width:8,height:8,borderRadius:"50%",background:"var(--gold)",flexShrink:0}} />}
                  </div>
                  <div style={{fontSize:13,color:"var(--t2)",paddingLeft:24}}>{n.message}</div>
                  <div style={{fontSize:11,color:"var(--t3)",paddingLeft:24,marginTop:4}}>{timeAgo(n.createdAt)}</div>
                </div>
              ))}
              {notifs.length > 0 && <div style={{height:1,background:"var(--border)",margin:"12px 0"}} />}
            </div>
          )}

          {/* Notifications internes de l'app */}
          {notifs.length === 0 && adminNotifs.length === 0 && (
            <div className="empty" style={{padding:"48px 20px"}}><div className="empty-icon">🔔</div><div className="empty-text">Aucune notification</div></div>
          )}
          {notifs.map(n => {
            // Le label de la table est embarqué dans n.msg (ex: "🔔 Commande prête · Table A2")
            // On essaie quand même de retrouver la table pour afficher son nom en sous-titre si dispo
            const table = S.myTables.find(t => t.id===n.tableId);
            const tableLabel = table
              ? (table.isTakeaway ? "EM-"+String(table.emNum||0).padStart(3,"0") : "Table "+table.numero)
              : null;
            return (
              <div key={n.id} className={`notif-item${!n.read?" unread":""}`} onClick={() => markOne(n.id)}>
                {!n.read && <div className="notif-dot" />}
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:600}}>{n.msg}</div>
                  <div style={{fontSize:12,color:"var(--t3)",marginTop:2}}>
                    {tableLabel && <span>{tableLabel} · </span>}{timeAgo(n.ts)}
                  </div>
                </div>
              </div>
            );
          })}
        </>
      );
    }

    // ===================== ROOT =====================
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
  <!-- PWA : Service Worker + Bannière installation -->
  <script>
    // Enregistrer le Service Worker avec détection de mise à jour automatique
    const APP_VERSION = "2.1.0-202605102244";
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', async () => {
        try {
          const reg = await navigator.serviceWorker.register('/sw.js');
          // Vérifier les mises à jour immédiatement puis toutes les 60s
          reg.update();
          setInterval(() => reg.update(), 60000);
          // Quand un nouveau SW est installé et attend → recharger automatiquement
          reg.addEventListener('updatefound', () => {
            const newWorker = reg.installing;
            if (!newWorker) return;
            newWorker.addEventListener('statechange', () => {
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                // Nouveau SW prêt → forcer le rechargement
                newWorker.postMessage({ type: 'SKIP_WAITING' });
              }
            });
          });
          // Recharger la page quand le SW prend le contrôle
          navigator.serviceWorker.addEventListener('controllerchange', () => {
            window.location.reload();
          });
        } catch(e) {}
      });
    }

    // Bannière d'installation personnalisée
    let deferredPrompt = null;

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;

      // Afficher la bannière après 10 secondes — laisser l'utilisateur voir l'app d'abord
      setTimeout(() => {
        if (!deferredPrompt) return;
        const banner = document.getElementById('pwa-banner');
        if (banner) banner.style.display = 'flex';
      }, 10000);
    });

    window.addEventListener('appinstalled', () => {
      deferredPrompt = null;
      const banner = document.getElementById('pwa-banner');
      if (banner) banner.style.display = 'none';
    });

    function installPWA() {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(() => {
        deferredPrompt = null;
        const banner = document.getElementById('pwa-banner');
        if (banner) banner.style.display = 'none';
      });
    }

    function dismissPWA() {
      const banner = document.getElementById('pwa-banner');
      if (banner) banner.style.display = 'none';
      deferredPrompt = null;
    }
  </script>

  <!-- Bannière installation PWA -->
  <div id="pwa-banner" style="
    display: none;
    position: fixed;
    top: 16px;
    left: 12px;
    right: 12px;
    background: #1e1e3a;
    border: 1px solid #C9A84C;
    border-radius: 16px;
    padding: 14px 16px;
    z-index: 99999;
    align-items: center;
    gap: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  ">
    <img src="/icon-192.png" style="width:44px;height:44px;border-radius:10px;flex-shrink:0;" alt="Nexaserve">
    <div style="flex:1;min-width:0;">
      <div style="font-family:Outfit,sans-serif;font-weight:700;font-size:14px;color:#fff;">Installer Nexaserve</div>
      <div style="font-size:12px;color:#aaa;margin-top:2px;">Accès rapide depuis votre écran d'accueil</div>
    </div>
    <button onclick="installPWA()" style="
      background:#C9A84C;color:#000;border:none;border-radius:10px;
      padding:8px 14px;font-weight:700;font-size:13px;cursor:pointer;flex-shrink:0;
    ">Installer</button>
    <button onclick="dismissPWA()" style="
      background:none;border:none;color:#888;font-size:20px;cursor:pointer;
      padding:0 4px;flex-shrink:0;line-height:1;
    ">✕</button>
  </div>

</body>
