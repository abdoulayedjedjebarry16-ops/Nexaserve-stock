const sb = {
  headers: { "Content-Type":"application/json", "apikey":SB_KEY, "Authorization":"Bearer "+SB_KEY },
  async get(table, params="") {
    const r = await fetch(`${SB_URL}/rest/v1/${table}?${params}`, { headers: this.headers });
    if(!r.ok) throw new Error(await r.text());
    return r.json();
  },
  async post(table, body) {
    const r = await fetch(`${SB_URL}/rest/v1/${table}`, {
      method:"POST", headers:{...this.headers,"Prefer":"return=representation"}, body:JSON.stringify(body)
    });
    if(!r.ok) throw new Error(await r.text());
    return r.json();
  },
  async patch(table, id, body) {
    const r = await fetch(`${SB_URL}/rest/v1/${table}?id=eq.${id}`, {
      method:"PATCH", headers:{...this.headers,"Prefer":"return=representation"}, body:JSON.stringify(body)
    });
    if(!r.ok) throw new Error(await r.text());
    return r.json();
  },
  async delete(table, id) {
    const r = await fetch(`${SB_URL}/rest/v1/${table}?id=eq.${id}`, {
      method:"DELETE", headers: this.headers
    });
    if(!r.ok) throw new Error(await r.text());
    return true;
  },
  async upsert(table, body, onConflict) {
    const r = await fetch(`${SB_URL}/rest/v1/${table}?on_conflict=${onConflict}`, {
      method:"POST", headers:{...this.headers,"Prefer":"return=representation,resolution=merge-duplicates"}, body:JSON.stringify(body)
    });
    if(!r.ok) throw new Error(await r.text());
    return r.json();
  }
};

const fmtMois  = m  => { try { const [y,mo]=m.split("-"); return new Date(+y,+mo-1,1).toLocaleDateString("fr-FR",{month:"long",year:"numeric"}); } catch(e){return m;} };

  { id:"entree",    label:"Entrée",       icon:"↓", color:"#22c55e", bg:"rgba(34,197,94,.15)"  },

  present:{ label:"Présent",color:"#22c55e",bg:"rgba(34,197,94,.2)", border:"rgba(34,197,94,.3)", icon:"✓" },
  absent: { label:"Absent", color:"#ef4444",bg:"rgba(239,68,68,.2)", border:"rgba(239,68,68,.3)", icon:"✗" },
  retard: { label:"Retard", color:"#F97316",bg:"rgba(249,115,22,.2)",border:"rgba(249,115,22,.3)",icon:"⏰" },
};
const CYCLE = ["present","absent","retard"];
const joursInMonth = mois => { const [y,m]=mois.split("-").map(Number); return new Date(y,m,0).getDate(); };
const calcPaie = (emp, presences, avances, mois) => {
  const total    = joursInMonth(mois);
  const trav     = presences.filter(p=>p.employee_id===emp.id&&p.date.startsWith(mois)&&p.statut==="present").length;
  const retards  = presences.filter(p=>p.employee_id===emp.id&&p.date.startsWith(mois)&&p.statut==="retard").length;
  const abs      = presences.filter(p=>p.employee_id===emp.id&&p.date.startsWith(mois)&&p.statut==="absent").length;
  const joursPayes = trav + retards;
  const ded      = Math.round(((total - joursPayes) * emp.salaire_base / total));
  const avTot    = avances.filter(a=>a.employee_id===emp.id&&a.date.startsWith(mois)).reduce((s,a)=>s+(+a.montant),0);
  return { brut:+emp.salaire_base, deduction:ded, avances:avTot,
           net:Math.max(0,+emp.salaire_base-ded-avTot),
           trav, retards, abs, joursPayes, total };
};

  const [fpA,     setFpA]     = useState("");          // réponse saisie
  const [fpNew,   setFpNew]   = useState("");
  const [fpNew2,  setFpNew2]  = useState("");
  const [fpEmp,   setFpEmp]   = useState(null);        // employé trouvé
  const [fpResto, setFpResto] = useState(null);
  const [fpStep,  setFpStep]  = useState(1);           // 1=identif, 2=question, 3=nouveau mdp

  // États "code oublié"
  const [fcCode,  setFcCode]  = useState("");
  const [fcQ,     setFcQ]     = useState("");
  const [fcA,     setFcA]     = useState("");
  const [fcResto, setFcResto] = useState(null);
  const [fcStep,  setFcStep]  = useState(1);           // 1=email, 2=question, 3=afficher code

  const err  = t => setMsg({type:"error",   text:t});
  const succ = t => setMsg({type:"success", text:t});
  const clr  = ()=> setMsg({type:"",text:""});

  // ── CONNEXION ──────────────────────────────────────────────────
  const submitLogin = async () => {
    if(!code||!login||!pass){ err("Veuillez remplir tous les champs."); return; }
    setLoading(true); clr();
    try {
      const restos = await sb.get("restaurants",
        `code=eq.${encodeURIComponent(code.toUpperCase())}&select=id,code,nom,plan,statut_abo,date_expiration`);
      if(!restos?.length){ err("Code restaurant introuvable."); setLoading(false); return; }
      const resto = restos[0];

      // Vérif abonnement (même logique que nexaserveapp)
      const statut = resto.statut_abo || "essai";
      const dateExp = resto.date_expiration ? new Date(resto.date_expiration) : null;
      if(statut==="suspendu"){ err("Ce compte est suspendu. Contactez NexaServe au +224 620 764 405."); setLoading(false); return; }
      if(statut==="expire"){ err("Abonnement expiré. Contactez NexaServe pour renouveler."); setLoading(false); return; }
      if(dateExp && dateExp < new Date()){
        err(statut==="essai"
          ? "Votre période d'essai est terminée. Contactez NexaServe au +224 620 764 405."
          : "Abonnement expiré. Contactez NexaServe pour renouveler au +224 620 764 405.");
        setLoading(false); return;
      }

      const empRows = await sb.get("employees",
        `restaurant_id=eq.${encodeURIComponent(resto.id)}&login=eq.${encodeURIComponent(login.toLowerCase().trim())}&select=id,prenom,nom,login,password_hash,is_admin,is_super_admin,actif,role`);
      if(!empRows?.length){ err("Identifiant introuvable pour ce restaurant."); setLoading(false); return; }
      const emp = empRows[0];
      if(!emp.is_admin && !emp.is_super_admin){ err("Accès refusé. Seuls les administrateurs peuvent accéder au module Stock."); setLoading(false); return; }
      if(!emp.actif){ err("Ce compte est désactivé."); setLoading(false); return; }
      if(emp.password_hash !== pass){ err("Mot de passe incorrect."); setLoading(false); return; }

      const session = {
        id:resto.id, code:resto.code, restaurant:resto.nom,
        plan:resto.plan||"essai", statut:resto.statut_abo, expiration:resto.date_expiration,
        admin:{id:emp.id, prenom:emp.prenom, nom:emp.nom, role:emp.role, is_super_admin:emp.is_super_admin}
      };
      localStorage.setItem("nxs_session", JSON.stringify(session));
      onLogin(session);
    } catch(e) { err("Erreur de connexion. Vérifiez votre connexion internet."); }
    setLoading(false);
  };

  // ── MOT DE PASSE OUBLIÉ ────────────────────────────────────────
  const fpFind = async () => {
    if(!fpCode||!fpLogin){ err("Code restaurant et identifiant requis."); return; }
    setLoading(true); clr();
    try {
      const restos = await sb.get("restaurants",
        `code=eq.${encodeURIComponent(fpCode.toUpperCase())}&select=id,nom,secret_question`);
      if(!restos?.length){ err("Code restaurant introuvable."); setLoading(false); return; }
      const resto = restos[0];
      const empRows = await sb.get("employees",
        `restaurant_id=eq.${encodeURIComponent(resto.id)}&login=eq.${encodeURIComponent(fpLogin.toLowerCase().trim())}&select=id,prenom,nom,password_hash,is_admin,is_super_admin,actif`);
      if(!empRows?.length){ err("Identifiant introuvable."); setLoading(false); return; }
      const emp = empRows[0];
      if(!emp.is_admin && !emp.is_super_admin){ err("Seuls les administrateurs peuvent réinitialiser leur mot de passe ici."); setLoading(false); return; }
      setFpEmp(emp); setFpResto(resto);
      setFpQ(resto.secret_question || "Question secrète non configurée.");
      setFpStep(2);
    } catch(e){ err("Erreur réseau."); }
    setLoading(false);
  };

  const fpVerifyAnswer = async () => {
    if(!fpA){ err("Veuillez répondre à la question secrète."); return; }
    setLoading(true); clr();
    try {
      const rows = await sb.get("restaurants",
        `id=eq.${encodeURIComponent(fpResto.id)}&select=secret_answer`);
      const correctAnswer = rows?.[0]?.secret_answer || "";
      if(fpA.toLowerCase().trim() !== correctAnswer.toLowerCase().trim()){
        err("Réponse incorrecte."); setLoading(false); return;
      }
      setFpStep(3);
    } catch(e){ err("Erreur réseau."); }
    setLoading(false);
  };

  const fpReset = async () => {
    if(!fpNew || fpNew !== fpNew2){ err("Les mots de passe ne correspondent pas."); return; }
    if(fpNew.length < 4){ err("Mot de passe trop court (minimum 4 caractères)."); return; }
    setLoading(true); clr();
    try {
      await sb.patch("employees", fpEmp.id, {password_hash: fpNew});
      succ("Mot de passe réinitialisé avec succès !");
      setTimeout(()=>{ setStep("login"); setFpStep(1); setFpCode(""); setFpLogin(""); setFpA(""); setFpNew(""); setFpNew2(""); clr(); }, 2000);
    } catch(e){ err("Erreur lors de la réinitialisation."); }
    setLoading(false);
  };

  // ── CODE OUBLIÉ ────────────────────────────────────────────────
  const fcFind = async () => {
    if(!fcCode){ err("Veuillez saisir votre email ou nom du restaurant."); return; }
    setLoading(true); clr();
    try {
      // On cherche par email du restaurant ou par nom
      let restos = await sb.get("restaurants", `email=eq.${encodeURIComponent(fcCode)}&select=id,nom,code,secret_question`);
      if(!restos?.length) restos = await sb.get("restaurants", `nom=ilike.${encodeURIComponent("%"+fcCode+"%")}&select=id,nom,code,secret_question&limit=1`);
      if(!restos?.length){ err("Aucun restaurant trouvé avec ces informations."); setLoading(false); return; }
      const resto = restos[0];
      setFcResto(resto);
      setFcQ(resto.secret_question || "Question secrète non configurée.");
      setFcStep(2);
    } catch(e){ err("Erreur réseau."); }
    setLoading(false);
  };

  const fcVerify = async () => {
    if(!fcA){ err("Veuillez répondre à la question secrète."); return; }
    setLoading(true); clr();
    try {
      const rows = await sb.get("restaurants", `id=eq.${encodeURIComponent(fcResto.id)}&select=secret_answer`);
      const correctAnswer = rows?.[0]?.secret_answer || "";
      if(fcA.toLowerCase().trim() !== correctAnswer.toLowerCase().trim()){
        err("Réponse incorrecte."); setLoading(false); return;
      }
      setFcStep(3);
    } catch(e){ err("Erreur réseau."); }
    setLoading(false);
  };

  // ── RENDU ──────────────────────────────────────────────────────
  const renderMsg = () => msg.text ? (
    <div className={msg.type==="error"?"nxs-error":"nxs-success"}>
      {msg.type==="error"?"⚠️ ":"✓ "}{msg.text}
    </div>
  ) : null;

  return (
    <>
      <style>{NXS_CSS}</style>
      <div className="nxs-auth">
        {/* Logo */}
        <div className="nxs-logo">
          <h1>NexaServe</h1>
          <p>Gestion du stock</p>
        </div>

        {/* ── CONNEXION ── */}
        {step==="login" && (
          <div className="nxs-card">
            <h2 className="nxs-card-title">Connexion</h2>
            <p className="nxs-card-sub">Saisissez votre code restaurant et vos identifiants</p>
            {renderMsg()}
            <NxsField label="Code restaurant">
              <input className="nxs-inp" value={code}
                onChange={e=>{setCode(e.target.value.toUpperCase());clr();}}
                onKeyDown={e=>e.key==="Enter"&&submitLogin()}
                placeholder="NXS-XXXX"
                style={{letterSpacing:"0.1em",fontWeight:600}}/>
            </NxsField>
            <NxsField label="Email ou identifiant">
              <input className="nxs-inp" value={login}
                onChange={e=>{setLogin(e.target.value);clr();}}
                onKeyDown={e=>e.key==="Enter"&&submitLogin()}
                placeholder="prenom.nom ou email"
                autoCapitalize="none" autoCorrect="off"/>
            </NxsField>
            <NxsField label="Mot de passe">
              <div className="nxs-inp-wrap">
                <input className="nxs-inp nxs-inp-pr" type={showP?"text":"password"} value={pass}
                  onChange={e=>{setPass(e.target.value);clr();}}
                  onKeyDown={e=>e.key==="Enter"&&submitLogin()}
                  placeholder="••••••••"/>
                <button className="nxs-inp-eye" onClick={()=>setShowP(s=>!s)} type="button">
                  {showP?"🙈":"👁️"}
                </button>
              </div>
            </NxsField>
            <button className="nxs-btn" onClick={submitLogin} disabled={loading}>
              {loading?"Connexion en cours...":"Se connecter"}
            </button>
            <div className="nxs-links">
              <button className="nxs-link" onClick={()=>{setStep("forgot_pass");setFpStep(1);clr();}}>Mot de passe oublié ?</button>
              <span className="nxs-sep">·</span>
              <button className="nxs-link" onClick={()=>{setStep("forgot_code");setFcStep(1);clr();}}>Code oublié ?</button>
            </div>
          </div>
        )}

        {/* ── MOT DE PASSE OUBLIÉ ── */}
        {step==="forgot_pass" && (
          <div className="nxs-card">
            <button className="nxs-back" onClick={()=>{setStep("login");clr();}}>← Retour</button>
            <h2 className="nxs-card-title">Mot de passe oublié</h2>
            {renderMsg()}

            {fpStep===1 && <>
              <p className="nxs-card-sub">Saisissez votre code restaurant et votre identifiant administrateur.</p>
              <NxsField label="Code restaurant">
                <input className="nxs-inp" value={fpCode} onChange={e=>{setFpCode(e.target.value.toUpperCase());clr();}} placeholder="NXS-XXXX" style={{letterSpacing:"0.1em",fontWeight:600}}/>
              </NxsField>
              <NxsField label="Identifiant (login)">
                <input className="nxs-inp" value={fpLogin} onChange={e=>{setFpLogin(e.target.value);clr();}} placeholder="prenom.nom" autoCapitalize="none"/>
              </NxsField>
              <button className="nxs-btn" onClick={fpFind} disabled={loading}>{loading?"Recherche...":"Continuer"}</button>
            </>}

            {fpStep===2 && <>
              <div className="nxs-info">📋 Question secrète de <strong>{fpResto?.nom}</strong> :</div>
              <NxsField label="Question secrète">
                <input className="nxs-inp" value={fpQ} readOnly style={{color:"#F5A623",fontWeight:600}}/>
              </NxsField>
              <NxsField label="Votre réponse">
                <input className="nxs-inp" value={fpA} onChange={e=>{setFpA(e.target.value);clr();}} placeholder="Votre réponse..." autoCapitalize="none"/>
              </NxsField>
              <button className="nxs-btn" onClick={fpVerifyAnswer} disabled={loading}>{loading?"Vérification...":"Vérifier"}</button>
            </>}

            {fpStep===3 && <>
              <p className="nxs-card-sub">Choisissez un nouveau mot de passe pour <strong style={{color:"#F5A623"}}>{fpEmp?.prenom} {fpEmp?.nom}</strong>.</p>
              <NxsField label="Nouveau mot de passe">
                <input className="nxs-inp" type="password" value={fpNew} onChange={e=>{setFpNew(e.target.value);clr();}} placeholder="••••••••"/>
              </NxsField>
              <NxsField label="Confirmer le mot de passe">
                <input className="nxs-inp" type="password" value={fpNew2} onChange={e=>{setFpNew2(e.target.value);clr();}} placeholder="••••••••"/>
              </NxsField>
              <button className="nxs-btn" onClick={fpReset} disabled={loading}>{loading?"Réinitialisation...":"Enregistrer"}</button>
            </>}
          </div>
        )}

        {/* ── CODE OUBLIÉ ── */}
        {step==="forgot_code" && (
          <div className="nxs-card">
            <button className="nxs-back" onClick={()=>{setStep("login");clr();}}>← Retour</button>
            <h2 className="nxs-card-title">Code oublié ?</h2>
            {renderMsg()}

            {fcStep===1 && <>
              <p className="nxs-card-sub">Saisissez l'email ou le nom de votre restaurant pour retrouver votre code.</p>
              <NxsField label="Email ou nom du restaurant">
                <input className="nxs-inp" value={fcCode} onChange={e=>{setFcCode(e.target.value);clr();}} placeholder="email@restaurant.com ou Mon Restaurant" autoCapitalize="none"/>
              </NxsField>
              <button className="nxs-btn" onClick={fcFind} disabled={loading}>{loading?"Recherche...":"Continuer"}</button>
            </>}

            {fcStep===2 && <>
              <div className="nxs-info">📋 Restaurant trouvé : <strong>{fcResto?.nom}</strong>. Répondez à la question secrète pour confirmer votre identité.</div>
              <NxsField label="Question secrète">
                <input className="nxs-inp" value={fcQ} readOnly style={{color:"#F5A623",fontWeight:600}}/>
              </NxsField>
              <NxsField label="Votre réponse">
                <input className="nxs-inp" value={fcA} onChange={e=>{setFcA(e.target.value);clr();}} placeholder="Votre réponse..." autoCapitalize="none"/>
              </NxsField>
              <button className="nxs-btn" onClick={fcVerify} disabled={loading}>{loading?"Vérification...":"Vérifier"}</button>
            </>}

            {fcStep===3 && <>
              <div style={{textAlign:"center",padding:"16px 0 20px"}}>
                <div style={{fontSize:12,color:"#5A6170",marginBottom:10,textTransform:"uppercase",letterSpacing:"0.05em"}}>Votre code restaurant</div>
                <div style={{fontSize:32,fontWeight:900,color:"#F5A623",letterSpacing:"0.15em",fontFamily:"'Outfit',sans-serif"}}>{fcResto?.code}</div>
                <div style={{fontSize:13,color:"#9CA3B0",marginTop:8}}>{fcResto?.nom}</div>
              </div>
              <button className="nxs-btn" onClick={()=>{setStep("login");setCode(fcResto?.code||"");setFcStep(1);setFcCode("");setFcA("");clr();}}>
                Se connecter avec ce code
              </button>
            </>}
          </div>
        )}

        <div className="nxs-footer">© 2026 NexaServe · Gestion du stock</div>
      </div>
    </>
  );
}

// STOCK — DASHBOARD
// ═══════════════════════════════════════════════════════════════════
function StockDashboard({articles,mouvements,employes}) {
  const ok    = articles.filter(a=>getStatus(a)==="ok").length;
  const faible= articles.filter(a=>getStatus(a)==="faible").length;
  const epuise= articles.filter(a=>getStatus(a)==="epuise").length;
  const valeur= articles.reduce((s,a)=>s+(+a.quantite_actuelle)*(+a.prix_unitaire),0);
  const alertes=articles.filter(a=>getStatus(a)!=="ok");
  const recent=[...mouvements].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)).slice(0,5);
  return(
    <div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:22}}>
        {[{l:"Stock OK",v:ok,c:"#22c55e",bg:"rgba(34,197,94,.1)"},{l:"Stock faible",v:faible,c:"#F97316",bg:"rgba(249,115,22,.1)"},{l:"Épuisé",v:epuise,c:"#ef4444",bg:"rgba(239,68,68,.1)"},{l:"Valeur totale",v:fmt(valeur),c:"#60a5fa",bg:"rgba(96,165,250,.1)"}].map((k,i)=>(
          <div key={i} style={{background:k.bg,border:`1px solid ${k.c}33`,borderRadius:16,padding:"16px 14px"}}>
            <div style={{fontSize:10,color:"#666",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:8}}>{k.l}</div>
            <div style={{fontSize:typeof k.v==="string"&&k.v.length>10?13:24,fontWeight:800,color:k.c,lineHeight:1.2}}>{k.v}</div>
          </div>
        ))}
      </div>
      {alertes.length>0&&<>
        <div style={{fontSize:13,fontWeight:700,color:"#fff",marginBottom:10}}>⚠️ Alertes ({alertes.length})</div>
        <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:22}}>
          {alertes.map(a=>{const sc=SC[getStatus(a)];return(<Card key={a.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 14px"}}>
            <div><div style={{fontWeight:600,color:"#fff",fontSize:14}}>{a.nom}</div><div style={{fontSize:11,color:"#555",marginTop:2}}>{a.quantite_actuelle} {a.unite}</div></div>
            <Badge color={sc.color} bg={sc.bg}>{sc.label}</Badge>
          </Card>);})}
        </div>
      </>}
      <div style={{fontSize:13,fontWeight:700,color:"#fff",marginBottom:10}}>Derniers mouvements</div>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {recent.map(m=>{
          const art=articles.find(a=>a.id===m.article_id);
          const emp=employes.find(e=>e.id===m.employee_id);
          const tc=TYPES_MVT.find(t=>t.id===m.type);
          const nomEmp = emp?(emp.prenom?emp.prenom+" "+emp.nom:emp.nom):"—";
          return(<div key={m.id} style={{background:"rgba(255,255,255,.04)",borderRadius:12,padding:"12px 14px",display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:36,height:36,borderRadius:10,background:tc?.bg,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:15}}>{tc?.icon}</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:600,color:"#fff",fontSize:13,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{art?.nom||"—"}</div>
              <div style={{fontSize:11,color:"#555",marginTop:2}}>{nomEmp} · {fmtDate(m.created_at)}</div>
            </div>
            <div style={{fontWeight:700,color:tc?.color,fontSize:14,flexShrink:0}}>{m.type==="entree"?"+":"-"}{m.quantite}</div>
          </div>);
        })}
        {recent.length===0&&<div style={{textAlign:"center",padding:"30px 0",color:"#444",fontSize:13}}>Aucun mouvement pour l'instant</div>}
      </div>
    </div>
  );
}

// STOCK — ARTICLES
// ═══════════════════════════════════════════════════════════════════
function StockArticles({articles,setArticles,restaurantId}) {
  const [search,setSearch]=useState("");
  const [modal,setModal]=useState(null);
  const [form,setForm]=useState({});
  const [del,setDel]=useState(null);
  const [saving,setSaving]=useState(false);

  const filtered=articles.filter(a=>a.nom.toLowerCase().includes(search.toLowerCase())||a.categorie.toLowerCase().includes(search.toLowerCase()));

  const openCreate=()=>{setForm({nom:"",categorie:"",unite:"",quantite_actuelle:"",quantite_initiale:"",seuil_alerte:"",prix_unitaire:""});setModal("create");};
  const openEdit=a=>{setForm({...a,quantite_actuelle:String(a.quantite_actuelle),quantite_initiale:String(a.quantite_initiale),seuil_alerte:String(a.seuil_alerte),prix_unitaire:String(a.prix_unitaire)});setModal(a);};

  const save=async()=>{
    if(!form.nom)return;
    setSaving(true);
    try {
      const body={nom:form.nom,categorie:form.categorie||"Autre",unite:form.unite||"unité",quantite_actuelle:+form.quantite_actuelle||0,quantite_initiale:+form.quantite_initiale||0,seuil_alerte:+form.seuil_alerte||0,prix_unitaire:+form.prix_unitaire||0,restaurant_id:restaurantId};
      if(modal==="create"){
        const res=await sb.post("stock_articles",body);
        setArticles(p=>[...p,...res]);
      } else {
        const res=await sb.patch("stock_articles",modal.id,body);
        setArticles(p=>p.map(a=>a.id===modal.id?(res[0]||{...a,...body}):a));
      }
      setModal(null);
    } catch(e){alert("Erreur : "+e.message);}
    setSaving(false);
  };

  const doDelete=async(id)=>{
    try { await sb.delete("stock_articles",id); setArticles(p=>p.filter(a=>a.id!==id)); setDel(null); } catch(e){alert("Erreur : "+e.message);}
  };

  return(<div>

    </div>
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      {filtered.map(a=>{const sc=SC[getStatus(a)];const pct=Math.min(100,(+a.quantite_actuelle/(+a.quantite_initiale||1))*100);return(<Card key={a.id}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
          <div><div style={{fontWeight:700,color:"#fff",fontSize:14}}>{a.nom}</div><div style={{fontSize:11,color:"#555",marginTop:2}}>{a.categorie} · {a.unite}</div></div>
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            <Badge color={sc.color} bg={sc.bg}>{sc.label}</Badge>
            <button onClick={()=>openEdit(a)} style={{background:"rgba(255,255,255,.06)",border:"none",borderRadius:7,padding:"5px 8px",cursor:"pointer",color:"#aaa",fontSize:12}}>✏️</button>
            <button onClick={()=>setDel(a)} style={{background:"rgba(239,68,68,.1)",border:"none",borderRadius:7,padding:"5px 8px",cursor:"pointer",color:"#ef4444",fontSize:12}}>🗑</button>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{flex:1,height:4,background:"rgba(255,255,255,.08)",borderRadius:2}}><div style={{width:`${pct}%`,height:"100%",background:sc.color,borderRadius:2}}/></div>
          <div style={{fontSize:12,fontWeight:700,color:"#ccc",minWidth:55,textAlign:"right"}}>{a.quantite_actuelle}/{a.quantite_initiale}</div>
          <div style={{fontSize:11,color:"#F97316",fontWeight:600,minWidth:70,textAlign:"right"}}>{fmt(a.prix_unitaire)}</div>
        </div>
      </Card>);})}
      {filtered.length===0&&!search&&<div style={{textAlign:"center",padding:"30px 0",color:"#444",fontSize:13}}>Aucun article · Cliquez + Ajouter</div>}
    </div>
    {modal&&<Modal title={modal==="create"?"Nouvel article":"Modifier l'article"} onClose={()=>setModal(null)}>
      <Field label="Nom"><Inp value={form.nom} onChange={e=>setForm(f=>({...f,nom:e.target.value}))} placeholder="Ex: Poulet entier"/></Field>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <Field label="Catégorie (libre)"><Inp value={form.categorie} onChange={e=>setForm(f=>({...f,categorie:e.target.value}))} placeholder="Ex: Viandes"/></Field>
        <Field label="Unité (libre)"><Inp value={form.unite} onChange={e=>setForm(f=>({...f,unite:e.target.value}))} placeholder="Ex: kg, L, unité"/></Field>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <Field label="Qté actuelle"><Inp type="number" value={form.quantite_actuelle} onChange={e=>setForm(f=>({...f,quantite_actuelle:e.target.value}))}/></Field>
        <Field label="Qté initiale"><Inp type="number" value={form.quantite_initiale} onChange={e=>setForm(f=>({...f,quantite_initiale:e.target.value}))}/></Field>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <Field label="Seuil alerte"><Inp type="number" value={form.seuil_alerte} onChange={e=>setForm(f=>({...f,seuil_alerte:e.target.value}))}/></Field>
        <Field label="Prix unit. (GNF)"><Inp type="number" value={form.prix_unitaire} onChange={e=>setForm(f=>({...f,prix_unitaire:e.target.value}))}/></Field>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:6}}><Ghost onClick={()=>setModal(null)}>Annuler</Ghost><Btn onClick={save} disabled={saving}>{saving?"⏳ Enregistrement...":"Enregistrer"}</Btn></div>
    </Modal>}
    {del&&<Modal title="Supprimer l'article" onClose={()=>setDel(null)}>
      <p style={{color:"#bbb",fontSize:14,marginBottom:20}}>Supprimer <strong style={{color:"#fff"}}>{del.nom}</strong> ?</p>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}><Ghost onClick={()=>setDel(null)}>Annuler</Ghost><Btn bg="linear-gradient(135deg,#ef4444,#dc2626)" onClick={()=>doDelete(del.id)}>Supprimer</Btn></div>
    </Modal>}
  </div>);
}

// ═══════════════════════════════════════════════════════════════════
// STOCK — MOUVEMENTS
// ═══════════════════════════════════════════════════════════════════
function StockMouvements({articles,setArticles,fournisseurs,employes,setMouvements,restaurantId}) {
  const [type,setType]=useState("entree");
  const [form,setForm]=useState({article_id:"",quantite:"",motif:"",employee_id:"",fournisseur_id:"",prix:""});
  const [ok,setOk]=useState(false);
  const [saving,setSaving]=useState(false);
  const art=articles.find(a=>a.id===form.article_id);
  const isEntree=type==="entree";
  const isDelta=["sortie","perte","abime"].includes(type);

  const submit=async()=>{
    if(!form.article_id||!form.quantite||!form.employee_id)return;
    const qty=+form.quantite;
    if(isDelta&&art&&qty>+art.quantite_actuelle){alert("Quantité insuffisante");return;}
    setSaving(true);
    try {
      // Seul entree/sortie dans la table (contrainte check). On stocke perte/abime/correction comme sortie avec motif
      const dbType = isEntree ? "entree" : "sortie";
      const fullMotif = type!=="entree"&&type!=="sortie" ? `[${type.toUpperCase()}] ${form.motif||"—"}` : (form.motif||"—");
      const body={article_id:form.article_id,type:dbType,quantite:qty,motif:fullMotif,employee_id:form.employee_id,fournisseur_id:form.fournisseur_id||null,prix_unitaire_mouvement:+form.prix||+art?.prix_unitaire||0,restaurant_id:restaurantId};
      const res=await sb.post("stock_movements",body);
      const newMvt = res[0] ? {...res[0], type} : {...body, id:uid(), type, created_at:new Date().toISOString()};
      setMouvements(p=>[newMvt,...p]);
      // Update quantite_actuelle
      const newQty = Math.max(0,+art.quantite_actuelle+(isEntree?qty:-qty));
      if(type!=="correction"){
        await sb.patch("stock_articles",form.article_id,{quantite_actuelle:newQty});
        setArticles(p=>p.map(a=>a.id===form.article_id?{...a,quantite_actuelle:newQty}:a));
      }
      setForm({article_id:"",quantite:"",motif:"",employee_id:"",fournisseur_id:"",prix:""});
      setOk(true); setTimeout(()=>setOk(false),2500);
    } catch(e){alert("Erreur : "+e.message);}
    setSaving(false);
  };

  return(<div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:20}}>
      {TYPES_MVT.map(t=>(
        <button key={t.id} onClick={()=>setType(t.id)} style={{padding:"11px 8px",borderRadius:12,border:type===t.id?"none":"1px solid rgba(255,255,255,.1)",background:type===t.id?t.bg:"rgba(255,255,255,.03)",color:type===t.id?t.color:"#555",fontWeight:type===t.id?700:500,fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6,boxShadow:type===t.id?`0 0 0 1px ${t.color}55`:"none"}}>
          {t.icon} {t.label}
        </button>
      ))}
    </div>
    {ok&&<div style={{background:"rgba(34,197,94,.12)",border:"1px solid rgba(34,197,94,.3)",borderRadius:12,padding:12,marginBottom:18,color:"#22c55e",fontWeight:600,fontSize:14,textAlign:"center"}}>✓ Mouvement enregistré !</div>}
    <Field label="Article"><Sel value={form.article_id} onChange={e=>setForm(f=>({...f,article_id:e.target.value}))}><option value="">Sélectionner un article</option>{articles.map(a=><option key={a.id} value={a.id}>{a.nom} ({a.quantite_actuelle} {a.unite})</option>)}</Sel></Field>
    {art&&isDelta&&<div style={{background:"rgba(249,115,22,.1)",border:"1px solid rgba(249,115,22,.25)",borderRadius:10,padding:"10px 12px",marginBottom:14,fontSize:13,color:"#F97316"}}>Disponible : <strong>{art.quantite_actuelle} {art.unite}</strong></div>}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
      <Field label="Quantité"><Inp type="number" value={form.quantite} onChange={e=>setForm(f=>({...f,quantite:e.target.value}))} placeholder="0"/></Field>
      <Field label="Prix unit. (GNF)"><Inp type="number" value={form.prix} onChange={e=>setForm(f=>({...f,prix:e.target.value}))} placeholder={art?.prix_unitaire||"0"}/></Field>
    </div>
    <Field label="Responsable">
      <Sel value={form.employee_id} onChange={e=>setForm(f=>({...f,employee_id:e.target.value}))}>
        <option value="">Sélectionner un employé</option>
        {employes.filter(e=>e.actif).map(e=><option key={e.id} value={e.id}>{e.prenom?e.prenom+" "+e.nom:e.nom}</option>)}
      </Sel>
    </Field>
    {isEntree&&<Field label="Fournisseur"><Sel value={form.fournisseur_id} onChange={e=>setForm(f=>({...f,fournisseur_id:e.target.value}))}><option value="">Aucun fournisseur</option>{fournisseurs.map(f=><option key={f.id} value={f.id}>{f.nom}</option>)}</Sel></Field>}
    <Field label="Motif"><Inp value={form.motif} onChange={e=>setForm(f=>({...f,motif:e.target.value}))} placeholder="Ex: Service midi, Livraison..."/></Field>
    <Btn onClick={submit} disabled={!form.article_id||!form.quantite||!form.employee_id||saving} bg={`linear-gradient(135deg,${TYPES_MVT.find(t=>t.id===type)?.color||"#F97316"},${TYPES_MVT.find(t=>t.id===type)?.color||"#ea580c"}aa)`}>
      {saving?"⏳ Enregistrement...":<>{TYPES_MVT.find(t=>t.id===type)?.icon} Valider — {TYPES_MVT.find(t=>t.id===type)?.label}</>}
    </Btn>
  </div>);
}

// STOCK — HISTORIQUE
// ═══════════════════════════════════════════════════════════════════
function StockHistorique({mouvements,articles,employes,fournisseurs}) {
  const [fType,setFType]=useState("tous");
  const [fArt,setFArt]=useState("");
  const [fEmp,setFEmp]=useState("");
  const [fDate,setFDate]=useState("");

  // Reconstituer le type visuel depuis le motif si [TYPE] préfixé
  const mvtAvecType = mouvements.map(m=>{
    let visType=m.type;
    const match=m.motif&&m.motif.match(/^\[(PERTE|ABIME|CORRECTION)\]/i);
    if(match) visType=match[1].toLowerCase()==="abime"?"abime":match[1].toLowerCase();
    return {...m,visType};
  });

  const filtered=useMemo(()=>[...mvtAvecType]
    .sort((a,b)=>new Date(b.created_at)-new Date(a.created_at))
    .filter(m=>{
      if(fType!=="tous"&&m.visType!==fType)return false;
      if(fArt&&m.article_id!==fArt)return false;
      if(fEmp&&m.employee_id!==fEmp)return false;
      if(fDate&&!m.created_at.startsWith(fDate))return false;
      return true;
    }),[mvtAvecType,fType,fArt,fEmp,fDate]);

  const has=fType!=="tous"||fArt||fEmp||fDate;

  return(<div>
    <div style={{background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.07)",borderRadius:14,padding:14,marginBottom:14}}>
      <div style={{fontSize:10,color:"#555",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:10}}>Filtres</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <Sel value={fType} onChange={e=>setFType(e.target.value)} style={{...ci,fontSize:12,padding:"8px 10px"}}>
          <option value="tous">Tous types</option>
          {TYPES_MVT.map(t=><option key={t.id} value={t.id}>{t.label}</option>)}
        </Sel>
        <Sel value={fArt} onChange={e=>setFArt(e.target.value)} style={{...ci,fontSize:12,padding:"8px 10px"}}><option value="">Tous articles</option>{articles.map(a=><option key={a.id} value={a.id}>{a.nom}</option>)}</Sel>
        <Sel value={fEmp} onChange={e=>setFEmp(e.target.value)} style={{...ci,fontSize:12,padding:"8px 10px"}}><option value="">Tous employés</option>{employes.map(e=><option key={e.id} value={e.id}>{e.prenom?e.prenom+" "+e.nom:e.nom}</option>)}</Sel>
        <Inp type="date" value={fDate} onChange={e=>setFDate(e.target.value)} style={{...ci,fontSize:12,padding:"8px 10px"}}/>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:10}}>
        {has?<button onClick={()=>{setFType("tous");setFArt("");setFEmp("");setFDate("");}} style={{background:"none",border:"none",color:"#F97316",fontSize:12,cursor:"pointer",fontWeight:600}}>✕ Effacer</button>:<span/>}
        <button onClick={()=>exportPDFStock(filtered,articles,employes,fournisseurs)} style={{background:"linear-gradient(135deg,#F97316,#ea580c)",border:"none",borderRadius:8,padding:"7px 14px",cursor:"pointer",color:"#fff",fontWeight:700,fontSize:12,display:"flex",alignItems:"center",gap:5}}>📄 Export PDF</button>
      </div>
    </div>
    <div style={{fontSize:12,color:"#555",marginBottom:10}}>{filtered.length} mouvement(s)</div>
    <div style={{display:"flex",flexDirection:"column",gap:8}}>
      {filtered.map(m=>{
        const art=articles.find(a=>a.id===m.article_id);
        const emp=employes.find(e=>e.id===m.employee_id);
        const four=fournisseurs.find(f=>f.id===m.fournisseur_id);
        const tc=TYPES_MVT.find(t=>t.id===m.visType)||TYPES_MVT.find(t=>t.id===m.type);
        const nomEmp=emp?(emp.prenom?emp.prenom+" "+emp.nom:emp.nom):"—";
        const motifClean=m.motif?m.motif.replace(/^\[(PERTE|ABIME|CORRECTION)\]\s*/i,""):m.motif;
        return(<Card key={m.id} style={{padding:"12px 14px"}}>
          <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
            <div style={{width:36,height:36,borderRadius:10,background:tc?.bg,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:16}}>{tc?.icon}</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
                <div>
                  <span style={{fontWeight:700,color:"#fff",fontSize:13}}>{art?.nom||"—"}</span>
                  <span style={{marginLeft:8,fontSize:10,fontWeight:700,color:tc?.color,background:tc?.bg,padding:"2px 7px",borderRadius:10}}>{tc?.label}</span>
                </div>
                <div style={{fontWeight:800,color:tc?.color,fontSize:14,flexShrink:0}}>{["entree","correction"].includes(m.visType)?"+":"-"}{m.quantite} {art?.unite}</div>
              </div>
              <div style={{fontSize:11,color:"#555"}}>{nomEmp} · {fmtDate(m.created_at)}</div>
              {four&&<div style={{fontSize:11,color:"#60a5fa",marginTop:2}}>🏭 {four.nom}</div>}
              {motifClean&&motifClean!=="—"&&<div style={{fontSize:11,color:"#777",marginTop:3,fontStyle:"italic"}}>« {motifClean} »</div>}
              <div style={{fontSize:11,color:"#F97316",marginTop:4,fontWeight:600}}>{fmt(m.quantite*m.prix_unitaire_mouvement)}</div>
            </div>
          </div>
        </Card>);
      })}
      {filtered.length===0&&<div style={{textAlign:"center",padding:"40px 0",color:"#444",fontSize:14}}>Aucun mouvement trouvé</div>}
    </div>
  </div>);
}

// STOCK — FOURNISSEURS
// ═══════════════════════════════════════════════════════════════════
function StockFournisseurs({fournisseurs,setFournisseurs,restaurantId}) {
  const [modal,setModal]=useState(null);
  const [form,setForm]=useState({nom:"",telephone:""});
  const [del,setDel]=useState(null);
  const [saving,setSaving]=useState(false);

  const openCreate=()=>{setForm({nom:"",telephone:""});setModal("create");};
  const openEdit=f=>{setForm({...f});setModal(f);};
  const save=async()=>{
    if(!form.nom)return;
    setSaving(true);
    try {
      const body={nom:form.nom,telephone:form.telephone||null,restaurant_id:restaurantId};
      if(modal==="create"){ const res=await sb.post("stock_fournisseurs",body); setFournisseurs(p=>[...p,...res]); }
      else { await sb.patch("stock_fournisseurs",modal.id,body); setFournisseurs(p=>p.map(f=>f.id===modal.id?{...f,...body}:f)); }
      setModal(null);
    } catch(e){alert("Erreur : "+e.message);}
    setSaving(false);
  };
  const doDelete=async(id)=>{
    try { await sb.delete("stock_fournisseurs",id); setFournisseurs(p=>p.filter(f=>f.id!==id)); setDel(null); } catch(e){alert("Erreur : "+e.message);}
  };

  return(<div>
    <button onClick={openCreate} style={{width:"100%",background:"rgba(249,115,22,.1)",border:"1px dashed rgba(249,115,22,.4)",borderRadius:14,padding:14,cursor:"pointer",color:"#F97316",fontWeight:700,fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginBottom:16}}>+ Ajouter un fournisseur</button>
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      {fournisseurs.map(f=>(<Card key={f.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"16px 14px"}}>
        <div><div style={{fontWeight:700,color:"#fff",fontSize:14}}>{f.nom}</div>{f.telephone&&<div style={{fontSize:12,color:"#666",marginTop:4}}>📞 {f.telephone}</div>}</div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>openEdit(f)} style={{background:"rgba(255,255,255,.06)",border:"none",borderRadius:8,padding:"6px 10px",cursor:"pointer",color:"#aaa",fontSize:12}}>✏️</button>
          <button onClick={()=>setDel(f)} style={{background:"rgba(239,68,68,.1)",border:"none",borderRadius:8,padding:"6px 10px",cursor:"pointer",color:"#ef4444",fontSize:12}}>🗑</button>
        </div>
      </Card>))}
      {fournisseurs.length===0&&<div style={{textAlign:"center",padding:"30px 0",color:"#444",fontSize:13}}>Aucun fournisseur</div>}
    </div>
    {modal&&<Modal title={modal==="create"?"Nouveau fournisseur":"Modifier"} onClose={()=>setModal(null)}>
      <Field label="Nom"><Inp value={form.nom} onChange={e=>setForm(f=>({...f,nom:e.target.value}))} placeholder="Ex: Marché Madina"/></Field>
      <Field label="Téléphone"><Inp value={form.telephone} onChange={e=>setForm(f=>({...f,telephone:e.target.value}))} placeholder="6XX XX XX XX" type="tel"/></Field>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:6}}><Ghost onClick={()=>setModal(null)}>Annuler</Ghost><Btn onClick={save} disabled={saving}>{saving?"⏳...":"Enregistrer"}</Btn></div>
    </Modal>}
    {del&&<Modal title="Supprimer" onClose={()=>setDel(null)}>
      <p style={{color:"#bbb",fontSize:14,marginBottom:20}}>Supprimer <strong style={{color:"#fff"}}>{del.nom}</strong> ?</p>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}><Ghost onClick={()=>setDel(null)}>Annuler</Ghost><Btn bg="linear-gradient(135deg,#ef4444,#dc2626)" onClick={()=>doDelete(del.id)}>Supprimer</Btn></div>
    </Modal>}
  </div>);
}

// RH — EMPLOYÉS
// ═══════════════════════════════════════════════════════════════════
function RhEmployes({employes,setEmployes,restaurantId}) {
  const [modal,setModal]=useState(null);
  const [form,setForm]=useState({prenom:"",nom:"",poste_rh:"",salaire_base:"",actif:true});
  const [del,setDel]=useState(null);
  const [saving,setSaving]=useState(false);

  const openCreate=()=>{setForm({prenom:"",nom:"",poste_rh:"",salaire_base:"",actif:true});setModal("create");};
  const openEdit=e=>{setForm({prenom:e.prenom||"",nom:e.nom,poste_rh:e.poste_rh||e.role||"",salaire_base:String(e.salaire_base||0),actif:e.actif});setModal(e);};

  const save=async()=>{
    if(!form.nom)return;
    setSaving(true);
    try {
      const body={prenom:form.prenom,nom:form.nom,poste_rh:form.poste_rh,salaire_base:+form.salaire_base||0,actif:form.actif,restaurant_id:restaurantId,login:form.prenom?form.prenom.toLowerCase()+"."+form.nom.toLowerCase():form.nom.toLowerCase(),password_hash:"1234",role:"serveur"};
      if(modal==="create"){ const res=await sb.post("employees",body); setEmployes(p=>[...p,...res]); }
      else { await sb.patch("employees",modal.id,{poste_rh:form.poste_rh,salaire_base:+form.salaire_base||0,actif:form.actif,prenom:form.prenom,nom:form.nom}); setEmployes(p=>p.map(e=>e.id===modal.id?{...e,...form,salaire_base:+form.salaire_base}:e)); }
      setModal(null);
    } catch(e){alert("Erreur : "+e.message);}
    setSaving(false);
  };

  const doDelete=async(id)=>{
    try { await sb.patch("employees",id,{actif:false}); setEmployes(p=>p.map(e=>e.id===id?{...e,actif:false}:e)); setDel(null); } catch(e){alert("Erreur : "+e.message);}
  };

  return(<div>
    <button onClick={openCreate} style={{width:"100%",background:"rgba(99,102,241,.1)",border:"1px dashed rgba(99,102,241,.4)",borderRadius:14,padding:14,cursor:"pointer",color:"#818cf8",fontWeight:700,fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginBottom:16}}>+ Ajouter un employé</button>
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      {employes.map(e=>{
        const nomComplet=e.prenom?e.prenom+" "+e.nom:e.nom;
        const poste=e.poste_rh||e.role||"";
        return(<Card key={e.id} style={{padding:"14px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div style={{display:"flex",gap:12,alignItems:"center"}}>
              <div style={{width:42,height:42,borderRadius:12,background:"rgba(99,102,241,.15)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>👤</div>
              <div>
                <div style={{fontWeight:700,color:"#fff",fontSize:14}}>{nomComplet}</div>
                <div style={{fontSize:11,color:"#666",marginTop:2}}>{poste}</div>
                <div style={{fontSize:12,color:"#F97316",fontWeight:600,marginTop:3}}>{fmt(e.salaire_base||0)}<span style={{color:"#555",fontWeight:400,fontSize:11}}>/mois</span></div>
              </div>
            </div>
            <div style={{display:"flex",gap:6,alignItems:"center",flexShrink:0}}>
              <Badge color={e.actif?"#22c55e":"#555"} bg={e.actif?"rgba(34,197,94,.12)":"rgba(255,255,255,.06)"}>{e.actif?"Actif":"Inactif"}</Badge>
              <button onClick={()=>openEdit(e)} style={{background:"rgba(255,255,255,.06)",border:"none",borderRadius:7,padding:"5px 8px",cursor:"pointer",color:"#aaa",fontSize:12}}>✏️</button>
              <button onClick={()=>setDel(e)} style={{background:"rgba(239,68,68,.1)",border:"none",borderRadius:7,padding:"5px 8px",cursor:"pointer",color:"#ef4444",fontSize:12}}>🗑</button>
            </div>
          </div>
        </Card>);
      })}
      {employes.length===0&&<div style={{textAlign:"center",padding:"30px 0",color:"#444",fontSize:13}}>Aucun employé</div>}
    </div>
    {modal&&<Modal title={modal==="create"?"Nouvel employé":"Modifier l'employé"} onClose={()=>setModal(null)}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <Field label="Prénom"><Inp value={form.prenom} onChange={e=>setForm(f=>({...f,prenom:e.target.value}))} placeholder="Prénom"/></Field>
        <Field label="Nom"><Inp value={form.nom} onChange={e=>setForm(f=>({...f,nom:e.target.value}))} placeholder="Nom"/></Field>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <Field label="Poste (libre)"><Inp value={form.poste_rh} onChange={e=>setForm(f=>({...f,poste_rh:e.target.value}))} placeholder="Ex: Cuisinier"/></Field>
        <Field label="Salaire (GNF)"><Inp type="number" value={form.salaire_base} onChange={e=>setForm(f=>({...f,salaire_base:e.target.value}))} placeholder="4000000"/></Field>
      </div>
      <Field label="Statut">
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          {[true,false].map(v=>(
            <button key={String(v)} onClick={()=>setForm(f=>({...f,actif:v}))} style={{padding:"10px",borderRadius:10,border:form.actif===v?"none":"1px solid rgba(255,255,255,.1)",background:form.actif===v?(v?"rgba(34,197,94,.2)":"rgba(239,68,68,.2)"):"rgba(255,255,255,.04)",color:v?"#22c55e":"#ef4444",fontWeight:600,fontSize:13,cursor:"pointer"}}>
              {v?"✓ Actif":"✗ Inactif"}
            </button>
          ))}
        </div>
      </Field>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:6}}><Ghost onClick={()=>setModal(null)}>Annuler</Ghost><Btn bg="linear-gradient(135deg,#6366f1,#4f46e5)" onClick={save} disabled={saving}>{saving?"⏳...":"Enregistrer"}</Btn></div>
    </Modal>}
    {del&&<Modal title="Désactiver l'employé" onClose={()=>setDel(null)}>
      <p style={{color:"#bbb",fontSize:14,marginBottom:20}}>Désactiver <strong style={{color:"#fff"}}>{del.prenom?del.prenom+" "+del.nom:del.nom}</strong> ?</p>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}><Ghost onClick={()=>setDel(null)}>Annuler</Ghost><Btn bg="linear-gradient(135deg,#ef4444,#dc2626)" onClick={()=>doDelete(del.id)}>Désactiver</Btn></div>
    </Modal>}
  </div>);
}

// ═══════════════════════════════════════════════════════════════════
// RH — PRÉSENCES
// ═══════════════════════════════════════════════════════════════════
function RhPresences({employes,presences,setPresences,restaurantId}) {
  const actifs=employes.filter(e=>e.actif);
  const [mois,setMois]=useState(MOIS_COURANT);
  const [selEmp,setSelEmp]=useState(actifs[0]?.id||"");
  const [y,m]=mois.split("-").map(Number);
  const nbJours=new Date(y,m,0).getDate();
  const jours=Array.from({length:nbJours},(_,i)=>`${mois}-${String(i+1).padStart(2,"0")}`);
  const offset=(new Date(y,m-1,1).getDay()+6)%7;

  const getP=date=>presences.find(p=>p.employee_id===selEmp&&p.date===date);

  const toggle=async(date)=>{
    const ex=getP(date);
    const nextStatut=ex?CYCLE[(CYCLE.indexOf(ex.statut)+1)%CYCLE.length]:"present";
    const body={employee_id:selEmp,date,statut:nextStatut,restaurant_id:restaurantId};
    try {
      if(ex){
        await sb.patch("employee_presences",ex.id,{statut:nextStatut});
        setPresences(p=>p.map(x=>x.id===ex.id?{...x,statut:nextStatut}:x));
      } else {
        const res=await sb.post("employee_presences",body);
        setPresences(p=>[...p,...(res||[{...body,id:uid()}])]);
      }
    } catch(e) {
      // Fallback local si upsert échoue
      if(ex) setPresences(p=>p.map(x=>x.id===ex.id?{...x,statut:nextStatut}:x));
      else setPresences(p=>[...p,{...body,id:uid()}]);
    }
  };

  const trav   =presences.filter(p=>p.employee_id===selEmp&&p.date.startsWith(mois)&&p.statut==="present").length;
  const retards=presences.filter(p=>p.employee_id===selEmp&&p.date.startsWith(mois)&&p.statut==="retard").length;
  const abs    =presences.filter(p=>p.employee_id===selEmp&&p.date.startsWith(mois)&&p.statut==="absent").length;
  const nonM   =nbJours-presences.filter(p=>p.employee_id===selEmp&&p.date.startsWith(mois)).length;

  return(<div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
      <Field label="Mois"><Inp type="month" value={mois} onChange={e=>setMois(e.target.value)}/></Field>
      <Field label="Employé">
        <Sel value={selEmp} onChange={e=>setSelEmp(e.target.value)}>
          {actifs.map(e=><option key={e.id} value={e.id}>{e.prenom?e.prenom+" "+e.nom:e.nom}</option>)}
        </Sel>
      </Field>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:6,marginBottom:18}}>
      {[{v:trav,l:"Présents",c:"#22c55e",bg:"rgba(34,197,94,.1)"},{v:retards,l:"Retards",c:"#F97316",bg:"rgba(249,115,22,.1)"},{v:abs,l:"Absents",c:"#ef4444",bg:"rgba(239,68,68,.1)"},{v:nonM,l:"Non marqués",c:"#555",bg:"rgba(255,255,255,.04)"}].map((k,i)=>(
        <div key={i} style={{background:k.bg,borderRadius:10,padding:"10px 6px",textAlign:"center"}}>
          <div style={{fontSize:20,fontWeight:800,color:k.c}}>{k.v}</div>
          <div style={{fontSize:9,color:"#555",marginTop:2,fontWeight:600,textTransform:"uppercase",lineHeight:1.2}}>{k.l}</div>
        </div>
      ))}
    </div>
    <div style={{display:"flex",gap:10,marginBottom:12,flexWrap:"wrap"}}>
      {Object.entries(STATUTS_P).map(([k,v])=>(
        <div key={k} style={{display:"flex",alignItems:"center",gap:4,fontSize:11,color:"#888"}}>
          <span style={{display:"inline-block",width:14,height:14,borderRadius:4,background:v.bg,border:`1px solid ${v.border}`,textAlign:"center",lineHeight:"14px",fontSize:8,color:v.color}}>{v.icon}</span>{v.label}
        </div>
      ))}
      <div style={{fontSize:11,color:"#555"}}>· Toucher pour changer</div>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
      {["L","M","M","J","V","S","D"].map((d,i)=>(<div key={i} style={{textAlign:"center",fontSize:9,color:"#444",fontWeight:600,paddingBottom:3}}>{d}</div>))}
      {Array.from({length:offset},(_,i)=>(<div key={"off"+i}/>))}
      {jours.map(date=>{
        const p=getP(date);
        const isFut=date>TODAY_STR;
        const isToday=date===TODAY_STR;
        const sp=p?STATUTS_P[p.statut]:null;
        const bg=sp&&!isFut?sp.bg:"rgba(255,255,255,.04)";
        const color=sp&&!isFut?sp.color:"#444";
        const bdr=isToday?"2px solid #F97316":sp&&!isFut?`1px solid ${sp.border}`:"1px solid rgba(255,255,255,.06)";
        return(<button key={date} onClick={()=>!isFut&&toggle(date)} disabled={isFut}
          style={{aspectRatio:"1",borderRadius:6,background:bg,border:bdr,color,fontWeight:700,fontSize:10,cursor:isFut?"default":"pointer",opacity:isFut?.25:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:0,gap:0}}>
          <span style={{fontSize:10}}>{date.slice(8)}</span>
          {sp&&!isFut&&<span style={{fontSize:7,lineHeight:1}}>{sp.icon}</span>}
        </button>);
      })}
    </div>
  </div>);
}

// ═══════════════════════════════════════════════════════════════════
// RH — PAIE
// ═══════════════════════════════════════════════════════════════════
function RhPaie({employes,presences,avances,setAvances,paiements,setPaiements,restaurantId}) {
  const actifs=employes.filter(e=>e.actif);
  const [mois,setMois]=useState(MOIS_COURANT);
  const [selEmp,setSelEmp]=useState(actifs[0]?.id||"");
  const [modalAv,setModalAv]=useState(false);
  const [formAv,setFormAv]=useState({montant:"",motif:"",date:TODAY_STR});
  const [confirmPay,setConfirmPay]=useState(false);
  const [saving,setSaving]=useState(false);

  const emp=actifs.find(e=>e.id===selEmp);
  const calcul=emp?calcPaie(emp,presences,avances,mois):null;
  const dejaPaye=paiements.find(p=>p.employee_id===selEmp&&p.mois===mois&&p.statut==="paye");
  const avsMois=avances.filter(a=>a.employee_id===selEmp&&a.date.startsWith(mois));

  const ajouterAv=async()=>{
    if(!formAv.montant)return;
    setSaving(true);
    try {
      const body={employee_id:selEmp,date:formAv.date,montant:+formAv.montant,motif:formAv.motif||null,restaurant_id:restaurantId};
      const res=await sb.post("employee_avances",body);
      setAvances(p=>[...p,...(res||[{...body,id:uid()}])]);
      setFormAv({montant:"",motif:"",date:TODAY_STR});
      setModalAv(false);
    } catch(e){alert("Erreur : "+e.message);}
    setSaving(false);
  };

  const marquerPaye=async()=>{
    if(!calcul)return;
    setSaving(true);
    try {
      const body={employee_id:selEmp,mois,salaire_brut:calcul.brut,deductions:calcul.deduction,avances:calcul.avances,retards:calcul.retards,salaire_net:calcul.net,date_paiement:TODAY_STR,statut:"paye",restaurant_id:restaurantId};
      const res=await sb.post("employee_paies",body);
      setPaiements(p=>[...p,...(res||[{...body,id:uid()}])]);
      setConfirmPay(false);
    } catch(e){alert("Erreur : "+e.message);}
    setSaving(false);
  };

  const supprimerAv=async(id)=>{
    try { await sb.delete("employee_avances",id); setAvances(p=>p.filter(a=>a.id!==id)); } catch(e){setAvances(p=>p.filter(a=>a.id!==id));}
  };

  return(<div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20}}>
      <Field label="Mois"><Inp type="month" value={mois} onChange={e=>setMois(e.target.value)}/></Field>
      <Field label="Employé"><Sel value={selEmp} onChange={e=>setSelEmp(e.target.value)}>{actifs.map(e=><option key={e.id} value={e.id}>{e.prenom?e.prenom+" "+e.nom:e.nom}</option>)}</Sel></Field>
    </div>
    {emp&&calcul&&<>
      <div style={{background:"rgba(99,102,241,.08)",border:"1px solid rgba(99,102,241,.2)",borderRadius:16,padding:16,marginBottom:16}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div>
            <div style={{fontWeight:700,color:"#fff",fontSize:15}}>{emp.prenom?emp.prenom+" "+emp.nom:emp.nom}</div>
            <div style={{fontSize:11,color:"#666",marginTop:2}}>{emp.poste_rh||emp.role||""} · {fmtMois(mois)}</div>
          </div>
          {dejaPaye?<Badge color="#22c55e" bg="rgba(34,197,94,.15)">✓ Payé</Badge>:<Badge color="#F97316" bg="rgba(249,115,22,.12)">En attente</Badge>}
        </div>
        {[
          {l:"Salaire de base",v:fmt(calcul.brut),c:"#fff"},
          {l:`Présents : ${calcul.trav}j · Retards : ${calcul.retards}j · Jours payés : ${calcul.joursPayes}/${calcul.total}`,v:"",c:"#888",sub:true},
          {l:`Absences déduites (${calcul.abs}j)`,v:calcul.deduction>0?`- ${fmt(calcul.deduction)}`:"0 GNF",c:calcul.deduction>0?"#ef4444":"#555"},
          {l:"Avances du mois",v:calcul.avances>0?`- ${fmt(calcul.avances)}`:"0 GNF",c:calcul.avances>0?"#ef4444":"#555"},
        ].map((r,i)=>!r.sub?(
          <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid rgba(255,255,255,.06)"}}>
            <span style={{fontSize:13,color:"#888"}}>{r.l}</span>
            <span style={{fontSize:13,fontWeight:600,color:r.c}}>{r.v}</span>
          </div>
        ):<div key={i} style={{fontSize:11,color:"#666",padding:"4px 0 8px",borderBottom:"1px solid rgba(255,255,255,.06)"}}>{r.l}</div>)}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 0 0"}}>
          <span style={{fontSize:14,fontWeight:700,color:"#fff"}}>Salaire net</span>
          <span style={{fontSize:20,fontWeight:800,color:"#22c55e"}}>{fmt(calcul.net)}</span>
        </div>
      </div>

      <div style={{marginBottom:16}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div style={{fontSize:13,fontWeight:700,color:"#fff"}}>Avances ({avsMois.length})</div>
          <button onClick={()=>setModalAv(true)} style={{background:"rgba(239,68,68,.1)",border:"1px solid rgba(239,68,68,.25)",borderRadius:8,padding:"6px 12px",cursor:"pointer",color:"#ef4444",fontWeight:600,fontSize:12}}>+ Avance</button>
        </div>
        {avsMois.length===0&&<div style={{fontSize:12,color:"#444",textAlign:"center",padding:"10px 0"}}>Aucune avance ce mois</div>}
        {avsMois.map(a=>(<div key={a.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"rgba(239,68,68,.07)",border:"1px solid rgba(239,68,68,.15)",borderRadius:10,padding:"10px 12px",marginBottom:8}}>
          <div><div style={{fontSize:13,color:"#fff",fontWeight:600}}>{a.motif||"Avance"}</div><div style={{fontSize:11,color:"#666",marginTop:2}}>{fmtShort(a.date)}</div></div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <span style={{fontWeight:700,color:"#ef4444",fontSize:13}}>-{fmt(a.montant)}</span>
            <button onClick={()=>supprimerAv(a.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#555",fontSize:14}}>✕</button>
          </div>
        </div>))}
      </div>

      <div style={{display:"grid",gridTemplateColumns:dejaPaye?"1fr":"1fr 1fr",gap:10}}>
        <button onClick={()=>exportPDFPaie(emp,calcul,avances,mois,dejaPaye)} style={{background:"rgba(249,115,22,.12)",border:"1px solid rgba(249,115,22,.3)",borderRadius:12,padding:"12px",cursor:"pointer",color:"#F97316",fontWeight:700,fontSize:13,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>📄 Export PDF</button>
        {!dejaPaye&&<Btn bg="linear-gradient(135deg,#16a34a,#15803d)" onClick={()=>setConfirmPay(true)} disabled={saving}>💰 Marquer payé</Btn>}
      </div>
    </>}

    {modalAv&&<Modal title="Ajouter une avance" onClose={()=>setModalAv(false)}>
      <Field label="Montant (GNF)"><Inp type="number" value={formAv.montant} onChange={e=>setFormAv(f=>({...f,montant:e.target.value}))} placeholder="500000"/></Field>
      <Field label="Date"><Inp type="date" value={formAv.date} onChange={e=>setFormAv(f=>({...f,date:e.target.value}))}/></Field>
      <Field label="Motif"><Inp value={formAv.motif} onChange={e=>setFormAv(f=>({...f,motif:e.target.value}))} placeholder="Ex: Urgence familiale"/></Field>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:6}}><Ghost onClick={()=>setModalAv(false)}>Annuler</Ghost><Btn bg="linear-gradient(135deg,#ef4444,#dc2626)" onClick={ajouterAv} disabled={saving}>{saving?"⏳...":"Enregistrer"}</Btn></div>
    </Modal>}

    {confirmPay&&<Modal title="Confirmer le paiement" onClose={()=>setConfirmPay(false)}>
      <div style={{textAlign:"center",padding:"10px 0 20px"}}>
        <div style={{fontSize:13,color:"#aaa",marginBottom:8}}>{emp?.prenom?emp.prenom+" "+emp.nom:emp?.nom} · {fmtMois(mois)}</div>
        <div style={{fontSize:30,fontWeight:800,color:"#22c55e",marginBottom:8}}>{fmt(calcul?.net||0)}</div>
        <div style={{fontSize:12,color:"#555"}}>Enregistré comme payé aujourd'hui</div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}><Ghost onClick={()=>setConfirmPay(false)}>Annuler</Ghost><Btn bg="linear-gradient(135deg,#16a34a,#15803d)" onClick={marquerPaye} disabled={saving}>{saving?"⏳ Enregistrement...":"✓ Confirmer"}</Btn></div>
    </Modal>}
  </div>);
}

// ═══════════════════════════════════════════════════════════════════
// RH — HISTORIQUE PAIE
// ═══════════════════════════════════════════════════════════════════
function RhHistoriquePaie({paiements,employes}) {
  const [fEmp,setFEmp]=useState("");
  const [fMois,setFMois]=useState("");
  const filtered=useMemo(()=>[...paiements].sort((a,b)=>b.mois.localeCompare(a.mois)).filter(p=>{if(fEmp&&p.employee_id!==fEmp)return false;if(fMois&&p.mois!==fMois)return false;return true;}),[paiements,fEmp,fMois]);
  const total=filtered.reduce((s,p)=>s+(+p.salaire_net),0);
  const moisDispos=[...new Set(paiements.map(p=>p.mois))].sort((a,b)=>b.localeCompare(a));
  const has=fEmp||fMois;
  return(<div>
    <div style={{background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.07)",borderRadius:14,padding:14,marginBottom:14}}>
      <div style={{fontSize:10,color:"#555",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:10}}>Filtres</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <Sel value={fEmp} onChange={e=>setFEmp(e.target.value)} style={{...ci,fontSize:12,padding:"8px 10px"}}><option value="">Tous employés</option>{employes.map(e=><option key={e.id} value={e.id}>{e.prenom?e.prenom+" "+e.nom:e.nom}</option>)}</Sel>
        <Sel value={fMois} onChange={e=>setFMois(e.target.value)} style={{...ci,fontSize:12,padding:"8px 10px"}}><option value="">Tous les mois</option>{moisDispos.map(m=><option key={m} value={m}>{m}</option>)}</Sel>
      </div>
      {has&&<button onClick={()=>{setFEmp("");setFMois("");}} style={{marginTop:8,background:"none",border:"none",color:"#F97316",fontSize:12,cursor:"pointer",fontWeight:600}}>✕ Effacer</button>}
    </div>
    <div style={{background:"rgba(99,102,241,.08)",border:"1px solid rgba(99,102,241,.2)",borderRadius:12,padding:"12px 14px",marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <span style={{fontSize:13,color:"#aaa"}}>{filtered.length} paiement(s)</span>
      <span style={{fontSize:15,fontWeight:800,color:"#818cf8"}}>{fmt(total)}</span>
    </div>
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      {filtered.map(p=>{
        const emp=employes.find(e=>e.id===p.employee_id);
        const nomEmp=emp?(emp.prenom?emp.prenom+" "+emp.nom:emp.nom):"—";
        return(<Card key={p.id}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
            <div><div style={{fontWeight:700,color:"#fff",fontSize:14}}>{nomEmp}</div><div style={{fontSize:11,color:"#666",marginTop:2}}>{emp?.poste_rh||emp?.role||""} · {fmtMois(p.mois)}</div></div>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:17,fontWeight:800,color:"#22c55e"}}>{fmt(p.salaire_net)}</div>
              <div style={{fontSize:10,color:"#555",marginTop:2}}>Payé le {fmtShort(p.date_paiement)}</div>
            </div>
          </div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            <span style={{fontSize:10,color:"#aaa",background:"rgba(255,255,255,.06)",borderRadius:6,padding:"3px 8px"}}>Brut : {fmt(p.salaire_brut)}</span>
            {+p.deductions>0&&<span style={{fontSize:10,color:"#ef4444",background:"rgba(239,68,68,.08)",borderRadius:6,padding:"3px 8px"}}>Abs : -{fmt(p.deductions)}</span>}
            {(+p.retards||0)>0&&<span style={{fontSize:10,color:"#F97316",background:"rgba(249,115,22,.08)",borderRadius:6,padding:"3px 8px"}}>⏰ {p.retards} retard(s)</span>}
            {+p.avances>0&&<span style={{fontSize:10,color:"#F97316",background:"rgba(249,115,22,.08)",borderRadius:6,padding:"3px 8px"}}>Av : -{fmt(p.avances)}</span>}
          </div>
        </Card>);
      })}
      {filtered.length===0&&<div style={{textAlign:"center",padding:"40px 0",color:"#444",fontSize:14}}>Aucun paiement trouvé</div>}
    </div>
  </div>);
}

// APP PRINCIPALE
// ═══════════════════════════════════════════════════════════════════
function MainApp({session,onLogout}) {
  const rid = session.id;
  const [module,setModule]=useState("stock");
  const [stockTab,setStockTab]=useState("dashboard");
  const [rhTab,setRhTab]=useState("employes");

  // Data state
  const [articles,    setArticles    ]=useState([]);
  const [mouvements,  setMouvements  ]=useState([]);
  const [fournisseurs,setFournisseurs]=useState([]);
  const [employes,    setEmployes    ]=useState([]);
  const [presences,   setPresences   ]=useState([]);
  const [avances,     setAvances     ]=useState([]);
  const [paiements,   setPaiements   ]=useState([]);
  const [loadState,   setLoadState   ]=useState({loading:true,error:null});

  const isPremium = ["premium","essai"].includes(session.plan);

  // Load all data
  useEffect(()=>{
    setLoadState({loading:true,error:null});
    const rid_enc=encodeURIComponent(rid);
    Promise.all([
      sb.get("stock_articles",     `restaurant_id=eq.${rid_enc}&order=created_at.desc`),
      sb.get("stock_movements",    `restaurant_id=eq.${rid_enc}&order=created_at.desc&limit=200`),
      sb.get("stock_fournisseurs", `restaurant_id=eq.${rid_enc}&order=nom.asc`),
      sb.get("employees",          `restaurant_id=eq.${rid_enc}&order=nom.asc`),
      isPremium ? sb.get("employee_presences",`restaurant_id=eq.${rid_enc}&order=date.asc`) : Promise.resolve([]),
      isPremium ? sb.get("employee_avances",  `restaurant_id=eq.${rid_enc}&order=date.desc`) : Promise.resolve([]),
      isPremium ? sb.get("employee_paies",    `restaurant_id=eq.${rid_enc}&order=mois.desc`) : Promise.resolve([]),
    ]).then(([a,m,f,e,p,av,pa])=>{
      setArticles(a||[]);
      setMouvements(m||[]);
      setFournisseurs(f||[]);
      setEmployes(e||[]);
      setPresences(p||[]);
      setAvances(av||[]);
      setPaiements(pa||[]);
      setLoadState({loading:false,error:null});
    }).catch(err=>{
      setLoadState({loading:false,error:err.message});
    });
  },[rid]);

  const alertCount  = articles.filter(a=>getStatus(a)!=="ok").length;
  const paieAttente = employes.filter(e=>e.actif&&!paiements.find(p=>p.employee_id===e.id&&p.mois===MOIS_COURANT&&p.statut==="paye")).length;

  const STOCK_TABS=[{id:"dashboard",l:"Tableau",i:"📊"},{id:"articles",l:"Articles",i:"📦"},{id:"movements",l:"Mvmts",i:"🔄"},{id:"history",l:"Hist.",i:"🕐"},{id:"suppliers",l:"Fourns",i:"🏭"}];
  const RH_TABS   =[{id:"employes",l:"Employés",i:"👥"},{id:"presences",l:"Présences",i:"📅"},{id:"paie",l:"Paie",i:"💰"},{id:"historique",l:"Historique",i:"📋"}];
  const TITLES={
    stock:{dashboard:"Tableau de bord",articles:"Articles",movements:"Nouveau mouvement",history:"Historique stock",suppliers:"Fournisseurs"},
    rh:{employes:"Employés",presences:"Présences",paie:"Fiche de paie",historique:"Historique paie"},
  };

  const tabs      =module==="stock"?STOCK_TABS:RH_TABS;
  const activeTab =module==="stock"?stockTab:rhTab;
  const setActiveTab=module==="stock"?setStockTab:setRhTab;
  const accent    =module==="stock"?"#F97316":"#818cf8";
  const accentGrad=module==="stock"?"linear-gradient(135deg,#F97316,#ea580c)":"linear-gradient(135deg,#6366f1,#4f46e5)";
  const midId     =module==="stock"?"movements":"paie";
  const title     =TITLES[module][activeTab];

  if(!isPremium&&module==="rh") return <UpgradeWall session={session} onLogout={onLogout} moduleLabel="RH & Paie"/>;

  return(
    <div style={{minHeight:"100vh",background:"#0d0d1a",color:"#fff",fontFamily:"system-ui,sans-serif",maxWidth:500,margin:"0 auto",display:"flex",flexDirection:"column"}}>
      {/* Header */}
      <div style={{background:"rgba(13,13,26,.97)",borderBottom:"1px solid rgba(255,255,255,.06)",padding:"12px 16px 0",position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",gap:6,marginBottom:10,alignItems:"center"}}>
          {[
            {id:"stock",l:"📦 Stock",     badge:alertCount,   bc:"#ef4444"},
            {id:"rh",   l:"👥 RH & Paie", badge:isPremium?paieAttente:0, bc:"#F97316", locked:!isPremium},
          ].map(mod=>(
            <button key={mod.id} onClick={()=>setModule(mod.id)} style={{flex:1,padding:"9px 10px",borderRadius:10,border:module===mod.id?"none":"1px solid rgba(255,255,255,.1)",background:module===mod.id?accentGrad:"rgba(255,255,255,.05)",color:module===mod.id?"#fff":"#777",fontWeight:module===mod.id?700:500,fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
              {mod.l}
              {mod.locked&&<span style={{fontSize:10}}>🔒</span>}
              {mod.badge>0&&<span style={{background:module===mod.id?"rgba(255,255,255,.25)":mod.bc,color:"#fff",fontSize:10,fontWeight:700,padding:"1px 6px",borderRadius:10}}>{mod.badge}</span>}
            </button>
          ))}
          <button onClick={onLogout} title="Déconnexion" style={{background:"rgba(239,68,68,.1)",border:"1px solid rgba(239,68,68,.2)",borderRadius:10,padding:"9px 11px",cursor:"pointer",color:"#ef4444",fontSize:14,flexShrink:0}}>🚪</button>
        </div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",paddingBottom:10}}>
          <div>
            <div style={{fontSize:17,fontWeight:800,color:"#fff",lineHeight:1}}>{title}</div>
            <div style={{fontSize:10,color:"#444",marginTop:3}}>{session.restaurant} · <span style={{color:isPremium?"#22c55e":"#F97316",fontWeight:600}}>Plan {session.plan}</span></div>
          </div>
          {module==="stock"&&alertCount>0&&<div style={{background:"rgba(239,68,68,.15)",border:"1px solid rgba(239,68,68,.3)",borderRadius:20,padding:"4px 10px",fontSize:11,fontWeight:700,color:"#ef4444"}}>⚠️ {alertCount}</div>}
          {module==="rh"&&isPremium&&paieAttente>0&&<div style={{background:"rgba(249,115,22,.12)",border:"1px solid rgba(249,115,22,.3)",borderRadius:20,padding:"4px 10px",fontSize:11,fontWeight:700,color:"#F97316"}}>💰 {paieAttente}</div>}
        </div>
      </div>

      {/* Content */}
      <div style={{flex:1,overflowY:"auto",padding:"16px 16px 100px"}}>
        {loadState.loading&&<Loader msg="Chargement des données..."/>}
        {loadState.error&&<Err msg={loadState.error} onRetry={()=>setLoadState({loading:true,error:null})}/>}
        {!loadState.loading&&!loadState.error&&<>
          {module==="stock"&&<>
            {stockTab==="dashboard" &&<StockDashboard   articles={articles} mouvements={mouvements} employes={employes}/>}
            {stockTab==="articles"  &&<StockArticles    articles={articles} setArticles={setArticles} restaurantId={rid}/>}
            {stockTab==="movements" &&<StockMouvements  articles={articles} setArticles={setArticles} fournisseurs={fournisseurs} employes={employes} setMouvements={setMouvements} restaurantId={rid}/>}
            {stockTab==="history"   &&<StockHistorique  mouvements={mouvements} articles={articles} employes={employes} fournisseurs={fournisseurs}/>}
            {stockTab==="suppliers" &&<StockFournisseurs fournisseurs={fournisseurs} setFournisseurs={setFournisseurs} restaurantId={rid}/>}
          </>}
          {module==="rh"&&isPremium&&<>
            {rhTab==="employes"   &&<RhEmployes     employes={employes} setEmployes={setEmployes} restaurantId={rid}/>}
            {rhTab==="presences"  &&<RhPresences    employes={employes} presences={presences} setPresences={setPresences} restaurantId={rid}/>}
            {rhTab==="paie"       &&<RhPaie         employes={employes} presences={presences} avances={avances} setAvances={setAvances} paiements={paiements} setPaiements={setPaiements} restaurantId={rid}/>}
            {rhTab==="historique" &&<RhHistoriquePaie paiements={paiements} employes={employes}/>}
          </>}
        </>}
      </div>

      {/* Bottom nav */}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:500,background:"rgba(13,13,26,.98)",borderTop:"1px solid rgba(255,255,255,.07)",display:"flex",padding:"8px 0 14px",zIndex:200}}>
        {tabs.map(t=>{
          const active=activeTab===t.id;
          const isMid=t.id===midId;
          return(
            <button key={t.id} onClick={()=>setActiveTab(t.id)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4,background:"none",border:"none",cursor:"pointer",padding:"4px 0"}}>
              {isMid?(
                <div style={{width:46,height:46,borderRadius:14,marginTop:-18,background:active?accentGrad:`${accent}22`,border:active?"none":`1.5px solid ${accent}55`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,boxShadow:active?`0 4px 20px ${accent}66`:"none"}}>
                  {t.i}
                </div>
              ):(
                <div style={{width:36,height:36,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",background:active?`${accent}22`:"transparent",fontSize:18}}>
                  {t.i}
                </div>
              )}
              <span style={{fontSize:10,fontWeight:active?700:400,color:active?accent:"#555"}}>{t.l}</span>
            </button>
          );
        })}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// ROOT — GESTION AUTH + SESSION
// ═══════════════════════════════════════════════════════════════════
function App() {
  const [session,setSession]=useState(()=>{
    try { const s=localStorage.getItem("nxs_session"); return s?JSON.parse(s):null; } catch(e){return null;}
  });

  const logout=()=>{
    localStorage.removeItem("nxs_session");
    setSession(null);
  };

  if(!session) return <LoginPage onLogin={setSession}/>;
  return <MainApp session={session} onLogout={logout}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

<!-- PWA Service Worker -->
<script>
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{
    const sw=`
const CACHE="nxs-v1";
const ASSETS=["/"];
self.addEventListener("install",e=>e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS))));
self.addEventListener("fetch",e=>{
  if(e.request.url.includes("supabase.co"))return;
  e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match("/"))));
});`;
    const blob=new Blob([sw],{type:"application/javascript"});
    const url=URL.createObjectURL(blob);
    navigator.serviceWorker.register(url).catch(()=>{});
  });
}
</script>
