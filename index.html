  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    :root{
      --bg:#080A0F;--s1:#0F1118;--s2:#171A24;--s3:#1E2230;
      --gold:#F5A623;--gold2:#D4891A;--goldf:rgba(245,166,35,0.12);
      --green:#22C55E;--red:#EF4444;--blue:#3B82F6;--purple:#A855F7;
      --t1:#F0F2F8;--t2:#9CA3B0;--t3:#5A6170;
      --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
      --r:14px;--r2:10px;--r3:20px;
      --shadow:0 8px 32px rgba(0,0,0,0.5);
    }
    html,body{margin:0;padding:0;background:var(--bg);overflow:hidden}
    body{font-family:'Plus Jakarta Sans',sans-serif;color:var(--t1);font-size:14px;line-height:1.5}
    h1,h2,h3,h4,h5{font-family:'Outfit',sans-serif}
    input,textarea,select{font-family:inherit;font-size:14px;outline:none;border:none;background:none;color:var(--t1)}
    button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
    ::-webkit-scrollbar{width:3px;height:3px}
    ::-webkit-scrollbar-thumb{background:var(--s3);border-radius:2px}
    ::-webkit-scrollbar-track{background:transparent}

    .app{position:fixed;inset:0;display:flex;flex-direction:column;background:var(--bg);overflow:hidden}
    .app-body{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(80px + env(safe-area-inset-bottom));min-height:0}
    .app-body.no-nav{padding-bottom:0}

    .auth-wrap{min-height:100%;display:flex;flex-direction:column;padding:0 20px 40px;overflow-y:auto;-webkit-overflow-scrolling:touch}
    .auth-logo{text-align:center;padding:48px 0 32px}
    .auth-logo h1{font-size:28px;font-weight:800;color:var(--gold);letter-spacing:-0.5px}
    .auth-logo p{font-size:12px;color:var(--t3);margin-top:4px;letter-spacing:2px;text-transform:uppercase}
    .auth-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r3);padding:24px;margin-bottom:16px}
    .auth-title{font-size:20px;font-weight:700;margin-bottom:6px}
    .auth-sub{font-size:13px;color:var(--t3);margin-bottom:20px}
    .auth-tabs{display:flex;gap:8px;margin-bottom:24px;background:var(--bg);border-radius:var(--r2);padding:4px}
    .auth-tab{flex:1;padding:9px;text-align:center;border-radius:8px;font-size:13px;font-weight:600;color:var(--t3);transition:all .2s}
    .auth-tab.active{background:var(--s2);color:var(--t1)}

    .field{margin-bottom:16px}
    .field label{display:block;font-size:12px;font-weight:600;color:var(--t3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
    .input-wrap{position:relative}
    .inp{width:100%;background:var(--s2);border:1px solid var(--border2);border-radius:var(--r2);padding:11px 14px;color:var(--t1);transition:border-color .2s;font-size:14px;-webkit-appearance:none}
    .inp:focus{border-color:var(--gold)}
    .inp::placeholder{color:var(--t3)}
    .inp-icon{padding-right:42px}
    .inp-btn{position:absolute;right:0;top:0;height:100%;width:42px;display:flex;align-items:center;justify-content:center;color:var(--t3);font-size:16px;background:none;border:none;cursor:pointer}
    .inp-icon-left{padding-left:42px}
    .inp-icon-left-el{position:absolute;left:0;top:0;height:100%;width:42px;display:flex;align-items:center;justify-content:center;color:var(--t3);pointer-events:none}

    .btn{display:flex;align-items:center;justify-content:center;gap:6px;border-radius:var(--r2);font-weight:600;font-size:14px;transition:all .15s;padding:12px 20px;width:100%}
    .btn-gold{background:var(--gold);color:#000}
    .btn-gold:active{background:var(--gold2)}
    .btn-ghost{background:var(--s2);color:var(--t1);border:1px solid var(--border2)}
    .btn-ghost:active{background:var(--s3)}
    .btn-red{background:rgba(239,68,68,0.15);color:var(--red);border:1px solid rgba(239,68,68,0.25)}
    .btn-green{background:rgba(34,197,94,0.15);color:var(--green);border:1px solid rgba(34,197,94,0.25)}
    .btn-sm{padding:8px 14px;font-size:13px;border-radius:8px}
    .btn-xs{padding:6px 10px;font-size:12px;border-radius:7px;width:auto}
    .btn-icon{width:36px;height:36px;padding:0;border-radius:9px;flex-shrink:0}
    button:disabled{opacity:0.5;cursor:not-allowed}

    .code-box{background:var(--goldf);border:1px solid rgba(245,166,35,0.3);border-radius:var(--r2);padding:16px;margin:12px 0}
    .code-box-label{font-size:11px;color:var(--gold);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
    .code-box-value{font-family:'Outfit',sans-serif;font-size:22px;font-weight:700;color:var(--gold);letter-spacing:2px;margin-bottom:10px;word-break:break-all}
    .code-box-sub{font-size:13px;color:var(--t1);margin-bottom:12px}

    .bottom-nav{position:fixed;bottom:0;left:0;right:0;min-height:64px;height:calc(64px + env(safe-area-inset-bottom));background:var(--s1);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);align-items:flex-start;padding-top:0}
    .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;position:relative;color:var(--t3);transition:color .2s;padding:8px 4px;background:none;border:none;cursor:pointer;font-family:inherit}
    .nav-item.active{color:var(--gold)}
    .nav-item-icon{font-size:20px;position:relative}
    .nav-item-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
    .nav-badge{position:absolute;top:-4px;right:-8px;background:var(--red);color:#fff;font-size:9px;font-weight:800;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 3px}

    .page-header{padding:16px 16px 0;position:sticky;top:0;background:var(--bg);z-index:10;padding-bottom:12px}
    .page-header-inner{display:flex;align-items:center;justify-content:space-between}
    .page-title{font-size:22px;font-weight:800;font-family:'Outfit',sans-serif}
    .page-sub{font-size:12px;color:var(--t3);margin-top:2px}
    .header-actions{display:flex;gap:8px;align-items:center}

    .card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px}
    .card-title{font-size:13px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;display:flex;align-items:center;gap:6px}
    .stat-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
    .stat-card{background:var(--s2);border-radius:var(--r2);padding:14px}
    .stat-val{font-family:'Outfit',sans-serif;font-size:20px;font-weight:700;color:var(--t1)}
    .stat-label{font-size:11px;color:var(--t3);margin-top:3px}
    .stat-accent{color:var(--gold)}

    .chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700}
    .chip-gold{background:var(--goldf);color:var(--gold)}
    .chip-green{background:rgba(34,197,94,0.12);color:var(--green)}
    .chip-red{background:rgba(239,68,68,0.12);color:var(--red)}
    .chip-blue{background:rgba(59,130,246,0.12);color:var(--blue)}
    .chip-gray{background:var(--s2);color:var(--t3)}
    .chip-purple{background:rgba(168,85,247,0.12);color:var(--purple)}

    .list-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
    .list-item:last-child{border-bottom:none}
    .list-item-main{flex:1;min-width:0}
    .list-item-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .list-item-sub{font-size:12px;color:var(--t3);margin-top:2px}

    .sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;opacity:0;transition:opacity .25s;pointer-events:none}
    .sheet-overlay.open{opacity:1;pointer-events:all}
    .sheet{position:fixed;bottom:0;left:0;right:0;background:var(--s1);border-radius:24px 24px 0 0;z-index:201;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);max-height:calc(90vh - env(safe-area-inset-bottom));display:flex;flex-direction:column}
    .sheet.open{transform:translateY(0)}
    .sheet-handle{width:36px;height:4px;background:var(--s3);border-radius:2px;margin:12px auto 0}
    .sheet-header{padding:16px 20px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:1px solid var(--border)}
    .sheet-title{font-size:17px;font-weight:700;font-family:'Outfit',sans-serif}
    .sheet-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 20px;overscroll-behavior:contain;min-height:0;padding-bottom:calc(16px + env(safe-area-inset-bottom))}
    .sheet-footer{padding:12px 20px max(24px,env(safe-area-inset-bottom));flex-shrink:0;border-top:1px solid var(--border);display:flex;gap:8px}

    .toast-container{position:fixed;top:12px;left:12px;right:12px;z-index:999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
    .toast{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:12px;font-size:13px;font-weight:500;animation:toastIn .3s ease;box-shadow:var(--shadow)}
    .toast-success{background:#14532D;border:1px solid rgba(34,197,94,0.2);color:#86efac}
    .toast-error{background:#7F1D1D;border:1px solid rgba(239,68,68,0.2);color:#fca5a5}
    .toast-warning{background:#78350F;border:1px solid rgba(245,166,35,0.2);color:#fcd34d}
    .toast-info{background:#1e3a5f;border:1px solid rgba(59,130,246,0.2);color:#93c5fd}
    @keyframes toastIn{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}

    .toggle-wrap{display:flex;align-items:center;justify-content:space-between;padding:12px 0;cursor:pointer}
    .toggle-label{font-size:14px;font-weight:500}
    .toggle-sub{font-size:12px;color:var(--t3)}
    .toggle{width:46px;height:26px;background:var(--s3);border-radius:13px;position:relative;transition:background .2s;flex-shrink:0}
    .toggle.on{background:var(--gold)}
    .toggle-dot{position:absolute;top:3px;left:3px;width:20px;height:20px;background:#fff;border-radius:50%;transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,0.3)}
    .toggle.on .toggle-dot{transform:translateX(20px)}

    .table-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:0}
    .table-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:14px;position:relative;overflow:hidden;cursor:pointer}
    .table-card.active{border-color:rgba(245,166,35,0.4)}
    .table-card-num{font-family:'Outfit',sans-serif;font-size:24px;font-weight:800;color:var(--t1)}
    .table-card-info{font-size:11px;color:var(--t3);margin-top:2px}
    .table-card-status{position:absolute;top:10px;right:10px}
    .table-card-amount{font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;color:var(--gold);margin-top:8px}

    .kitchen-order{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px}
    .kitchen-order.urgent{border-color:rgba(239,68,68,0.4)}
    .kitchen-order-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    .kitchen-order-num{font-family:'Outfit',sans-serif;font-size:16px;font-weight:700}
    .kitchen-item{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border)}
    .kitchen-item:last-child{border-bottom:none}
    .kitchen-item-name{font-size:13px;font-weight:500}
    .kitchen-item-qty{font-size:13px;font-weight:700;color:var(--gold)}
    .kitchen-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}

    .search-wrap{position:relative;margin-bottom:12px}
    .search-inp{background:var(--s1);border:1px solid var(--border2);border-radius:var(--r2);padding:10px 14px 10px 40px;width:100%;font-size:14px;color:var(--t1)}
    .search-inp::placeholder{color:var(--t3)}
    .search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:16px;pointer-events:none}

    .subtabs{display:flex;gap:6px;overflow-x:auto;padding:0 0 12px;scrollbar-width:none}
    .subtabs::-webkit-scrollbar{display:none}
    .subtab{padding:8px 16px;border-radius:20px;font-size:12px;font-weight:700;white-space:nowrap;background:var(--s1);color:var(--t3);border:1px solid var(--border);flex-shrink:0;transition:all .15s;cursor:pointer}
    .subtab.active{background:var(--goldf);color:var(--gold);border-color:rgba(245,166,35,0.3)}

    .divider{height:1px;background:var(--border);margin:16px 0}
    .section-label{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}

    .empty{text-align:center;padding:48px 20px;color:var(--t3)}
    .empty-icon{font-size:48px;margin-bottom:12px}
    .empty-text{font-size:15px;font-weight:600;color:var(--t2);margin-bottom:6px}
    .empty-sub{font-size:13px}

    .avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
    .avatar-gold{background:var(--goldf);color:var(--gold)}

    .notif-item{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:10px;cursor:pointer}
    .notif-item.unread{background:rgba(245,166,35,0.04)}
    .notif-dot{width:8px;height:8px;border-radius:50%;background:var(--gold);flex-shrink:0;margin-top:5px}

    .role-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
    .role-btn{background:var(--s2);border:1px solid var(--border2);border-radius:var(--r);padding:16px;text-align:center;transition:all .15s;cursor:pointer}
    .role-btn:active{border-color:var(--gold);background:var(--goldf)}
    .role-btn-icon{font-size:28px;margin-bottom:6px}
    .role-btn-name{font-size:13px;font-weight:700;color:var(--t1)}
    .role-btn-sub{font-size:11px;color:var(--t3);margin-top:2px}

    .step-dots{display:flex;gap:6px;justify-content:center;margin-bottom:20px}
    .step-dot{width:8px;height:8px;border-radius:50%;background:var(--s3);transition:all .2s}
    .step-dot.active{background:var(--gold);width:24px;border-radius:4px}

    .alert{border-radius:var(--r2);padding:12px 14px;margin-bottom:12px;font-size:13px;display:flex;gap:8px;align-items:flex-start}
    .alert-warn{background:rgba(245,166,35,0.1);border:1px solid rgba(245,166,35,0.25);color:#fcd34d}
    .alert-info{background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.2);color:#93c5fd}
    .alert-error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:#fca5a5}

    .ob-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
    .ob-item:last-child{border-bottom:none}
    .ob-item-info{flex:1;min-width:0}
    .ob-item-name{font-size:13px;font-weight:600}
    .ob-item-price{font-size:12px;color:var(--gold)}
    .ob-qty{display:flex;align-items:center;gap:8px}
    .ob-qty-btn{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--s2);font-size:16px;font-weight:700;line-height:1;border:none;cursor:pointer;color:var(--t1);flex-shrink:0}
    .ob-qty-val{font-family:'Outfit',sans-serif;font-size:15px;font-weight:700;min-width:20px;text-align:center}

    .row{display:flex;gap:8px}
    .row>.field{flex:1}
    .mt8{margin-top:8px}
    .mt12{margin-top:12px}
    .mt16{margin-top:16px}
    .mb8{margin-bottom:8px}
    .mb12{margin-bottom:12px}
    .text-center{text-align:center}
    .text-gold{color:var(--gold)}
    .text-red{color:var(--red)}
    .text-green{color:var(--green)}
    .text-t2{color:var(--t2)}
    .text-t3{color:var(--t3)}
    .fw700{font-weight:700}
    .fs13{font-size:13px}
    .fs12{font-size:12px}
    .flex{display:flex}
    .flex-center{display:flex;align-items:center;justify-content:center}
    .flex-between{display:flex;align-items:center;justify-content:space-between}
    .flex-col{display:flex;flex-direction:column}
    .gap4{gap:4px}
    .gap8{gap:8px}
    .gap12{gap:12px}
    .w100{width:100%}
    .cursor{cursor:pointer}

    /* Correction 5 — table prête : animation de pulsation */
    @keyframes pulse-ready{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,0.5)}50%{box-shadow:0 0 0 8px rgba(34,197,94,0)}}
    .table-card.ready{border-color:var(--green)!important;animation:pulse-ready 1.8s ease infinite}
    .table-card.urgent-order{border-color:var(--red)!important;}

    .employee-header{
      display:flex;align-items:center;gap:0;
      background:var(--s1);border-bottom:1px solid var(--border);
      padding:12px 16px;position:sticky;top:0;z-index:10;
    }
  </style>

<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useCallback, useRef } = React;

    // ===================== UTILITIES =====================
    const fmt = (n) => {
      if (!n && n !== 0) return "0 GNF";
      return n.toLocaleString("fr-FR") + " GNF";
    };
    const genId = () => Math.random().toString(36).slice(2, 9);
    const genCode = () => {
      const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
      let r = "";
      for (let i = 0; i < 4; i++) r += chars[Math.floor(Math.random() * chars.length)];
      return "NXS-" + r;
    };
    const genPass = () => {
      const c = "ABCDEFGHJKMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789!@#$";
      let p = "";
      for (let i = 0; i < 8; i++) p += c[Math.floor(Math.random() * c.length)];
      return p;
    };
    const genLogin = (prenom, nom) => {
      const p = prenom.toLowerCase().replace(/\s/g,"").replace(/[^a-z]/g,"");
      const n = nom.toLowerCase().replace(/\s/g,"").replace(/[^a-z]/g,"");
      return p + "." + n;
    };
    const timeAgo = (ts) => {
      const diff = Date.now() - ts;
      if (diff < 60000) return "maintenant";
      if (diff < 3600000) return Math.floor(diff / 60000) + "min";
      return Math.floor(diff / 3600000) + "h";
    };
    const fmtTime = (ts) => {
      const d = new Date(ts);
      return d.getHours().toString().padStart(2,"0") + ":" + d.getMinutes().toString().padStart(2,"0");
    };
    const normalize = (s) => s ? s.toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g, "") : "";

    const ROLES = {
      admin:           { label: "Admin",     emoji: "👑" },
      admin_secondary: { label: "Admin",     emoji: "🔑" },
      serveur:         { label: "Serveur",   emoji: "🍽️" },
      cuisinier:       { label: "Cuisinier", emoji: "🍳" },
      barman:          { label: "Barman",    emoji: "🍸" },
      chichaman:       { label: "Chichaman", emoji: "💨" },
      caissier:        { label: "Caissier",  emoji: "💰" },
    };

    // Retourne true si un service est de type "production" (visible dans OrderBuilder, exclu de la Caisse)
    const isProductionService = (type) => ["cuisine","bar","chicha"].includes(type);
    // Retourne true si un service est la caisse
    const isCaisseService = (type) => type === "caisse";

    const initState = () => ({
      restaurants:   [],
      employees:     [],
      salles:        [],
      services:      [],
      menu:          [],
      tables:        [],
      orders:        [],
      payments:      [],
      notifications: [],
      adminNotifs:   [], // Notifications envoyées depuis le dashboard NexaServe
      emCounter:     0,
    });

    // ===================== WHATSAPP SUPPORT =====================
    const WHATSAPP_SUPPORT_NUMBER = "224620764405";

    function WhatsAppButton({ S }) {
      if (!S.user) return null;
      const r = S.myRestaurant;
      const msg = encodeURIComponent(`Bonjour NexaServe, j'ai besoin d'aide. Restaurant : ${r?.nom||"—"} · Code : ${r?.code||"—"}`);
      const url = `https://wa.me/${WHATSAPP_SUPPORT_NUMBER}?text=${msg}`;
      return (
        <a href={url} target="_blank" rel="noopener noreferrer"
          style={{position:"fixed",bottom:80,right:16,width:50,height:50,borderRadius:"50%",background:"#25D366",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,boxShadow:"0 4px 16px rgba(37,211,102,0.4)",zIndex:150,textDecoration:"none"}}>
          💬
        </a>
      );
    }

    // ===================== SUPABASE API LAYER =====================
    // URL de base des Edge Functions
    const SUPA_URL = "https://apqsldtzosodkunftixw.supabase.co/functions/v1";
    const ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFwcXNsZHR6b3NvZGt1bmZ0aXh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1NjQzMzgsImV4cCI6MjA5MzE0MDMzOH0.NU5q6jRt7LY3FcgwANwXc_ADtp8bPjhpNAkiATcX93o";

    // ── Correction 7 — File d'attente hors ligne ──────────────────────────────
    const OFFLINE_QUEUE_KEY = "nexaserve_offline_queue";
    const offlineQueue = {
      get: () => { try { return JSON.parse(localStorage.getItem(OFFLINE_QUEUE_KEY) || "[]"); } catch { return []; } },
      push: (action) => {
        const q = offlineQueue.get();
        q.push(action);
        try { localStorage.setItem(OFFLINE_QUEUE_KEY, JSON.stringify(q)); } catch(e) {}
      },
      clear: () => { try { localStorage.removeItem(OFFLINE_QUEUE_KEY); } catch(e) {} },
    };
    // ─────────────────────────────────────────────────────────────────────────

    const apiFetch = async (fn, method = "GET", body = null, params = {}) => {
      const url = new URL(`${SUPA_URL}/${fn}`);
      Object.entries(params).forEach(([k,v]) => v && url.searchParams.set(k, v));
      const opts = {
        method,
        headers: { "Content-Type": "application/json", "apikey": ANON_KEY, "Authorization": `Bearer ${ANON_KEY}` },
      };
      if (body) opts.body = JSON.stringify(body);
      const res = await fetch(url.toString(), opts);
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "Erreur API");
      return data;
    };

    // Normalise les noms de champs Supabase (snake_case) → app (camelCase)
    const fromDB = {
      restaurant: (r) => r ? ({
        id: r.id, code: r.code, nom: r.nom, adresse: r.adresse,
        description: r.description, telephone: r.telephone, email: r.email,
        secretQuestion: r.secret_question, secretAnswer: r.secret_answer,
        dateOuverture: r.date_ouverture, journeeOuverte: r.journee_ouverte,
        dateJournee: r.date_journee, adminId: r.admin_id,
        plan: r.plan || "essai",
        dateExpiration: r.date_expiration || null,
        statutAbo: r.statut_abo || "essai",
      }) : null,
      employee: (e) => e ? ({
        id: e.id, nom: e.nom, prenom: e.prenom, login: e.login,
        password: e.password_hash, role: e.role,
        salleIds: e.salle_ids || [], serviceId: e.service_id,
        restaurantId: e.restaurant_id, actif: e.actif,
        isAdmin: e.is_admin, isSuperAdmin: e.is_super_admin,
      }) : null,
      salle: (s) => s ? ({ id: s.id, nom: s.nom, restaurantId: s.restaurant_id }) : null,
      service: (s) => s ? ({
        id: s.id, nom: s.nom, type: s.type,
        salleIds: s.salle_ids || [], venteDirecte: s.vente_directe,
        restaurantId: s.restaurant_id,
      }) : null,
      menuItem: (m) => m ? ({
        id: m.id, nom: m.nom, prix: Number(m.prix), categorie: m.categorie,
        poste: m.poste || null,
        serviceId: m.service_id, restaurantId: m.restaurant_id,
        desactive: m.desactive || false, image: m.image || null,
      }) : null,
      table: (t) => t ? ({
        id: t.id, numero: t.numero, salleId: t.salle_id,
        serveurId: t.serveur_id, statut: t.statut,
        isTakeaway: t.is_takeaway, emNum: t.em_num,
        clientNom: t.client_nom, restaurantId: t.restaurant_id,
        createdAt: new Date(t.created_at).getTime(),
      }) : null,
      order: (o) => o ? ({
        id: o.id, tableId: o.table_id, serviceId: o.service_id,
        serveurId: o.serveur_id, statut: o.statut,
        isTakeaway: o.is_takeaway, urgent: o.urgent || false,
        note: o.note || null, items: o.items || [],
        restaurantId: o.restaurant_id,
        previousStatut: o.previous_statut || null,
        createdAt: new Date(o.created_at).getTime(),
      }) : null,
      payment: (p) => p ? ({
        id: p.id, tableId: p.table_id, caisserId: p.caissier_id,
        label: p.label, montant: Number(p.montant), subtotal: Number(p.subtotal),
        reductionAmt: Number(p.reduction_amt), reductionType: p.reduction_type,
        reductionVal: p.reduction_val, motif: p.motif,
        especes: Number(p.especes), carte: Number(p.carte), mobile: Number(p.mobile),
        monnaieRendue: Number(p.monnaie_rendue),
        itemsSnapshot: p.items_snapshot || [],
        restaurantId: p.restaurant_id,
        dateJournee: p.date_journee || null,
        ts: new Date(p.created_at).getTime(),
      }) : null,
      notification: (n) => n ? ({
        id: n.id, employeeId: n.employee_id, orderId: n.order_id,
        tableId: n.table_id, msg: n.msg, type: n.type, read: n.read,
        ts: new Date(n.created_at).getTime(),
      }) : null,
    };

    // Normalise app (camelCase) → Supabase (snake_case)
    const toDB = {
      restaurant: (r) => ({
        code: r.code, nom: r.nom, adresse: r.adresse,
        description: r.description, telephone: r.telephone, email: r.email,
        secret_question: r.secretQuestion, secret_answer: r.secretAnswer?.toLowerCase(),
        date_ouverture: r.dateOuverture, journee_ouverte: r.journeeOuverte ?? false,
        date_journee: r.dateJournee || null, admin_id: r.adminId || null,
      }),
      employee: (e) => ({
        prenom: e.prenom, nom: e.nom, login: e.login,
        password_hash: e.password, role: e.role,
        salle_ids: e.salleIds || [], service_id: e.serviceId || null,
        restaurant_id: e.restaurantId, actif: e.actif ?? true,
        is_admin: e.isAdmin ?? false, is_super_admin: e.isSuperAdmin ?? false,
      }),
      salle: (s) => ({ nom: s.nom, restaurant_id: s.restaurantId }),
      service: (s) => ({
        nom: s.nom, type: s.type, salle_ids: s.salleIds || [],
        vente_directe: s.venteDirecte ?? false, restaurant_id: s.restaurantId,
      }),
      menuItem: (m) => ({
        nom: m.nom, prix: m.prix, categorie: m.categorie || null,
        service_id: m.serviceId, restaurant_id: m.restaurantId,
        desactive: m.desactive ?? false, image: m.image || null,
      }),
      table: (t) => ({
        numero: t.numero, salle_id: t.salleId || null,
        serveur_id: t.serveurId, statut: t.statut || "libre",
        is_takeaway: t.isTakeaway ?? false, em_num: t.emNum || null,
        client_nom: t.clientNom || null, restaurant_id: t.restaurantId,
      }),
      order: (o) => ({
        table_id: o.tableId, service_id: o.serviceId,
        serveur_id: o.serveurId, statut: o.statut || "en_attente",
        is_takeaway: o.isTakeaway ?? false, urgent: o.urgent ?? false,
        note: o.note || null, items: o.items || [],
        previous_statut: o.previousStatut || null,
        restaurant_id: o.restaurantId,
      }),
      payment: (p) => ({
        table_id: p.tableId, caissier_id: p.caisserId,
        label: p.label, montant: p.montant, subtotal: p.subtotal,
        reduction_amt: p.reductionAmt || 0, reduction_type: p.reductionType || null,
        reduction_val: p.reductionVal || null, motif: p.motif || null,
        especes: p.especes || 0, carte: p.carte || 0, mobile: p.mobile || 0,
        monnaie_rendue: p.monnaieRendue || 0,
        items_snapshot: p.itemsSnapshot || [],
        restaurant_id: p.restaurantId,
        date_journee: p.dateJournee || null,
      }),
    };

    // API calls
    const api = {
      login: (code, login, password) => apiFetch("login", "POST", { code, login, password }),
      createRestaurant: (data) => apiFetch("restaurants", "POST", data),
      getRestaurant: (id) => apiFetch("restaurants", "GET", null, { id }),
      updateRestaurant: (id, data) => apiFetch("restaurants", "PATCH", { id, ...data }),
      getEmployees: (restaurant_id) => apiFetch("employees", "GET", null, { restaurant_id }),
      createEmployee: (data) => apiFetch("employees", "POST", data),
      updateEmployee: (id, data) => apiFetch("employees", "PATCH", { id, ...data }),
      deleteEmployee: (id) => apiFetch("employees", "DELETE", null, { id }),
      getSallesServices: (restaurant_id) => apiFetch("salles-services", "GET", null, { restaurant_id }),
      createSalle: (data) => apiFetch("salles-services", "POST", data),
      updateSalle: (id, data) => apiFetch("salles-services", "PATCH", { id, _table:"salles", ...data }),
      deleteSalle: (id) => apiFetch("salles-services", "DELETE", null, { id, table:"salles" }),
      createService: (data) => apiFetch("salles-services", "POST", data),
      updateService: (id, data) => apiFetch("salles-services", "PATCH", { id, _table:"services", ...data }),
      deleteService: (id) => apiFetch("salles-services", "DELETE", null, { id, table:"services" }),
      getMenu: (restaurant_id) => apiFetch("menu", "GET", null, { restaurant_id }),
      createMenuItem: (data) => apiFetch("menu", "POST", data),
      updateMenuItem: (id, data) => apiFetch("menu", "PATCH", { id, ...data }),
      deleteMenuItem: (id) => apiFetch("menu", "DELETE", null, { id }),
      getTables: (restaurant_id) => apiFetch("tables", "GET", null, { restaurant_id }),
      createTable: async (data) => {
        try { return await apiFetch("tables", "POST", data); }
        catch(e) { if (!navigator.onLine) { offlineQueue.push({ type:"createTable", data }); return data; } throw e; }
      },
      updateTable: (id, data) => apiFetch("tables", "PATCH", { id, ...data }),
      deleteTable: (id) => apiFetch("tables", "DELETE", null, { id }),
      getOrders: (restaurant_id) => apiFetch("orders", "GET", null, { restaurant_id }),
      createOrder: async (data) => {
        try { return await apiFetch("orders", "POST", data); }
        catch(e) { if (!navigator.onLine) { offlineQueue.push({ type:"createOrder", data }); return data; } throw e; }
      },
      updateOrder: (id, data) => apiFetch("orders", "PATCH", { id, ...data }),
      getPayments: (restaurant_id) => apiFetch("payments", "GET", null, { restaurant_id }),
      createPayment: async (payment, table_id, order_ids, is_takeaway) => {
        try { return await apiFetch("payments", "POST", { payment, table_id, order_ids, is_takeaway: is_takeaway ?? false }); }
        catch(e) { if (!navigator.onLine) { offlineQueue.push({ type:"createPayment", data:{ payment, table_id, order_ids, is_takeaway: is_takeaway ?? false } }); return payment; } throw e; }
      },
      getNotifications: (employee_id) => apiFetch("notifications", "GET", null, { employee_id }),
      markNotifRead: (id) => apiFetch("notifications", "PATCH", { id }),
      markAllNotifsRead: (employee_id) => apiFetch("notifications", "PATCH", { employee_id, read_all: true }),
    };

    // ===================== STORE =====================
    const LS_KEY      = "nexaserve_state_v2";
    const LS_USER_KEY = "nexaserve_user_v1"; // Fix 1 : clé pour persister la session

    const loadFromLS = () => {
      try {
        const raw = localStorage.getItem(LS_KEY);
        if (raw) { const parsed = JSON.parse(raw); if (parsed && parsed.restaurants) return parsed; }
      } catch(e) {}
      return null;
    };
    const saveToLS     = (s) => { try { localStorage.setItem(LS_KEY, JSON.stringify(s)); } catch(e) {} };
    const saveUserToLS = (u) => { try { if (u) localStorage.setItem(LS_USER_KEY, JSON.stringify(u)); else localStorage.removeItem(LS_USER_KEY); } catch(e) {} };
    const loadUserFromLS = () => { try { const r = localStorage.getItem(LS_USER_KEY); return r ? JSON.parse(r) : null; } catch(e) { return null; } };

    function useStore() {
      const [state, setState]    = useState(() => loadFromLS() || initState());
      const [user,  setUserState]= useState(() => loadUserFromLS()); // Fix 1 : restaurer session
      const [toasts,setToasts]   = useState([]);
      const [synced, setSynced]  = useState(false);

      const toast = useCallback((msg, type="info") => {
        const id = genId();
        setToasts(t => [...t, {id, msg, type}]);
        setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3200);
      }, []);
      // Correction 7 — exposer toast pour le handler WS hors contexte React
      React.useEffect(() => { window.__nexaToast = toast; }, [toast]);

      const update  = useCallback((fn) => setState(s => ({...s, ...fn(s)})), []);

      // Fix 1 : persister la session dans localStorage
      const setUser = (u) => {
        setUserState(u);
        saveUserToLS(u);
        setSynced(false);
        // Abonnement OneSignal automatique à la connexion
        if (u && window.OneSignalDeferred) {
          window.OneSignalDeferred.push(async function(OneSignal) {
            try {
              await OneSignal.Notifications.requestPermission();
              // Associer l'employé à son abonnement OneSignal
              if (u.id) {
                await OneSignal.login(u.id);
              }
            } catch(e) {}
          });
        }
        // Déconnexion OneSignal quand l'utilisateur se déconnecte
        if (!u && window.OneSignalDeferred) {
          window.OneSignalDeferred.push(async function(OneSignal) {
            try { await OneSignal.logout(); } catch(e) {}
          });
        }
      };

      // Envoyer une notification push via OneSignal REST API (depuis le frontend uniquement si besoin)
      // Les notifications sont principalement envoyées depuis les Edge Functions Supabase
      const sendPushNotif = async (employeeIds, message, url) => {
        if (!employeeIds || employeeIds.length === 0) return;
        try {
          await fetch("https://onesignal.com/api/v1/notifications", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              app_id: "d9cb7f25-a664-4046-b721-b2ea6f3f8235",
              include_aliases: { external_id: employeeIds },
              target_channel: "push",
              contents: { fr: message, en: message },
              url: url || "https://nexaserve-gold.vercel.app",
              chrome_web_icon: "/apple-touch-icon.png",
            })
          });
        } catch(e) {}
      };

      // Sauvegarder dans localStorage à chaque changement
      React.useEffect(() => { saveToLS(state); }, [state]);

      // Synchronisation cross-tab localStorage
      React.useEffect(() => {
        const onStorage = (e) => {
          if (e.key !== LS_KEY || !e.newValue) return;
          try {
            const next = JSON.parse(e.newValue);
            if (next && next.restaurants) setState(next);
          } catch(e2) {}
        };
        window.addEventListener("storage", onStorage);
        return () => window.removeEventListener("storage", onStorage);
      }, []);

      // Charger les données Supabase quand l'utilisateur est connecté
      const [criticalLoaded, setCriticalLoaded] = useState(false);
      const [wsConnected,    setWsConnected]    = useState(false); // A5+A6
      const wsConnectedRef = useRef(false); // Ref pour éviter closure stale dans setInterval

      React.useEffect(() => {
        if (!user) return;
        const rid = user.restaurantId;
        const loadFromSupabase = async () => {
          try {
            // F3 : charger tables+orders en PREMIER (données critiques)
            const [tablesData, ordersData] = await Promise.all([
              api.getTables(rid),
              api.getOrders(rid),
            ]);
            setState(s => ({
              ...s,
              tables: (tablesData || []).map(fromDB.table),
              orders: (ordersData || []).map(fromDB.order),
            }));
            setCriticalLoaded(true); // F3 : interface disponible immédiatement

            // Charger le reste en arrière-plan sans bloquer l'interface
            const [empData, ssData, menuData, paymentsData, notifData] = await Promise.all([
              api.getEmployees(rid),
              api.getSallesServices(rid),
              api.getMenu(rid),
              api.getPayments(rid),
              api.getNotifications(user.id),
            ]);

            // Charger les notifications NexaServe uniquement pour l'admin du restaurant
            const SUPA_REST = "https://apqsldtzosodkunftixw.supabase.co";
            const isRestaurantAdmin = user.isSuperAdmin || user.role === "admin" || user.role === "admin_secondary";
            const adminNotifRaw = isRestaurantAdmin ? await fetch(
              `${SUPA_REST}/rest/v1/nexaserve_notifications?restaurant_id=eq.${rid}&order=created_at.desc&limit=20`,
              { headers: { "apikey": ANON_KEY, "Authorization": `Bearer ${ANON_KEY}` } }
            ).then(r => r.ok ? r.json() : []).catch(() => []) : [];

            setState(s => ({
              ...s,
              employees:     (empData || []).map(fromDB.employee),
              salles:        (ssData.salles || []).map(fromDB.salle),
              services:      (ssData.services || []).map(fromDB.service),
              menu:          (menuData || []).map(fromDB.menuItem),
              payments:      (paymentsData || []).map(fromDB.payment),
              notifications: (notifData || []).map(fromDB.notification),
              adminNotifs:   Array.isArray(adminNotifRaw) ? adminNotifRaw.map(n => ({
                id: n.id, titre: n.titre, message: n.message, type: n.type||"info",
                lu: n.lu||false, createdAt: new Date(n.created_at).getTime(),
              })) : [],
            }));
            setSynced(true);
          } catch(err) {
            console.warn("Supabase load failed:", err);
            setCriticalLoaded(true);
            setSynced(true);
          }
        };
        loadFromSupabase();
      }, [user]);

      // Realtime WebSocket Supabase — protocole v2 correct
      React.useEffect(() => {
        if (!user || !criticalLoaded) return;
        const rid = user.restaurantId;

        const REALTIME_URL = `wss://apqsldtzosodkunftixw.supabase.co/realtime/v1/websocket?apikey=${ANON_KEY}&vsn=1.0.0`;
        let ws = null;
        let heartbeat = null;
        let reconnectTimeout = null;
        let refCount = 0;
        let reloadTimers = {};

        const debouncedReload = (key, fn) => {
          if (reloadTimers[key]) clearTimeout(reloadTimers[key]);
          reloadTimers[key] = setTimeout(fn, 300);
        };

        const connect = () => {
          try {
            ws = new WebSocket(REALTIME_URL);

            ws.onopen = async () => {
              setWsConnected(true); wsConnectedRef.current = true;
              refCount = 0;
              // Correction 7 — Rejouer les actions en attente hors ligne
              const queue = offlineQueue.get();
              if (queue.length > 0) {
                setState(s => s); // trigger toast via ref
                try {
                  const toastFn = window.__nexaToast;
                  if (toastFn) toastFn("🔄 Synchronisation des données hors ligne en cours", "info");
                } catch(e) {}
                for (const action of queue) {
                  try {
                    if (action.type === "createTable") await api.createTable(action.data);
                    else if (action.type === "createOrder") await api.createOrder(action.data);
                    else if (action.type === "createPayment") await api.createPayment(action.data);
                  } catch(e) { console.warn("Offline replay failed:", action, e); }
                }
                offlineQueue.clear();
                try {
                  const toastFn = window.__nexaToast;
                  if (toastFn) toastFn("✅ Données synchronisées", "success");
                } catch(e) {}
              }
              const joinRef = String(++refCount);
              // Un seul channel avec tous les postgres_changes
              ws.send(JSON.stringify({
                topic: "realtime:nexaserve_" + rid,
                event: "phx_join",
                payload: {
                  config: {
                    broadcast: { self: false },
                    presence: { key: "" },
                    postgres_changes: [
                      { event: "*", schema: "public", table: "orders",                   filter: "restaurant_id=eq." + rid },
                      { event: "*", schema: "public", table: "tables",                   filter: "restaurant_id=eq." + rid },
                      { event: "*", schema: "public", table: "notifications"                                               },
                      { event: "*", schema: "public", table: "payments",                 filter: "restaurant_id=eq." + rid },
                      { event: "*", schema: "public", table: "nexaserve_notifications",  filter: "restaurant_id=eq." + rid },
                      { event: "*", schema: "public", table: "restaurants",              filter: "id=eq." + rid            },
                      { event: "*", schema: "public", table: "employees",                filter: "restaurant_id=eq." + rid },
                      { event: "*", schema: "public", table: "salles",                   filter: "restaurant_id=eq." + rid },
                      { event: "*", schema: "public", table: "services",                 filter: "restaurant_id=eq." + rid },
                      { event: "*", schema: "public", table: "menu",                     filter: "restaurant_id=eq." + rid },
                    ]
                  }
                },
                ref: joinRef,
                join_ref: joinRef,
              }));

              // Heartbeat toutes les 25s
              heartbeat = setInterval(() => {
                if (ws && ws.readyState === WebSocket.OPEN) {
                  ws.send(JSON.stringify({ topic: "phoenix", event: "heartbeat", payload: {}, ref: String(++refCount) }));
                }
              }, 25000);
            };

            ws.onmessage = async (evt) => {
              try {
                const msg = JSON.parse(evt.data);
                if (!msg || msg.event === "phx_reply" || msg.event === "presence_state" || msg.event === "presence_diff") return;
                if (msg.event !== "postgres_changes") return;
                const changedTable = msg.payload?.data?.table;
                if (!changedTable) return;
                if (changedTable === "orders") {
                  lastPollTs = Date.now(); // WS actif — reporter le polling
                  // Mise à jour instantanée depuis le payload WS
                  const eventType = msg.payload?.data?.type; // INSERT, UPDATE, DELETE
                  const record    = msg.payload?.data?.record;
                  if (record && eventType !== "DELETE") {
                    const updatedOrder = fromDB.order(record);
                    setState(s => {
                      const exists = s.orders.some(o => o.id === updatedOrder.id);
                      return {
                        ...s,
                        orders: exists
                          ? s.orders.map(o => o.id === updatedOrder.id ? updatedOrder : o)
                          : [...s.orders, updatedOrder],
                      };
                    });
                  } else if (eventType === "DELETE" && record?.id) {
                    setState(s => ({...s, orders: s.orders.filter(o => o.id !== record.id)}));
                  } else {
                    // Fallback API si pas de record dans le payload
                    debouncedReload("orders", async () => {
                      const data = await api.getOrders(rid);
                      setState(s => ({...s, orders:(data||[]).map(fromDB.order)}));
                    });
                  }
                } else if (changedTable === "tables") {
                  lastPollTs = Date.now(); // WS actif — reporter le polling
                  // Mise à jour instantanée depuis le payload WS
                  const eventType = msg.payload?.data?.type;
                  const record    = msg.payload?.data?.record;
                  if (record && eventType !== "DELETE") {
                    const updatedTable = fromDB.table(record);
                    setState(s => {
                      const exists = s.tables.some(t => t.id === updatedTable.id);
                      return {
                        ...s,
                        tables: exists
                          ? s.tables.map(t => t.id === updatedTable.id ? updatedTable : t)
                          : [...s.tables, updatedTable],
                      };
                    });
                  } else if (eventType === "DELETE" && record?.id) {
                    setState(s => ({...s, tables: s.tables.filter(t => t.id !== record.id)}));
                  } else {
                    debouncedReload("tables", async () => {
                      const data = await api.getTables(rid);
                      setState(s => ({...s, tables:(data||[]).map(fromDB.table)}));
                    });
                  }
                } else if (changedTable === "notifications") {
                  debouncedReload("notifications", async () => {
                    const data = await api.getNotifications(user.id);
                    setState(s => ({...s, notifications:(data||[]).map(fromDB.notification)}));
                  });
                } else if (changedTable === "payments") {
                  debouncedReload("payments", async () => {
                    // Recharger payments + tables + orders simultanément
                    // car un paiement supprime la table et les commandes en base
                    const [paymentsData, tablesData, ordersData] = await Promise.all([
                      api.getPayments(rid),
                      api.getTables(rid),
                      api.getOrders(rid),
                    ]);
                    setState(s => ({
                      ...s,
                      payments: (paymentsData||[]).map(fromDB.payment),
                      tables:   (tablesData||[]).map(fromDB.table),
                      orders:   (ordersData||[]).map(fromDB.order),
                    }));
                  });
                } else if (changedTable === "restaurants") {
                  // Vérifier si le statut d'abonnement a changé → déconnecter si suspendu/expiré
                  debouncedReload("restaurants", async () => {
                    try {
                      const SUPA_REST = "https://apqsldtzosodkunftixw.supabase.co";
                      const raw = await fetch(
                        `${SUPA_REST}/rest/v1/restaurants?id=eq.${rid}&select=statut_abo,date_expiration`,
                        { headers: { "apikey": ANON_KEY, "Authorization": `Bearer ${ANON_KEY}` } }
                      ).then(r => r.ok ? r.json() : []).catch(() => []);
                      if (raw && raw[0]) {
                        const statut = raw[0].statut_abo;
                        const dateExp = raw[0].date_expiration ? new Date(raw[0].date_expiration) : null;
                        const estExpire = dateExp && dateExp < new Date();
                        if (statut === "suspendu" || statut === "expire" || estExpire) {
                          // Déconnecter immédiatement
                          setState(s => ({...s, user: null}));
                          localStorage.removeItem("nexaserve_user");
                          const msgAlert = statut === "essai" && estExpire
                            ? "⏰ Votre période d'essai est terminée. Contactez NexaServe pour vous abonner."
                            : "⛔ Votre accès a été suspendu ou expiré. Contactez NexaServe au +224 620 764 405.";
                          alert(msgAlert);
                        } else {
                          // Mettre à jour le restaurant dans le state
                          setState(s => ({
                            ...s,
                            restaurants: s.restaurants.map(r => r.id === rid ? {...r, statutAbo: statut, dateExpiration: raw[0].date_expiration} : r)
                          }));
                        }
                      }
                    } catch(e) {}
                  });
                } else if (changedTable === "employees") {
                  debouncedReload("employees", async () => {
                    const data = await api.getEmployees(rid);
                    setState(s => ({...s, employees:(data||[]).map(fromDB.employee)}));
                  });
                } else if (changedTable === "salles" || changedTable === "services") {
                  debouncedReload("sallesServices", async () => {
                    const data = await api.getSallesServices(rid);
                    setState(s => ({...s, salles:(data.salles||[]).map(fromDB.salle), services:(data.services||[]).map(fromDB.service)}));
                  });
                } else if (changedTable === "menu") {
                  debouncedReload("menu", async () => {
                    const data = await api.getMenu(rid);
                    setState(s => ({...s, menu:(data||[]).map(fromDB.menuItem)}));
                  });
                } else if (changedTable === "nexaserve_notifications") {
                  // Recharger les messages admin uniquement pour les admins du restaurant
                  debouncedReload("adminNotifs", async () => {
                    const SUPA_REST = "https://apqsldtzosodkunftixw.supabase.co";
                    const raw = await fetch(
                      `${SUPA_REST}/rest/v1/nexaserve_notifications?restaurant_id=eq.${rid}&order=created_at.desc&limit=20`,
                      { headers: { "apikey": ANON_KEY, "Authorization": `Bearer ${ANON_KEY}` } }
                    ).then(r => r.ok ? r.json() : []).catch(() => []);
                    if (Array.isArray(raw)) {
                      setState(s => ({
                        ...s,
                        adminNotifs: raw.map(n => ({
                          id: n.id, titre: n.titre, message: n.message, type: n.type||"info",
                          lu: n.lu||false, createdAt: new Date(n.created_at).getTime(),
                        }))
                      }));
                    }
                  });
                }
              } catch(e) {}
            };

            ws.onclose = () => {
              setWsConnected(false); wsConnectedRef.current = false;
              clearInterval(heartbeat);
              heartbeat = null;
              reconnectTimeout = setTimeout(connect, 1000);
            };

            ws.onerror = () => { ws.close(); };
          } catch(e) {
            reconnectTimeout = setTimeout(connect, 1000);
          }
        };

        connect();

        // Polling universel toutes les 3s — toujours actif pour tous les services
        // Utilise wsConnectedRef (pas wsConnected) pour éviter le bug de closure stale
        let lastPollTs = 0;
        const safePoll = setInterval(async () => {
          try {
            const now = Date.now();
            // Si WS connecté et dernier event WS < 4s, skip (WS gère déjà)
            // Si WS déconnecté ou silencieux > 4s, recharger
            if (wsConnectedRef.current && (now - lastPollTs) < 4000) return;
            lastPollTs = now;
            const [ordersData, tablesData] = await Promise.all([
              api.getOrders(rid),
              api.getTables(rid),
            ]);
            setState(s => ({
              ...s,
              orders: (ordersData||[]).map(fromDB.order),
              tables: (tablesData||[]).map(fromDB.table),
            }));
          } catch(e) {}
        }, 3000);

        // Vérification automatique expiration toutes les minutes
        // Déconnecte automatiquement si essai ou abonnement expiré pendant la session
        const expirationCheck = setInterval(() => {
          const r = S?.myRestaurant;
          if (!r) return;
          const statut = r.statutAbo || "essai";
          const dateExp = r.dateExpiration ? new Date(r.dateExpiration) : null;
          const estExpire = dateExp && dateExp < new Date();
          if (statut === "suspendu" || statut === "expire" || estExpire) {
            clearInterval(expirationCheck);
            setState(s => ({...s, user: null}));
            localStorage.removeItem("nexaserve_user");
            const msg = (statut === "essai" && estExpire)
              ? "⏰ Votre période d'essai est terminée. Contactez NexaServe pour vous abonner au +224 620 764 405."
              : "⛔ Votre accès a expiré ou été suspendu. Contactez NexaServe au +224 620 764 405.";
            alert(msg);
          }
        }, 60000); // vérification toutes les 60 secondes

        return () => {
          clearInterval(heartbeat);
          clearInterval(safePoll);
          clearInterval(expirationCheck);
          clearTimeout(reconnectTimeout);
          Object.values(reloadTimers).forEach(clearTimeout);
          if (ws) { ws.onclose = null; ws.onerror = null; ws.close(); }
        };
      }, [user, criticalLoaded]);

      const getRestaurant = (id) => state.restaurants.find(r => r.id === id);
      const myRestaurant  = user ? getRestaurant(user.restaurantId) : null;
      const myEmployees   = user ? state.employees.filter(e => e.restaurantId === user.restaurantId && e.id !== user.id) : [];
      const mySalles      = user ? state.salles.filter(s => s.restaurantId === user.restaurantId) : [];
      const myServices    = user ? state.services.filter(s => s.restaurantId === user.restaurantId) : [];
      const myMenu        = user ? state.menu.filter(m => m.restaurantId === user.restaurantId) : [];
      const myTables      = user ? state.tables.filter(t => t.restaurantId === user.restaurantId) : [];
      const myOrders      = user ? state.orders.filter(o => o.restaurantId === user.restaurantId) : [];
      const myPayments    = user ? state.payments.filter(p => p.restaurantId === user.restaurantId) : [];
      const myNotifs      = user ? state.notifications.filter(n => n.employeeId === user.id) : [];
      const unreadNotifs  = myNotifs.filter(n => !n.read).length;
      const myAdminNotifs = (state.adminNotifs || []);
      const unreadAdmin   = (user?.isSuperAdmin || user?.role === "admin" || user?.role === "admin_secondary")
        ? myAdminNotifs.filter(n => !n.lu).length : 0;
      const totalUnread   = unreadNotifs + unreadAdmin;

      return {
        state, user, toasts, toast, update, setUser, getRestaurant,
        myRestaurant, myEmployees, mySalles, myServices, myMenu,
        myTables, myOrders, myPayments, myNotifs, unreadNotifs,
        myAdminNotifs, unreadAdmin, totalUnread,
        synced, criticalLoaded, wsConnected,
        // Helper : exécute une action API + met à jour le state local
        syncAction: async (apiCall, localFallback) => {
          try {
            await apiCall();
          } catch(e) {
            console.warn("API sync failed, local only:", e);
          }
          localFallback();
        },
      };
    }

    function LoginForm({ S, onForgotPass, onForgotCode }) {
      const [code,     setCode]    = useState("");
      const [login,    setLogin]   = useState("");
      const [pass,     setPass]    = useState("");
      const [showPass, setShowPass]= useState(false);
      const [loading,  setLoading] = useState(false);

      const submit = async () => {
        setLoading(true);
        try {
          // Tenter d'abord via Supabase
          const { employee, restaurant } = await api.login(code, login, pass);
          const emp = fromDB.employee(employee);
          const rest = fromDB.restaurant(restaurant);

          // BLOCAGE : vérifier le statut d'abonnement avant d'autoriser l'accès
          const statut = rest.statutAbo || "essai";
          const dateExp = rest.dateExpiration ? new Date(rest.dateExpiration) : null;
          const estExpire = dateExp && dateExp < new Date();

          if (statut === "suspendu") {
            S.toast("⛔ Ce compte est suspendu. Contactez NexaServe au +224 620 764 405.", "error");
            setLoading(false); return;
          }
          if (statut === "expire") {
            S.toast("⛔ Abonnement expiré. Contactez NexaServe pour renouveler.", "error");
            setLoading(false); return;
          }
          // Vérifier expiration par date — s'applique à tous les plans y compris essai
          if (estExpire) {
            const msgExpire = (statut === "essai")
              ? "⏰ Votre période d'essai est terminée. Contactez NexaServe pour vous abonner au +224 620 764 405."
              : "⛔ Abonnement expiré. Contactez NexaServe pour renouveler au +224 620 764 405.";
            S.toast(msgExpire, "error");
            setLoading(false); return;
          }

          // Charger aussi les employés du restaurant
          const empData = await api.getEmployees(restaurant.id);
          S.update(s => ({
            ...s,
            restaurants: [rest, ...s.restaurants.filter(r => r.id !== rest.id)],
            employees: [emp, ...empData.filter(e => e.id !== employee.id).map(fromDB.employee)],
          }));
          S.setUser(emp);
        } catch(err) {
          // Fallback localStorage (mode démo)
          const r = S.state.restaurants.find(x => x.code?.toUpperCase() === code.toUpperCase());
          if (!r) { S.toast("Code restaurant introuvable", "error"); setLoading(false); return; }
          const emp = S.state.employees.find(e => e.restaurantId === r.id && e.login === login && e.password === pass && e.actif);
          if (!emp) { S.toast("Identifiants incorrects", "error"); setLoading(false); return; }
          S.setUser(emp);
        }
        setLoading(false);
      };

      return (
        <div className="auth-card">
          <h2 className="auth-title">Connexion</h2>
          <p className="auth-sub">Saisissez votre code restaurant et vos identifiants</p>
          <FieldInp label="Code restaurant" value={code} onChange={setCode} placeholder="NXS-XXXX" />
          <FieldInp label="Email ou identifiant" value={login} onChange={setLogin} placeholder="prenom.nom ou email" />
          <FieldInp label="Mot de passe" value={pass} onChange={setPass}
            type={showPass?"text":"password"} placeholder="••••••••"
            iconRight={showPass?"🙈":"👁️"} onIconRight={() => setShowPass(!showPass)} />
          <button className="btn btn-gold" onClick={submit} disabled={loading}>{loading?"Connexion...":"Se connecter"}</button>
          <div style={{display:"flex",gap:8,marginTop:12,justifyContent:"center",flexWrap:"wrap"}}>
            <button style={{fontSize:13,color:"var(--gold)",background:"none",border:"none",cursor:"pointer"}} onClick={onForgotPass}>Mot de passe oublié ?</button>
            <span style={{color:"var(--t3)"}}>·</span>
            <button style={{fontSize:13,color:"var(--gold)",background:"none",border:"none",cursor:"pointer"}} onClick={onForgotCode}>Code oublié ?</button>
          </div>
        </div>
      );
    }

      const [step, setStep] = useState(1);

      const [showP2, setShowP2] = useState(false);
      const [code,   setCode]   = useState("");
      const [done,   setDone]   = useState(false);
      const [pendingAdmin, setPendingAdmin] = useState(null);
      const set = k => v => setF(x => ({...x,[k]:v}));

      const submit = async () => {
        if (!f.nom||!f.prenom||!f.restaurantNom||!f.email||!f.password) { S.toast("Champs obligatoires manquants","error"); return; }

        if (!f.question||!f.answer) { S.toast("Question secrète obligatoire","error"); return; }
        try {

            telephone: f.telephone, email: f.email,
            secret_question: f.question, secret_answer: f.answer.toLowerCase(),
            date_ouverture: f.dateOuverture,
            admin: { prenom: f.prenom, nom: f.nom, email: f.email, password: f.password },
          });
          const rest = fromDB.restaurant(restaurant);
          const emp  = fromDB.employee(employee);
          setCode(rest.code);
          S.update(s => ({ restaurants:[rest,...s.restaurants], employees:[emp,...s.employees] }));
          setPendingAdmin(emp);
          setDone(true);
        } catch(err) {
          // Bloquer si email déjà existant (code 409)
          if (err.message === 'EMAIL_ALREADY_EXISTS') {
            S.toast("❌ Cette adresse email est déjà utilisée. Connectez-vous ou utilisez un autre email.", "error");
            return;
          }
          // Fallback localStorage
          const rId = genId();
          const c   = genCode();
          setCode(c);
          const restaurant = { id:rId, code:c, nom:f.restaurantNom, adresse:f.adresse, description:f.description, telephone:f.telephone, email:f.email, secretQuestion:f.question, secretAnswer:f.answer.toLowerCase(), dateOuverture:f.dateOuverture, journeeOuverte:false, dateJournee:null, adminId:null };
          const admin      = { id:genId(), nom:f.nom, prenom:f.prenom, login:f.email, password:f.password, role:"admin", salleIds:[], serviceId:null, restaurantId:rId, actif:true, isAdmin:true, isSuperAdmin:true };
          restaurant.adminId = admin.id;
          S.update(s => ({ restaurants:[...s.restaurants,restaurant], employees:[...s.employees,admin] }));
          setPendingAdmin(admin);
          setDone(true);
        }
      };

      if (done) return (
        <div className="auth-card">
          <div style={{textAlign:"center",marginBottom:16}}>
            <div style={{fontSize:48}}>🎉</div>
            <h2 className="auth-title" style={{marginTop:8}}>Restaurant créé !</h2>
            <p className="auth-sub">Notez votre code restaurant</p>
          </div>
          <CodeBox label="Votre code restaurant" value={code} S={S} />
          <div className="alert alert-warn" style={{marginTop:12}}>⚠️ Conservez ce code. Vos employés en ont besoin pour se connecter.</div>
          <button className="btn btn-gold mt16" onClick={() => { if (pendingAdmin) S.setUser(pendingAdmin); }}>Accéder au dashboard →</button>
        </div>
      );

      return (
        <div className="auth-card">
          <h2 className="auth-title">Inscription</h2>
          <p className="auth-sub">Créez votre espace restaurant</p>
          <div className="step-dots">{[1,2,3].map(i => <div key={i} className={`step-dot${step>=i?" active":""}`} />)}</div>
          {step === 1 && <>
            <div className="row">
              <FieldInp label="Prénom" value={f.prenom} onChange={set("prenom")} placeholder="Mamadou" required />
              <FieldInp label="Nom"    value={f.nom}    onChange={set("nom")}    placeholder="Diallo"   required />
            </div>
            <FieldInp label="Nom du restaurant" value={f.restaurantNom} onChange={set("restaurantNom")} placeholder="Le Palais Guinéen" required />
            <FieldInp label="Adresse"     value={f.adresse}     onChange={set("adresse")}     placeholder="Ratoma, Conakry" />
            <FieldInp label="Description" value={f.description} onChange={set("description")} placeholder="Description courte..." />
            <button className="btn btn-gold" onClick={() => { if (!f.prenom||!f.nom||!f.restaurantNom){S.toast("Champs obligatoires","error");return;} setStep(2); }}>Suivant</button>
          </>}
          {step === 2 && <>
            <FieldInp label="Téléphone" value={f.telephone} onChange={set("telephone")} placeholder="+224 620 000 000" />
            <FieldInp label="Email"     value={f.email}     onChange={set("email")}     type="email" placeholder="admin@restaurant.com" required />
            <FieldInp label="Mot de passe"          value={f.password}  onChange={set("password")}  type={showP?"text":"password"}  placeholder="Min 6 caractères" iconRight={showP?"🙈":"👁️"}  onIconRight={() => setShowP(!showP)}   required />
            <FieldInp label="Confirmer mot de passe" value={f.password2} onChange={set("password2")} type={showP2?"text":"password"} placeholder="Idem ci-dessus"  iconRight={showP2?"🙈":"👁️"} onIconRight={() => setShowP2(!showP2)} required />
            <div className="flex" style={{gap:8}}>
              <button className="btn btn-ghost" onClick={() => setStep(1)}>Retour</button>
              <button className="btn btn-gold"  onClick={() => { if (!f.email||!f.password){S.toast("Champs obligatoires","error");return;} if(f.password!==f.password2){S.toast("Mots de passe différents","error");return;} setStep(3); }}>Suivant</button>
            </div>
          </>}
          {step === 3 && <>
            <SelectQuestion value={f.question} onChange={set("question")} />
            <FieldInp label="Réponse secrète"  value={f.answer}   onChange={set("answer")}   placeholder="Réponse..." required />
            <FieldInp label="Date d'ouverture du service" value={f.dateOuverture} onChange={set("dateOuverture")} type="date" />
            <div className="flex" style={{gap:8}}>
              <button className="btn btn-ghost" onClick={() => setStep(2)}>Retour</button>
              <button className="btn btn-gold"  onClick={submit}>Créer mon restaurant</button>
            </div>
          </>}
        </div>
      );
    }

    function ForgotPass({ S, onBack }) {
      const [step, setStep]        = useState(1);
      const [restaurantCode, setRC]= useState("");
      const [answer, setAnswer]    = useState("");
      const [pass,   setPass]      = useState("");
      const [pass2,  setPass2]     = useState("");
      const [restaurant, setResto] = useState(null);

      const step1 = () => {
        const r = S.state.restaurants.find(x => x.code.toUpperCase() === restaurantCode.toUpperCase());
        if (!r) { S.toast("Code introuvable","error"); return; }
        setResto(r); setStep(2);
      };
      const step2 = () => {
        if (answer.toLowerCase() !== restaurant.secretAnswer) { S.toast("Réponse incorrecte","error"); return; }
        setStep(3);
      };
      const step3 = () => {
        if (pass !== pass2) { S.toast("Mots de passe différents","error"); return; }
        if (pass.length < 6) { S.toast("Trop court","error"); return; }
        S.update(s => ({ employees: s.employees.map(e => e.restaurantId===restaurant.id && e.role==="admin" ? {...e,password:pass} : e) }));
        S.toast("Mot de passe modifié !","success"); onBack();
      };

      return (
        <div className="app-body no-nav">
          <div className="auth-wrap">
            <div className="auth-logo"><h1>NexaServe</h1></div>
            <div className="auth-card">
              <h2 className="auth-title">Mot de passe oublié</h2>
              <div className="step-dots">{[1,2,3].map(i => <div key={i} className={`step-dot${step>=i?" active":""}`} />)}</div>
              {step===1 && <><FieldInp label="Code restaurant" value={restaurantCode} onChange={setRC} placeholder="NXS-XXXX" /><button className="btn btn-gold" onClick={step1}>Suivant</button></>}
              {step===2 && <><p style={{fontSize:13,color:"var(--t2)",marginBottom:12}}>{restaurant?.secretQuestion}</p><FieldInp label="Votre réponse" value={answer} onChange={setAnswer} placeholder="..." /><button className="btn btn-gold" onClick={step2}>Valider</button></>}
              {step===3 && <><FieldInp label="Nouveau mot de passe" value={pass}  onChange={setPass}  type="password" /><FieldInp label="Confirmer" value={pass2} onChange={setPass2} type="password" /><button className="btn btn-gold" onClick={step3}>Enregistrer</button></>}
              <button className="btn btn-ghost mt8" onClick={onBack}>Retour</button>
            </div>
          </div>
        </div>
      );
    }

    // ===================== TABLES PAGE =====================
    function calcTableTotal(S, tableId) {
      const orders = S.myOrders.filter(o => o.tableId === tableId && !["rejete","annule"].includes(o.statut));
      let total = 0;
      orders.forEach(o => o.items.forEach(item => {
        const m = S.myMenu.find(x => x.id === item.menuId);
        if (m) total += m.prix * item.quantite;
      }));
      return total;
    }

    function CreateTableSheet({ open, onClose, S }) {
      const [numero,  setNumero]  = useState("");
      const [salleId, setSalleId] = useState("");
      const isAdmin = S.user.role==="admin"||S.user.role==="admin_secondary";
      // C1 : le serveur ne voit que ses salles assignées
      const sallesDisponibles = isAdmin
        ? S.mySalles
        : S.mySalles.filter(s => S.user.salleIds?.includes(s.id));

      const submit = async () => {
        if (!numero.trim()||!salleId) { S.toast("Champs obligatoires","error"); return; }
        const tempId = "tmp_" + genId();
        const tableLocal = { id:tempId, numero:numero.trim(), salleId, restaurantId:S.user.restaurantId, statut:"libre", serveurId:S.user.id, isTakeaway:false, createdAt:Date.now() };
        // Fix 2 : ajouter localement immédiatement avec id temporaire
        S.update(s => ({ tables:[...s.tables, tableLocal] }));
        try {
          // Sauvegarder sur Supabase et remplacer le tmp par le vrai ID
          const dbTable = await api.createTable(toDB.table(tableLocal));
          const appTable = fromDB.table(dbTable);
          S.update(s => ({ tables:s.tables.map(t => t.id===tempId ? appTable : t) }));
        } catch(e) {
          console.warn("createTable sync failed:", e);
        }
        S.toast("Table créée","success");
        setNumero(""); setSalleId(""); onClose();
      };

      return (
        <Sheet open={open} onClose={onClose} title="Nouvelle table"
          footer={<><button className="btn btn-ghost" onClick={onClose}>Annuler</button><button className="btn btn-gold" onClick={submit}>Créer</button></>}>
          {/* C5 : type="text" — accepte VIP-1, Terrasse Gauche, 12, etc. */}
          <FieldInp label="Identifiant de la table" value={numero} onChange={setNumero} type="text" placeholder='Ex : 1, VIP-1, Terrasse Gauche...' required />
          <div className="field">
            <label>Salle *</label>
            <select className="inp" value={salleId} onChange={e => setSalleId(e.target.value)}>
              <option value="">Choisir...</option>

            </select>
          </div>
        </Sheet>
      );

      // F4 — Demande d'annulation par le serveur
      const demanderAnnulation = async (order) => {
        const serveur = S.state.employees.find(e => e.id===S.user.id);
        const nomServeur = serveur ? `${serveur.prenom} ${serveur.nom}` : "Serveur";
        const msg = `⚠️ Annulation demandée — ${label} par ${nomServeur}`;
        const newNotifs = [];
        S.update(s => {
          const notifications = [...s.notifications];
          const orders = s.orders.map(o => {
            if (o.id !== order.id) return o;
            const service = s.services.find(srv => srv.id===o.serviceId);
            if (service) {
              const productionEmp = s.employees.find(e => e.serviceId===service.id && e.actif);
              if (productionEmp) {
                const n = { id:genId(), employeeId:productionEmp.id, orderId:o.id, tableId:o.tableId, msg, type:"error", read:false, ts:Date.now() };
                notifications.push(n);
                newNotifs.push(n);
              }
            }
            const adminEmp = s.employees.find(e => e.restaurantId===S.user.restaurantId && e.isSuperAdmin);
            if (adminEmp) {
              const n = { id:genId(), employeeId:adminEmp.id, orderId:o.id, tableId:o.tableId, msg, type:"error", read:false, ts:Date.now() };
              notifications.push(n);
              newNotifs.push(n);
            }
            return {...o, statut:"annulation_demandee", previousStatut:o.statut};
          });
          return {orders, notifications};
        });
        try {
          await api.updateOrder(order.id, {statut:"annulation_demandee"});
          if (newNotifs.length > 0) {
            await apiFetch("notifications", "POST", newNotifs.map(n => ({
              employee_id: n.employeeId,
              order_id:    n.orderId,
              table_id:    n.tableId,
              msg:         n.msg,
              type:        n.type,
            })));
          }
        } catch(e) {}
        setAnnulationConfirm(null);
        S.toast("Demande d'annulation envoyée","info");

        S.update(s => ({ tables:s.tables.filter(t => t.id!==table.id), orders:s.orders.filter(o => o.tableId!==table.id) }));
        try { await api.deleteTable(table.id); } catch(e) { console.warn("deleteTable sync failed:", e); }
        onClose(); S.toast("Table supprimée","success");
      };

      const markOccupee = async () => {
        S.update(s => ({ tables:s.tables.map(t => t.id===table.id?{...t,statut:"occupee"}:t) }));
        try { await api.updateTable(table.id, { statut:"occupee" }); } catch(e) {}

        <>

            footer={
              <div style={{display:"flex",gap:8,flexWrap:"wrap",width:"100%"}}>

                <button className="btn btn-gold btn-sm"  style={{width:"auto"}} onClick={() => { setBuilderOpen(true); if(table.statut==="libre") markOccupee(); }}>+ Article</button>
                {isAdmin && <button className="btn btn-ghost btn-sm" style={{width:"auto"}} onClick={() => setPermuterOpen(true)}>🔄</button>}
                {/* Fix 5 : transfert vers une autre table */}
                {hasActiveOrders && <button className="btn btn-ghost btn-sm" style={{width:"auto"}} onClick={() => setTransferOpen(true)}>↗️ Transférer</button>}
                {canDelete && <button className="btn btn-red btn-sm" style={{width:"auto"}} onClick={() => setDeleteConfirm(true)}>🗑️</button>}
              </div>
            }>
            <div className="flex-between mb12">
              <div>
                {!table.isTakeaway && <div style={{fontSize:12,color:"var(--t3)"}}>{S.mySalles.find(s=>s.id===table.salleId)?.nom}</div>}
                {table.clientNom   && <div style={{fontSize:12,color:"var(--t3)"}}>Client : {table.clientNom}</div>}
                <div style={{fontSize:12,color:"var(--t3)"}}>Serveur : {S.state.employees.find(e=>e.id===table.serveurId)?.prenom}</div>

              <div style={{fontFamily:"Outfit",fontSize:20,fontWeight:700,color:"var(--gold)"}}>{fmt(total)}</div>
            </div>
            {orders.length === 0 && <div className="empty" style={{padding:"24px 0"}}><div className="empty-icon">🛒</div><div className="empty-text">Aucune commande</div></div>}
            {orders.map(order => (
              <div key={order.id} className="card" style={{marginBottom:10}}>
                <div className="flex-between mb8">
                  <span className="chip chip-gray">{S.myServices.find(s=>s.id===order.serviceId)?.nom}</span>

                        onClick={() => setAnnulationConfirm(order)}>⚠️</button>

                {order.items.map(item => {

                  return m ? (
                    <div key={item.menuId} className="kitchen-item">

          </Sheet>

          {builderOpen  && <OrderBuilderSheet table={table} onClose={() => setBuilderOpen(false)} S={S} />}
          {permuterOpen && <PermuterSheet    table={table} onClose={() => setPermuterOpen(false)} S={S} />}
          {/* Correction 9 : éditeur de commande en_attente */}
          {editOrder && <OrderEditorSheet order={editOrder} onClose={() => setEditOrder(null)} S={S} />}
          {/* F4 : confirmation demande d'annulation */}
          <Confirm
            open={!!annulationConfirm}
            onClose={() => setAnnulationConfirm(null)}
            title="Demande d'annulation"
            msg="Envoyer une demande d'annulation pour cette commande ?"
            onOk={() => demanderAnnulation(annulationConfirm)}

          {/* Fix 5 : transfert de table */}
          {transferOpen && <TransferTableSheet table={table} onClose={() => { setTransferOpen(false); onClose(); }} S={S} />}
          <Confirm open={deleteConfirm} onClose={() => setDeleteConfirm(false)} title="Supprimer la table" msg={isAdmin?"Supprimer la table et toutes ses commandes ?":"Cette table est vide. Confirmer la suppression ?"} onOk={deleteTable} danger />
        </>
      );

    // Fix 5 — Transfert d'articles entre tables
    function TransferTableSheet({ table, onClose, S }) {
      const [targetId, setTargetId] = useState("");
      const isAdmin = S.user.role==="admin"||S.user.role==="admin_secondary";
      // Tables cibles disponibles : même restaurant, pas la table actuelle, non encaissées
      const targets = S.myTables.filter(t =>
        t.id !== table.id &&
        t.statut !== "encaisse" &&
        !t.isTakeaway &&
        (isAdmin || S.user.salleIds?.includes(t.salleId))
      );

      const doTransfer = async () => {
        if (!targetId) { S.toast("Choisissez une table cible","error"); return; }

        // Commandes actives à transférer
        const ordersToTransfer = S.myOrders.filter(o =>
          o.tableId === table.id && !["encaisse","rejete"].includes(o.statut)
        );

        // 1. Mettre à jour le state local immédiatement
        S.update(s => ({
          orders: s.orders.map(o => o.tableId===table.id && !["encaisse","rejete"].includes(o.statut)
            ? {...o, tableId:targetId} : o),
          tables: s.tables.map(t => {
            if (t.id===table.id) return {...t, statut:"libre"};
            if (t.id===targetId) return {...t, statut:"occupee"};
            return t;
          }),
        }));

        // 2. Persister dans Supabase
        try {
          // Mettre à jour chaque commande avec le nouveau table_id
          for (const order of ordersToTransfer) {
            await api.updateOrder(order.id, { table_id: targetId });
          }
          // Mettre à jour le statut des deux tables
          await api.updateTable(table.id,  { statut: "libre" });
          await api.updateTable(targetId,   { statut: "occupee" });
        } catch(e) {
          console.warn("doTransfer sync failed:", e);
          S.toast("Transfert local OK — erreur sync Supabase","error");
        }

        S.toast("Commandes transférées","success"); onClose();
      };

      return (
        <Sheet open={true} onClose={onClose} title={"Transférer – "+(table.isTakeaway?"EM-"+String(table.emNum).padStart(3,"0"):"Table "+table.numero)}
          footer={<><button className="btn btn-ghost" onClick={onClose}>Annuler</button><button className="btn btn-gold" disabled={!targetId} onClick={doTransfer}>Transférer</button></>}>
          <div className="alert alert-info mb12">↗️ Toutes les commandes actives seront déplacées vers la table choisie. La table source repassera libre.</div>
          <div className="field">
            <label>Table de destination *</label>
            <select className="inp" value={targetId} onChange={e => setTargetId(e.target.value)}>
              <option value="">Choisir une table...</option>
              {targets.map(t => {
                const salle = S.mySalles.find(s=>s.id===t.salleId);
                return <option key={t.id} value={t.id}>Table {t.numero} – {salle?.nom||""} ({t.statut})</option>;
              })}
            </select>
          </div>
        </Sheet>
      );
    }
